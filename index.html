<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN CAR</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root { --primary: #2ecc71; --secondary: #1a1a1a; --accent: #f1c40f; --white: #ffffff; --danger: #e74c3c; --chat-bg: #e5ddd5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--secondary); color: white; padding-bottom: 50px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        header { text-align: center; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 0 0 25px 25px; border-bottom: 2px solid var(--primary); margin-bottom: 20px; }
        .card { background: var(--white); color: #333; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 15px; position: relative; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        
        #map { width: 100%; height: 300px; border-radius: 20px; margin-bottom: 15px; border: 2px solid var(--primary); z-index: 1; }
        .section { display: none; }
        .active-section { display: block; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: white; color: #333; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; position: relative;}

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .suggestions { background: white; color: black; position: absolute; width: 100%; z-index: 1000; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); max-height: 150px; overflow-y: auto; }
        .suggestion-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; color: #333; font-size: 12px; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
        
        #chat-box { height: 250px; overflow-y: auto; background: var(--chat-bg); padding: 10px; border-radius: 10px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
        .file-label { font-size: 12px; display: block; margin-top: 6px; color: #555; font-weight: bold; }
        .countdown-timer { background: var(--danger); color: white; padding: 5px; text-align: center; border-radius: 8px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; letter-spacing: 2px;">RUN <span style="color:var(--primary)">CAR</span></h2>
</header>

<div class="container">
    <!-- AUTENTICACIÓN -->
    <div id="auth-container" class="section active-section">
        <div class="card">
            <h3 style="text-align:center; margin-top:0;">Acceso</h3>
            <input type="email" id="auth-email" placeholder="Correo">
            <input type="password" id="auth-pass" placeholder="Contraseña">
            
            <div id="reg-fields" style="display:none;">
                <input type="text" id="reg-nombre" placeholder="Nombre Completo">
                
                <label class="file-label">Foto de Perfil (Obligatorio):</label>
                <input type="file" id="reg-foto-perfil" accept="image/*">

                <div style="display: flex; gap: 5px; margin-top: 5px;">
                    <select id="reg-prefijo" style="flex: 1;"><option value="+503">+503</option></select>
                    <input type="tel" id="reg-tel" placeholder="WhatsApp" style="flex: 2;">
                </div>
                <select id="reg-rol">
                    <option value="cliente">Soy Cliente</option>
                    <option value="driver">Quiero ser Conductor</option>
                </select>

                <div id="driver-register-fields" style="display: none; border-top: 1px dashed #ccc; margin-top: 10px; padding-top: 5px;">
                    <input type="text" id="reg-placa" placeholder="Número de Placa">
                    <input type="text" id="reg-marca" placeholder="Marca del Vehículo (ej. Toyota)">
                    <input type="text" id="reg-modelo" placeholder="Modelo del Vehículo (ej. Corolla)">
                    <input type="number" id="reg-anio" placeholder="Año del Vehículo (Mayor a 2014)">
                    
                    <label class="file-label">Foto de Licencia de Conducir:</label>
                    <input type="file" id="reg-foto-licencia" accept="image/*">
                    
                    <label class="file-label">Foto de Tarjeta de Circulación:</label>
                    <input type="file" id="reg-foto-tarjeta" accept="image/*">

                    <label class="file-label">Foto de solvencia de la Policía:</label>
                    <input type="file" id="reg-foto-solvencia" accept="image/*">

                    <label class="file-label">Foto de Antecedentes Penales:</label>
                    <input type="file" id="reg-foto-antecedentes" accept="image/*">
                    
                    <label class="file-label">Fotos del Vehículo:</label>
                    <input type="file" id="reg-foto-vehiculo" accept="image/*">
                </div>
            </div>
            
            <button class="btn-action" id="btn-auth-main">INGRESAR</button>
            <p id="btn-switch-auth" style="text-align:center; cursor:pointer; color:#666;" onclick="switchAuth()">¿No tienes cuenta? Regístrate</p>
        </div>
    </div>

    <!-- VISTA CLIENTE -->
    <div id="cliente-view" class="section">
        <div id="map"></div>
        <div class="card">
            <button id="btn-gps" onclick="usarGPS()" style="background:#3498db; margin-bottom:10px;" class="btn-action">📍 USAR MI UBICACIÓN ACTUAL</button>
            <input id="origin" placeholder="📍 Origen (Dirección o Coordenadas)" oninput="buscarDireccion(this, 'sug-origin')">
            <div id="sug-origin" class="suggestions"></div>
            <input id="destination" placeholder="🏁 Destino (Dirección o Coordenadas)" oninput="buscarDireccion(this, 'sug-dest')">
            <div id="sug-dest" class="suggestions"></div>

            <div class="grid-inputs">
                <div><label><small>Pers.</small></label><input type="number" id="p-adultos" value="1"></div>
                <div><label><small>Bebés</small></label><input type="number" id="p-bebes" value="0"></div>
                <div><label><small>Mascotas</small></label><input type="number" id="p-mascotas" value="0"></div>
                <div><label><small>Carga (kg)</small></label><input type="number" id="p-carga" value="0"></div>
                <div style="grid-column: span 2;">
                    <textarea id="p-notes" placeholder="Notas extras (ej. Maletas grandes, aire acondicionado...)"></textarea>
                </div>
            </div>

            <div id="precio-area" style="display:none; text-align:center; border-top: 1px solid #eee; margin-top:10px; padding-top:10px;">
                <p>Distancia: <b id="distanciaText">0 km</b> | Sugerido App: <b id="priceMaps">$0.00</b></p>
                <input type="number" id="oferta-cliente" placeholder="Tu oferta $" style="font-size:18px; text-align:center;">
                <button class="btn-action" id="btn-publicar-viaje" onclick="publicarViaje()">ENVIAR OFERTA AL CONDUCTOR</button>
            </div>
            <button id="btn-calc" onclick="calcularRutaOSRM()" class="btn-action" style="background:#444;">CALCULAR RUTA</button>
        </div>
    </div>

    <!-- VISTA CONDUCTOR -->
    <div id="driver-view" class="section">
        <div class="card">
            <h4 style="margin:0">Ganancias (Últimos 5 días)</h4>
            <div id="driver-stats"></div>
            <h4 style="margin:0">Link de pago en usd $$: https://link.cubopago.com/JZGDO3DLh_vT</h4>
        </div>
        <h4 style="color:var(--primary)">Viajes Solicitados</h4>
        <div id="lista-viajes-global"></div>
    </div>

    <!-- VENTANA FLOTANTE (NEGOCIACIÓN) -->
    <div id="modal-negociacion" class="modal">
        <div class="modal-content" id="modal-content-body"></div>
    </div>

    <button id="btn-logout" onclick="cerrarSesion()" class="btn-action" style="display:none; background:var(--danger); margin-top:20px;">CERRAR SESIÓN</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot, serverTimestamp, doc, updateDoc, getDoc, orderBy, setDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAyRrBUmw4OEzS7EmvK_XmDk6Z5rrjLC3A",
        authDomain: "runcar-6eda0.firebaseapp.com",
        projectId: "runcar-6eda0",
        storageBucket: "runcar-6eda0.firebasestorage.app",
        messagingSenderId: "152627344672",
        appId: "1:152627344672:web:b420d1c8cbb670069b9345"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let lMap, markerOrigen, markerDestino, polylineRuta;
    let coordsOrigen = null, coordsDestino = null;
    let miRol = "", miUid = "", miNombre = "", miFoto = "", isReg = false;
    let miPlaca = "", miMarca = "", miModelo = "";
    let countdownInterval = null;

    document.getElementById('reg-rol').addEventListener('change', function() {
        document.getElementById('driver-register-fields').style.display = this.value === 'driver' ? 'block' : 'none';
    });

    const toBase64 = file => new Promise((resolve, reject) => {
        if(!file) return resolve("");
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    // --- AUTENTICACIÓN Y REGISTRO ---
    document.getElementById('btn-auth-main').onclick = async () => {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        if(!email || !pass) return alert("Por favor, ingresa correo y contraseña.");

        if(!isReg) {
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch(e) { alert("Error al ingresar: " + e.message); }
        } else {
            const nombre = document.getElementById('reg-nombre').value;
            const rol = document.getElementById('reg-rol').value;
            const tel = document.getElementById('reg-tel').value;
            const fotoPerfilFile = document.getElementById('reg-foto-perfil').files[0];
            
            if(!nombre || !fotoPerfilFile) return alert("Nombre y Foto de perfil son obligatorios.");
            const fotoBase64 = await toBase64(fotoPerfilFile);

            let driverData = {};
            if(rol === 'driver') {
                const placa = document.getElementById('reg-placa').value;
                const marca = document.getElementById('reg-marca').value;
                const modelo = document.getElementById('reg-modelo').value;
                const anio = document.getElementById('reg-anio').value;
                if(!placa || !marca || !modelo || !anio) return alert("Completa todos los datos de tu vehículo.");
                driverData = { placa, marca, modelo, anio: parseInt(anio) };
            }

            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "usuarios", res.user.uid), {
                    uid: res.user.uid, email, nombre, rol, telefono: tel, fotoPerfil: fotoBase64, ...driverData
                });
            } catch(e) { alert("Error al registrarse: " + e.message); }
        }
    };

    window.switchAuth = () => {
        isReg = !isReg;
        document.getElementById('reg-fields').style.display = isReg ? 'block' : 'none';
        document.getElementById('btn-auth-main').innerText = isReg ? 'REGISTRARSE' : 'INGRESAR';
        document.getElementById('btn-switch-auth').innerText = isReg ? '¿Ya tienes cuenta? Ingresa' : '¿No tienes cuenta? Regístrate';
    };

    // --- MONITOREO SESIÓN ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            miUid = user.uid;
            const userDoc = await getDoc(doc(db, "usuarios", miUid));
            if(userDoc.exists()) {
                const data = userDoc.data();
                miRol = data.rol; miNombre = data.nombre; miFoto = data.fotoPerfil;
                miPlaca = data.placa || ""; miMarca = data.marca || ""; miModelo = data.modelo || "";
                
                document.getElementById('auth-container').classList.remove('active-section');
                document.getElementById('btn-logout').style.display = 'block';
                
                if(miRol === 'cliente') {
                    document.getElementById('cliente-view').classList.add('active-section');
                    window.initLeaflet(); escucharViajeCliente();
                } else if(miRol === 'driver') {
                    document.getElementById('driver-view').classList.add('active-section');
                    if(document.getElementById("driver-stats")) document.getElementById("driver-stats").innerHTML = "<p>$0.00 en viajes</p>";
                    escucharViajesDriver();
                }
            }
        } else {
            miUid = ""; miRol = "";
            document.getElementById('auth-container').classList.add('active-section');
            document.getElementById('cliente-view').classList.remove('active-section');
            document.getElementById('driver-view').classList.remove('active-section');
            document.getElementById('btn-logout').style.display = 'none';
            if(document.getElementById('chat-active')) document.getElementById('chat-active').remove();
        }
    });

    window.cerrarSesion = () => signOut(auth);

    // --- MAPA ---
    window.initLeaflet = () => {
        if (lMap) return;
        lMap = L.map('map').setView([13.7, -89.2], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(lMap);
        markerOrigen = L.marker([13.7, -89.2], {draggable: true}).addTo(lMap).bindPopup("Origen (A)");
        markerDestino = L.marker([13.71, -89.21], {draggable: true}).addTo(lMap).bindPopup("Destino (B)");

        markerOrigen.on('dragend', (e) => { const pos = e.target.getLatLng(); coordsOrigen = [pos.lat, pos.lng]; reverseGeocode(pos, 'origin'); });
        markerDestino.on('dragend', (e) => { const pos = e.target.getLatLng(); coordsDestino = [pos.lat, pos.lng]; reverseGeocode(pos, 'destination'); });
    };

    async function reverseGeocode(latlng, inputId) {
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latlng.lat}&lon=${latlng.lng}`);
            const data = await res.json();
            document.getElementById(inputId).value = data.display_name || `${latlng.lat}, ${latlng.lng}`;
        } catch(e) { document.getElementById(inputId).value = `${latlng.lat}, ${latlng.lng}`; }
    }

    window.usarGPS = () => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const c = [pos.coords.latitude, pos.coords.longitude]; coordsOrigen = c;
                markerOrigen.setLatLng(c); lMap.flyTo(c, 15); reverseGeocode({lat: c[0], lng: c[1]}, 'origin');
            });
        }
    };

    window.buscarDireccion = async (input, targetId) => {
        const val = input.value;
        if(val.includes(',') && val.split(',').length === 2) {
            const p = val.split(','); const c = [parseFloat(p[0]), parseFloat(p[1])];
            if(!isNaN(c[0]) && !isNaN(c[1])) {
                if(input.id === 'origin') { coordsOrigen = c; markerOrigen.setLatLng(c); } else { coordsDestino = c; markerDestino.setLatLng(c); }
                return;
            }
        }
        if (val.length < 4) return;
        try {
            const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(val)}&limit=5`);
            const data = await res.json(); let h = "";
            data.features.forEach(f => {
                const lbl = `${f.properties.name || ''} ${f.properties.city || ''}`.trim();
                h += `<div class="suggestion-item" onclick="seleccionarPos('${input.id}','${lbl.replace(/'/g, "\\'")}',${f.geometry.coordinates[1]},${f.geometry.coordinates[0]},'${targetId}')">${lbl}</div>`;
            });
            document.getElementById(targetId).innerHTML = h;
        } catch(e) {}
    };

    window.seleccionarPos = (inputId, lbl, lat, lon, targetId) => {
        document.getElementById(inputId).value = lbl; document.getElementById(targetId).innerHTML = "";
        const c = [lat, lon];
        if (inputId === 'origin') { coordsOrigen = c; markerOrigen.setLatLng(c); } else { coordsDestino = c; markerDestino.setLatLng(c); }
        lMap.flyTo(c, 14);
    };

    window.calcularRutaOSRM = async () => {
        if(!coordsOrigen || !coordsDestino) return alert("Selecciona origen y destino");
        try {
            const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coordsOrigen[1]},${coordsOrigen[0]};${coordsDestino[1]},${coordsDestino[0]}?overview=full&geometries=geojson`);
            const data = await res.json();
            if (data.code === 'Ok') {
                const r = data.routes[0]; const km = r.distance / 1000;
                let precio = km <= 1 ? 1 : km <= 2 ? 2 : km <= 3 ? 3 : 3 + (km - 3) * 0.30;
                if (polylineRuta) lMap.removeLayer(polylineRuta);
                polylineRuta = L.geoJSON(r.geometry, {style:{color:'#2ecc71', weight:5}}).addTo(lMap);
                lMap.fitBounds(polylineRuta.getBounds());
                document.getElementById("distanciaText").innerText = km.toFixed(2) + " km";
                document.getElementById("priceMaps").innerText = "$" + precio.toFixed(2);
                document.getElementById("oferta-cliente").value = precio.toFixed(2);
                document.getElementById("precio-area").style.display = 'block';
            }
        } catch(e) { alert("Error al calcular ruta"); }
    };

    // --- SINCRO TEMPORIZADOR GLOBAL (150 SEGUNDOS) ---
    function iniciarTemporizador(idViaje, expiresAt, accionTimeout) {
        clearInterval(countdownInterval);
        const actualizar = async () => {
            let tiempoRestante = Math.round((expiresAt - Date.now()) / 1000);
            if(tiempoRestante < 0) tiempoRestante = 0;
            
            const timerElements = document.querySelectorAll(".timer-countdown");
            timerElements.forEach(el => el.innerText = tiempoRestante);

            if(tiempoRestante <= 0) {
                clearInterval(countdownInterval);
                cerrarModal();
                if(accionTimeout) await accionTimeout(idViaje);
            }
        };
        actualizar();
        countdownInterval = setInterval(actualizar, 1000);
    }

    window.cerrarModal = () => { document.getElementById("modal-negociacion").style.display = "none"; };

    // --- FLUJO CLIENTE ---
    window.publicarViaje = async () => {
        if (!miUid) return alert("Identificación no válida.");
        const ofertaVal = parseFloat(document.getElementById("oferta-cliente").value);
        if(isNaN(ofertaVal) || ofertaVal <= 0) return alert("Ingresa una oferta correcta.");

        const viaje = {
            clienteId: miUid, clienteNombre: miNombre, clienteFoto: miFoto || "",
            origen: document.getElementById("origin").value, destino: document.getElementById("destination").value,
            km: document.getElementById("distanciaText").innerText, precioApp: document.getElementById("priceMaps").innerText,
            ofertaActual: ofertaVal, ofertaDe: "cliente", estado: "buscando", propuestasDrivers: {},
            expiresAt: Date.now() + 150000, timestamp: serverTimestamp()
        };
        await addDoc(collection(db, "viajes"), viaje);
    };

    function escucharViajeCliente() {
        const q = query(collection(db, "viajes"), where("clienteId", "==", miUid));
        onSnapshot(q, (snap) => {
            if(snap.empty) return;
            let documentos = [];
            snap.forEach(doc => { documentos.push({ id: doc.id, ...doc.data() }); });
            documentos.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
            const v = documentos[0]; const vId = v.id;

            if(v.estado === "cancelado" || v.estado === "finalizado") {
                clearInterval(countdownInterval); cerrarModal();
                if(document.getElementById('chat-active')) {
                    document.getElementById('chat-active').remove();
                    document.getElementById('cliente-view').classList.add('active-section');
                }
                return;
            }

            if(v.estado === "accepted") {
                clearInterval(countdownInterval); cerrarModal();
                if(!document.getElementById('chat-active')) window.abrirChat(vId);
                return;
            }

            // Cambiado a validar tanto "buscando" como "negociando" de forma combinada
            if(v.estado === "buscando" || v.estado === "negociando") {
                const modal = document.getElementById("modal-negociacion");
                if (modal.style.display !== "flex") modal.style.display = "flex";
                
                iniciarTemporizador(vId, v.expiresAt, async (id) => {
                    await updateDoc(doc(db, "viajes", id), { estado: 'cancelado' });
                    alert("Tiempo de negociación agotado.");
                });

                const body = document.getElementById("modal-content-body");
                let htmlPropuestas = "";
                const propuestas = Object.values(v.propuestasDrivers || {});
                const pendientes = propuestas.filter(p => p.estado === "pendiente");

                if(pendientes.length === 0) {
                    htmlPropuestas = `<p style='text-align:center;color:#666;'>Esperando ofertas de conductores activos...</p>`;
                } else {
                    pendientes.forEach(p => {
                        htmlPropuestas += `
                            <div style="background:#f9f9f9; padding:12px; border-radius:12px; margin-bottom:8px; border:1px solid #eee;">
                                <div style="display:flex; align-items:center; gap:8px;">
                                    <img src="${p.driverFoto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" style="width:32px; height:32px; border-radius:50%; object-fit:cover;">
                                    <span style="font-weight:bold; font-size:13px;">${p.driverNombre}</span>
                                </div>
                                <p style="margin:4px 0; font-size:11px; color:#555;">🚘 ${p.driverMarca} ${p.driverModelo} (${p.driverPlaca})</p>
                                <p style="margin:5px 0; font-size:15px; color:var(--primary);"><b>Propone: $${p.monto.toFixed(2)}</b> <small style='color:#666;'>(Contraoferta ${p.count}/2)</small></p>
                                <div style="display:flex; gap:5px;">
                                    <button class="btn-action" style="padding:8px; font-size:12px;" onclick="responderContraofertaCliente('${vId}', '${p.driverId}', 'aceptar')">ACEPTAR</button>
                                    <button class="btn-action" style="padding:8px; font-size:12px; background:var(--danger);" onclick="responderContraofertaCliente('${vId}', '${p.driverId}', 'rechazar')">RECHAZAR</button>
                                </div>
                            </div>
                        `;
                    });
                }

                body.innerHTML = `
                    <div class="countdown-timer">Tiempo Restante: <span class="timer-countdown">0</span>s</div>
                    <h3 style="margin-top:0;">Panel de Ofertas</h3>
                    <p style="margin:0 0 10px 0; font-size:14px;">Tu oferta base: <b style="color:var(--primary)">$${v.ofertaActual}</b></p>
                    <hr style="border:0; border-top:1px solid #eee;">
                    <div style="max-height: 220px; overflow-y:auto; margin-bottom:10px;">${htmlPropuestas}</div>
                    <button class="btn-action" style="background:#777;" onclick="cancelarSolicitudCliente('${vId}')">CANCELAR VIAJE</button>
                `;
            }
        });
    }

    window.cancelarSolicitudCliente = async (idViaje) => {
        if(confirm("¿Deseas cancelar la solicitud de viaje? Se cerrarán todas las ventanas.")) {
            clearInterval(countdownInterval); await updateDoc(doc(db, "viajes", idViaje), { estado: 'cancelado' }); cerrarModal();
        }
    };

    window.responderContraofertaCliente = async (viajeId, driverId, accion) => {
        const docRef = doc(db, "viajes", viajeId);
        if(accion === 'aceptar') {
            const snap = await getDoc(docRef); const v = snap.data();
            const prop = v.propuestasDrivers[driverId];
            // Se inyectan de manera explícita todos los campos del Driver al documento del viaje para que el chat los lea
            await updateDoc(docRef, {
                estado: 'accepted', 
                driverId: prop.driverId, 
                driverNombre: prop.driverNombre, 
                driverFoto: prop.driverFoto,
                driverPlaca: prop.driverPlaca, 
                driverMarca: prop.driverMarca, 
                driverModelo: prop.driverModelo, 
                ofertaActual: prop.monto
            });
            cerrarModal();
        } else {
            await updateDoc(docRef, { [`propuestasDrivers.${driverId}.estado`]: 'rechazado' });
        }
    };

    // --- FLUJO CONDUCTOR ---
    function escucharViajesDriver() {
        onSnapshot(collection(db, "viajes"), (snap) => {
            const container = document.getElementById("lista-viajes-global"); if(!container) return; container.innerHTML = "";
            snap.forEach(docSnap => {
                const v = docSnap.data(); const vid = docSnap.id;
                // Un driver puede entrar a interactuar si el viaje está en 'buscando' o si ya está en fase de 'negociando'
                if(v.estado === "buscando" || v.estado === "negociando") {
                    const card = document.createElement("div"); card.className = "card";
                    card.innerHTML = `
                        <p style="margin:0 0 5px 0;"><b>Origen:</b> ${v.origen ? v.origen.substring(0,45) : ''}...</p>
                        <p style="margin:0 0 5px 0;"><b>Destino:</b> ${v.destino ? v.destino.substring(0,45) : ''}...</p>
                        <p style="margin:5px 0; font-size:13px;">App: ${v.precioApp} | <b style="color:var(--primary)">Oferta Cliente: $${v.ofertaActual}</b></p>
                        <button class="btn-action" onclick="abrirNegociacionDriver('${vid}')">VER DETALLES / NEGOCIAR</button>
                    `;
                    container.appendChild(card);
                }
            });
        });
    }

    window.abrirNegociacionDriver = async (id) => {
        const docRef = doc(db, "viajes", id); const snapshot = await getDoc(docRef);
        if(!snapshot.exists() || (snapshot.data().estado !== "buscando" && snapshot.data().estado !== "negociando")) {
            return alert("El viaje ya no está disponible.");
        }
        
        let v = snapshot.data(); const modal = document.getElementById("modal-negociacion"); const body = document.getElementById("modal-content-body");

        const renderUIConductor = () => {
            const miPropuestaInfo = v.propuestasDrivers?.[miUid];
            if (miPropuestaInfo && miPropuestaInfo.estado === 'rechazado') {
                body.innerHTML = `
                    <div class="countdown-timer">Tiempo Restante: <span class="timer-countdown">0</span>s</div>
                    <h3>Tu propuesta fue rechazada</h3>
                    <p>El cliente rechazó tu oferta de $${miPropuestaInfo.monto.toFixed(2)}.</p>
                    ${miPropuestaInfo.count < 2 ? 
                      `<button class="btn-action" style="background:var(--accent); color:black;" onclick="contraofertaDriver('${id}')">ENVIAR NUEVA PROPUESTA (Intento ${miPropuestaInfo.count}/2)</button>` : 
                      `<p style="color:var(--danger); font-weight:bold; text-align:center;">Límite máximo de 2 contraofertas alcanzado.</p>`}
                    <button class="btn-action" style="background:#999; margin-top:5px;" onclick="cerrarModal()">CERRAR VENTANA</button>
                `; return;
            }
            if (miPropuestaInfo && miPropuestaInfo.estado === 'pendiente') {
                body.innerHTML = `
                    <div class="countdown-timer">Tiempo Restante: <span class="timer-countdown">0</span>s</div>
                    <h3>Oferta en Evaluación</h3>
                    <p style="text-align:center;">Enviaste una propuesta de <b>$${miPropuestaInfo.monto.toFixed(2)}</b>.<br>Esperando que el cliente responda...</p>
                    <button class="btn-action" style="background:#999; margin-top:5px;" onclick="cerrarModal()">REVISAR MÁS TARDE</button>
                `; return;
            }

            const countEnviados = miPropuestaInfo ? miPropuestaInfo.count : 0;
            body.innerHTML = `
                <div class="countdown-timer">Tiempo Restante: <span class="timer-countdown">0</span>s</div>
                <h3 style="margin-top:0;">Detalles de la Solicitud</h3>
                <p style="font-size:12px; margin:4px 0;"><b>Origen:</b> ${v.origen}</p>
                <p style="font-size:12px; margin:4px 0;"><b>Destino:</b> ${v.destino}</p>
                <p style="font-size:14px; margin:10px 0;">Sugerido App: ${v.precioApp} | Oferta: <span style="color:var(--primary);font-weight:bold;">$${v.ofertaActual}</span></p>
                <hr style="border:0; border-top:1px solid #eee;">
                <div style="display:flex; flex-direction:column; gap:5px;">
                    <button class="btn-action" onclick="responderDriver('${id}', 'aceptar')">ACEPTAR POR $${v.ofertaActual}</button>
                    ${countEnviados < 2 ? 
                      `<button class="btn-action" style="background:var(--accent); color:black;" onclick="contraofertaDriver('${id}')">CONTRAOFERTAR (${countEnviados}/2)</button>` : 
                      `<button class="btn-action" style="background:#ccc;color:#666;" disabled>MÁXIMO DE OFERTAS ALCANZADO</button>`}
                    <button class="btn-action" style="background:var(--danger);" onclick="cerrarModal()">RECHAZAR / CERRAR</button>
                </div>
            `;
        };

        modal.style.display = "flex"; renderUIConductor();

        const unsub = onSnapshot(docRef, (docSnap) => {
            if(!docSnap.exists() || docSnap.data().estado === 'cancelado') {
                clearInterval(countdownInterval); cerrarModal(); unsub(); return;
            }
            const dataU = docSnap.data();
            if(dataU.estado === 'accepted') {
                clearInterval(countdownInterval); cerrarModal(); unsub();
                if(dataU.driverId === miUid) window.abrirChat(id); else alert("Otro conductor aceptó este viaje.");
                return;
            }
            v = dataU; // Sincroniza la lectura en tiempo real
            renderUIConductor();
        });

        iniciarTemporizador(id, v.expiresAt, () => { cerrarModal(); unsub(); });
    };

    window.contraofertaDriver = async (id) => {
        const docRef = doc(db, "viajes", id); const snap = await getDoc(docRef); const v = snap.data();
        const currentCount = v.propuestasDrivers?.[miUid]?.count || 0;
        if(currentCount >= 2) return alert("Alcanzaste tu límite de 2 contraofertas.");

        const monto = prompt("Ingresa tu contraoferta económica:");
        if(monto && !isNaN(monto) && parseFloat(monto) > 0) {
            // Pasamos el estado de forma obligatoria a "negociando" para que el cliente capture la actualización
            await updateDoc(docRef, {
                estado: "negociando",
                [`propuestasDrivers.${miUid}`]: {
                    driverId: miUid, driverNombre: miNombre, driverFoto: miFoto || "",
                    driverPlaca: miPlaca, driverMarca: miMarca, driverModelo: miModelo,
                    monto: parseFloat(monto), count: currentCount + 1, estado: "pendiente"
                }
            });
        }
    };

    window.responderDriver = async (id, accion) => {
        if(accion === 'aceptar') {
            const docRef = doc(db, "viajes", id); const snapActual = await getDoc(docRef);
            if(snapActual.data().estado === 'accepted') return alert("Este viaje ya fue tomado.");
            await updateDoc(docRef, { 
                estado: 'accepted', 
                driverId: miUid, 
                driverNombre: miNombre, 
                driverFoto: miFoto || "",
                driverPlaca: miPlaca, 
                driverMarca: miMarca, 
                driverModelo: miModelo
            });
            cerrarModal();
        }
    };

    // --- VENTANA DE CHAT EN TIEMPO REAL ---
    window.abrirChat = async (id) => {
        cerrarModal();
        if(document.getElementById('chat-active')) document.getElementById('chat-active').remove();

        document.getElementById('driver-view').classList.remove('active-section');
        document.getElementById('cliente-view').classList.remove('active-section');

        const viajeSnap = await getDoc(doc(db, "viajes", id)); if(!viajeSnap.exists()) return;
        const v = viajeSnap.data();

        const chatUI = document.createElement("div"); chatUI.className = "card active-section"; chatUI.id = "chat-active";
        chatUI.innerHTML = `
            <div style="background:orange;padding:8px;border-radius:10px;margin-bottom:10px;font-size:11px;color:black;font-weight:bold;text-align:center;">
                ⚠️ VIAJE EN CURSO - CONEXIÓN CON ENCRIPTACIÓN DIRECTA
            </div>
            
            <!-- CABECERA EXIGIDA: FOTOS DE PERFIL + DETALLES COMPLETOS -->
            <div style="display: flex; justify-content: space-between; align-items: center; background: #f7f9fa; padding: 12px; border-radius: 15px; border: 1px solid var(--primary); color: #333; margin-bottom: 8px;">
                <div style="text-align: center; flex: 1; min-width: 0;">
                    <img src="${v.clienteFoto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" style="width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary);">
                    <div style="font-size: 10px; color: #777; margin-top:2px;">Cliente</div>
                    <div style="font-size: 12px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${v.clienteNombre}</div>
                </div>
                <div style="font-size: 20px; color: var(--primary); font-weight: bold; padding: 0 10px;">⚡</div>
                <div style="text-align: center; flex: 1; min-width: 0;">
                    <img src="${v.driverFoto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" style="width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary);">
                    <div style="font-size: 10px; color: #777; margin-top:2px;">Conductor</div>
                    <div style="font-size: 12px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${v.driverNombre}</div>
                </div>
            </div>
            <div style="background: #eef2f3; padding: 10px; border-radius: 10px; text-align: center; font-size: 13px; margin-bottom: 12px; border-left: 5px solid var(--accent); color: #333;">
                🚘 <b>Vehículo:</b> ${v.driverMarca || 'N/A'} ${v.driverModelo || 'N/A'} <br>
                🆔 <b>Placa asignada:</b> <span style="background:var(--accent); color:black; padding:1px 6px; border-radius:4px; font-weight:bold;">${v.driverPlaca || 'N/A'}</span>
            </div>

            <div id="chat-box"></div>
            <input id="chat-input" placeholder="Escribe un mensaje de coordinación...">
            <button class="btn-action" id="btn-send-msg">ENVIAR MENSAJE</button>
            <button class="btn-action" style="background:var(--danger);margin-top:10px;" id="btn-finalizar-viaje">FINALIZAR VIAJE ACTIVO</button>
        `;

        document.querySelector(".container").insertBefore(chatUI, document.getElementById('btn-logout'));
        document.getElementById('btn-send-msg').onclick = () => window.enviarMensaje(id);
        document.getElementById('btn-finalizar-viaje').onclick = () => window.finalizarViaje(id);

        const mensajesRef = query(collection(db, "viajes", id, "mensajes"), orderBy("timestamp", "asc"));
        onSnapshot(mensajesRef, (snapshot) => {
            const box = document.getElementById("chat-box"); if(!box) return; box.innerHTML = "";
            snapshot.forEach(docSnap => {
                const data = docSnap.data(); const isMine = data.uid === miUid; const div = document.createElement("div");
                const fotoAvatar = data.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

                div.style.display = "flex"; div.style.flexDirection = isMine ? "row-reverse" : "row";
                div.style.alignItems = "flex-end"; div.style.gap = "8px";
                div.innerHTML = `
                    <img src="${fotoAvatar}" style="width:30px; height:30px; border-radius:50%; object-fit:cover; border:2px solid ${isMine ? 'var(--primary)' : '#ccc'};">
                    <div style="max-width:75%; padding:10px; border-radius:15px; background:${isMine ? '#2ecc71' : '#ffffff'}; color:${isMine ? 'white' : 'black'}; box-shadow:0 2px 5px rgba(0,0,0,0.1); word-wrap:break-word;">
                        <b style="font-size:10px; color:${isMine ? '#fff' : '#555'}">${data.user}</b><br>${data.msg}
                    </div>
                `;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    window.enviarMensaje = async (id) => {
        const input = document.getElementById("chat-input"); if(!input || !input.value.trim()) return;
        const txt = input.value.trim(); input.value = "";
        await addDoc(collection(db, "viajes", id, "mensajes"), {
            uid: miUid, user: miNombre, foto: miFoto, msg: txt, timestamp: serverTimestamp()
        });
    };

    window.finalizarViaje = async (id) => {
        if(confirm("¿Confirmas la finalización y el cierre del viaje?")) {
            await updateDoc(doc(db, "viajes", id), { estado: 'finalizado' });
            if(document.getElementById('chat-active')) document.getElementById('chat-active').remove();
            if(miRol === 'cliente') document.getElementById('cliente-view').classList.add('active-section');
            else document.getElementById('driver-view').classList.add('active-section');
        }
    };
</script>
</body>
</html>
