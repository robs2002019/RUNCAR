<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN CAR PRO - Global</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root { --primary: #2ecc71; --secondary: #1a1a1a; --accent: #f1c40f; --white: #ffffff; --danger: #e74c3c; --chat-bg: #e5ddd5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--secondary); color: white; padding-bottom: 50px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        header { text-align: center; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 0 0 25px 25px; border-bottom: 2px solid var(--primary); margin-bottom: 20px; }
        .card { background: var(--white); color: #333; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 15px; position: relative; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; box-sizing: border-box; }
        label { font-size: 12px; color: #666; font-weight: bold; }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        
        #map { width: 100%; height: 350px; border-radius: 20px; margin-bottom: 15px; border: 2px solid var(--primary); z-index: 1; }
        .section { display: none; }
        .active-section { display: block; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: none; align-items: center; justify-content: center; overflow-y: auto; }
        .modal-content { background: white; color: #333; width: 90%; max-width: 450px; padding: 25px; border-radius: 25px; position: relative; }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .suggestions { background: white; color: black; position: absolute; width: 90%; z-index: 1000; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); max-height: 150px; overflow-y: auto; }
        .suggestion-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; color: #333; font-size: 11px; }
        th, td { padding: 6px; text-align: left; border-bottom: 1px solid #ddd; }
        .upload-box { border: 2px dashed #ccc; padding: 10px; text-align: center; border-radius: 10px; margin: 5px 0; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; letter-spacing: 2px;">RUN <span style="color:var(--primary)">CAR</span> PRO</h2>
</header>

<div class="container">
    <!-- SECCIÓN AUTH / REGISTRO -->
    <div id="auth-container" class="section active-section">
        <div class="card">
            <h3 id="auth-title" style="text-align:center; margin-top:0;">Acceso</h3>
            <input type="email" id="auth-email" placeholder="Correo electrónico">
            <input type="password" id="auth-pass" placeholder="Contraseña">
            
            <div id="reg-fields" style="display:none;">
                <input type="text" id="reg-nombre" placeholder="Nombre Completo">
                <div style="display: flex; gap: 5px;">
                    <select id="reg-prefijo" style="flex: 1.2; font-size: 11px;"></select>
                    <input type="tel" id="reg-tel" placeholder="WhatsApp" style="flex: 2;">
                </div>
                
                <label>Foto de Perfil:</label>
                <input type="file" id="file-perfil" accept="image/*">

                <select id="reg-rol" onchange="toggleDriverFields()">
                    <option value="cliente">Soy Cliente</option>
                    <option value="driver">Quiero ser Conductor</option>
                </select>

                <div id="driver-specific-fields" style="display:none; background: #f9f9f9; padding: 10px; border-radius: 10px;">
                    <input type="text" id="d-marca" placeholder="Marca del Vehículo">
                    <input type="text" id="d-modelo" placeholder="Modelo del Vehículo">
                    <input type="number" id="d-year" placeholder="Año (2014 en adelante)" min="2014">
                    <input type="text" id="d-placa" placeholder="Número de Placa">
                    
                    <label>Foto Solvencia PNC:</label>
                    <input type="file" id="file-solvencia" accept="image/*">
                    <label>Foto Antecedentes Penales:</label>
                    <input type="file" id="file-antecedentes" accept="image/*">
                    <label>Foto del Vehículo:</label>
                    <input type="file" id="file-auto" accept="image/*">
                    <label>Foto de la Placa:</label>
                    <input type="file" id="file-fplaca" accept="image/*">
                    <label>Foto Licencia de Conducir:</label>
                    <input type="file" id="file-licencia" accept="image/*">
                </div>
            </div>

            <button class="btn-action" onclick="ejecutarAuth()" id="btn-auth-main">INGRESAR</button>
            <p onclick="switchAuth()" id="switch-text" style="text-align:center; cursor:pointer; color:#666; font-size: 13px; margin-top: 15px;">¿No tienes cuenta? Regístrate aquí</p>
        </div>
    </div>

    <!-- VISTA CLIENTE -->
    <div id="cliente-view" class="section">
        <div id="map"></div>
        <div class="card">
            <button onclick="usarGPS()" style="background:#3498db; margin-bottom:10px;" class="btn-action">📍 MI UBICACIÓN ACTUAL (A)</button>
            
            <label>Punto de Origen (A):</label>
            <input id="origin" placeholder="Dirección de salida" oninput="buscarDireccion(this, 'sug-origin')">
            <div id="sug-origin" class="suggestions"></div>
            
            <label>Punto de Destino (B):</label>
            <input id="destination" placeholder="Dirección de llegada" oninput="buscarDireccion(this, 'sug-dest')">
            <div id="sug-dest" class="suggestions"></div>

            <div class="grid-inputs" style="margin-top:10px;">
                <div><label>Pers.</label><input type="number" id="p-adultos" value="1"></div>
                <div><label>Bebés</label><input type="number" id="p-bebes" value="0"></div>
                <div><label>Mascotas</label><input type="number" id="p-mascotas" value="0"></div>
                <div><label>Carga kg</label><input type="number" id="p-carga" value="0"></div>
            </div>
            <textarea id="p-notas" placeholder="Notas adicionales para el conductor..."></textarea>

            <div id="precio-area" style="display:none; text-align:center; border-top: 2px solid #eee; margin-top:10px; padding-top:10px;">
                <p style="margin:5px 0;">Distancia: <b id="distanciaText">0 km</b></p>
                <p style="margin:5px 0;">Tarifa Sugerida: <b id="priceMaps">$0.00</b></p>
                <label>Tu Oferta Personalizada ($):</label>
                <input type="number" id="oferta-cliente" style="font-size:20px; text-align:center; color:var(--primary); font-weight:bold;">
                <button class="btn-action" onclick="publicarViaje()">ENVIAR MI OFERTA</button>
            </div>
            <button id="btn-calc" class="btn-action" style="background:#444;" onclick="calcularRutaOSRM()">CALCULAR RUTA Y PRECIO</button>
        </div>
    </div>

    <!-- VISTA DRIVER -->
    <div id="driver-view" class="section">
        <div class="card">
            <h4 style="margin:0">Mis Ingresos (Últimos 5 días)</h4>
            <div id="driver-stats"></div>
        </div>
        <h4 style="color:var(--primary)">Viajes Disponibles</h4>
        <div id="lista-viajes-global"></div>
    </div>

    <!-- VISTA ADMIN -->
    <div id="admin-view" class="section">
        <div class="card" style="color: black;">
            <h3 style="text-align:center">Panel Administrativo</h3>
            <div id="admin-summary" style="margin-bottom: 20px;"></div>
            <div id="admin-users-list"></div>
        </div>
    </div>

    <!-- MODAL DE NEGOCIACIÓN -->
    <div id="modal-negociacion" class="modal">
        <div class="modal-content" id="modal-content-body"></div>
    </div>

    <button id="btn-logout" class="btn-action" style="display:none; background:var(--danger); margin-top:20px;" onclick="cerrarSesion()">CERRAR SESIÓN</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot, serverTimestamp, doc, updateDoc, deleteDoc, getDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAyRrBUmw4OEzS7EmvK_XmDk6Z5rrjLC3A",
        authDomain: "runcar-6eda0.firebaseapp.com",
        projectId: "runcar-6eda0",
        storageBucket: "runcar-6eda0.appspot.com",
        messagingSenderId: "152627344672",
        appId: "1:152627344672:web:b420d1c8cbb670069b9345"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const storage = getStorage(app);

    let lMap, markerOrigen, markerDestino, polylineRuta;
    let coordsOrigen = null, coordsDestino = null;
    let miRol = "", miUid = "", miNombre = "", isReg = false;

    // --- MAPA Y GPS ---
    window.initLeaflet = () => {
        if (lMap) return;
        lMap = L.map('map').setView([13.7, -89.2], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(lMap);

        const iconA = L.divIcon({className: 'custom-div-icon', html: "<div style='background:white; color:black; border:2px solid green; border-radius:50%; width:25px; height:25px; text-align:center; font-weight:bold;'>A</div>", iconSize: [25, 25]});
        const iconB = L.divIcon({className: 'custom-div-icon', html: "<div style='background:white; color:black; border:2px solid red; border-radius:50%; width:25px; height:25px; text-align:center; font-weight:bold;'>B</div>", iconSize: [25, 25]});

        markerOrigen = L.marker([13.7, -89.2], {draggable: true, icon: iconA}).addTo(lMap);
        markerDestino = L.marker([13.71, -89.21], {draggable: true, icon: iconB}).addTo(lMap);

        markerOrigen.on('dragend', (e) => {
            coordsOrigen = [e.target.getLatLng().lat, e.target.getLatLng().lng];
            reverseGeocode(e.target.getLatLng(), 'origin');
        });
        markerDestino.on('dragend', (e) => {
            coordsDestino = [e.target.getLatLng().lat, e.target.getLatLng().lng];
            reverseGeocode(e.target.getLatLng(), 'destination');
        });
    };

    async function reverseGeocode(latlng, inputId) {
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latlng.lat}&lon=${latlng.lng}`);
            const data = await res.json();
            document.getElementById(inputId).value = data.display_name || `${latlng.lat}, ${latlng.lng}`;
        } catch(e) {}
    }

    window.usarGPS = () => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const c = [pos.coords.latitude, pos.coords.longitude];
                coordsOrigen = c;
                markerOrigen.setLatLng(c);
                lMap.flyTo(c, 15);
                reverseGeocode({lat: c[0], lng: c[1]}, 'origin');
            });
        }
    };

    // --- LÓGICA DE PRECIOS ---
    window.calcularRutaOSRM = async () => {
        if(!coordsOrigen || !coordsDestino) return alert("Define puntos A y B en el mapa");
        const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coordsOrigen[1]},${coordsOrigen[0]};${coordsDestino[1]},${coordsDestino[0]}?overview=full&geometries=geojson`);
        const data = await res.json();
        if (data.code === 'Ok') {
            const r = data.routes[0];
            const km = r.distance / 1000;
            
            // Fórmula solicitada: 1km=$1, 2km=$2, 3km=$3, +4km= 3+(km-3)*0.30
            let precio = 0;
            if(km <= 1) precio = 1;
            else if(km <= 2) precio = 2;
            else if(km <= 3) precio = 3;
            else precio = 3 + (km - 3) * 0.30;

            if (polylineRuta) lMap.removeLayer(polylineRuta);
            polylineRuta = L.geoJSON(r.geometry, {style:{color:'#2ecc71', weight:5}}).addTo(lMap);
            lMap.fitBounds(polylineRuta.getBounds());

            document.getElementById("distanciaText").innerText = km.toFixed(2) + " km";
            document.getElementById("priceMaps").innerText = "$" + precio.toFixed(2);
            document.getElementById("oferta-cliente").value = precio.toFixed(2);
            document.getElementById("precio-area").style.display = 'block';
        }
    };

    // --- SUBIDA DE IMÁGENES ---
    async function subirImagen(fileInputId, path) {
        const file = document.getElementById(fileInputId).files[0];
        if(!file) return "";
        const storageRef = ref(storage, `docs/${miUid}/${path}_${Date.now()}`);
        const snapshot = await uploadBytes(storageRef, file);
        return await getDownloadURL(snapshot.ref);
    }

    // --- AUTENTICACIÓN ---
    window.switchAuth = () => {
        isReg = !isReg;
        document.getElementById('reg-fields').style.display = isReg ? 'block' : 'none';
        document.getElementById('auth-title').innerText = isReg ? 'Registro' : 'Acceso';
        document.getElementById('btn-auth-main').innerText = isReg ? 'REGISTRARME' : 'INGRESAR';
    };

    window.toggleDriverFields = () => {
        const rol = document.getElementById('reg-rol').value;
        document.getElementById('driver-specific-fields').style.display = (rol === 'driver') ? 'block' : 'none';
    };

    window.ejecutarAuth = async () => {
        const mail = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;

        try {
            if(isReg) {
                // Validación año vehículo
                if(document.getElementById('reg-rol').value === 'driver') {
                    const year = parseInt(document.getElementById('d-year').value);
                    if(year < 2014) return alert("Lo sentimos, el vehículo debe ser año 2014 o superior.");
                }

                const uc = await createUserWithEmailAndPassword(auth, mail, pass);
                miUid = uc.user.uid;

                const userData = {
                    uid: miUid,
                    email: mail,
                    nombre: document.getElementById('reg-nombre').value,
                    rol: document.getElementById('reg-rol').value,
                    whatsapp: document.getElementById('reg-prefijo').value + document.getElementById('reg-tel').value,
                    activo: true,
                    fotoPerfil: await subirImagen('file-perfil', 'perfil')
                };

                if(userData.rol === 'driver') {
                    userData.vehiculo = {
                        marca: document.getElementById('d-marca').value,
                        modelo: document.getElementById('d-modelo').value,
                        year: document.getElementById('d-year').value,
                        placa: document.getElementById('d-placa').value,
                        fotoAuto: await subirImagen('file-auto', 'auto'),
                        fotoPlaca: await subirImagen('file-fplaca', 'placa'),
                        fotoLicencia: await subirImagen('file-licencia', 'licencia'),
                        fotoSolvencia: await subirImagen('file-solvencia', 'solvencia'),
                        fotoAntecedentes: await subirImagen('file-antecedentes', 'antecedentes')
                    };
                }

                await addDoc(collection(db, "usuarios"), userData);
                alert("Registro exitoso");
            } else {
                await signInWithEmailAndPassword(auth, mail, pass);
            }
        } catch(e) { alert("Error: " + e.message); }
    };

    // --- FLUJO DE VIAJES ---
    window.publicarViaje = async () => {
        const viaje = {
            clienteId: miUid,
            clienteNombre: miNombre,
            origen: document.getElementById("origin").value,
            destino: document.getElementById("destination").value,
            km: document.getElementById("distanciaText").innerText,
            precioApp: document.getElementById("priceMaps").innerText,
            ofertaActual: parseFloat(document.getElementById("oferta-cliente").value),
            ofertaDe: "cliente",
            detalles: {
                personas: document.getElementById("p-adultos").value,
                bebes: document.getElementById("p-bebes").value,
                mascotas: document.getElementById("p-mascotas").value,
                carga: document.getElementById("p-carga").value,
                notas: document.getElementById("p-notas").value
            },
            estado: "buscando",
            timestamp: serverTimestamp()
        };
        await addDoc(collection(db, "viajes"), viaje);
        alert("Oferta enviada. Los conductores cercanos la están revisando.");
    };

    function escucharViajesDriver() {
        onSnapshot(collection(db, "viajes"), (snap) => {
            const container = document.getElementById("lista-viajes-global");
            container.innerHTML = "";
            snap.forEach(docSnap => {
                const v = docSnap.data();
                if(v.estado === "buscando" || (v.estado === "negociando" && v.driverId === miUid)) {
                    const card = document.createElement("div");
                    card.className = "card";
                    card.innerHTML = `
                        <p><b>Origen:</b> ${v.origen}</p>
                        <p><b>Destino:</b> ${v.destino}</p>
                        <p><b>Distancia:</b> ${v.km} | <b>Oferta:</b> <span style="color:green; font-weight:bold;">$${v.ofertaActual}</span></p>
                        <button class="btn-action" onclick="abrirNegociacion('${docSnap.id}')">REVISAR OFERTA</button>
                    `;
                    container.appendChild(card);
                }
            });
        });
    }

    window.abrirNegociacion = async (id) => {
        const docRef = doc(db, "viajes", id);
        const v = (await getDoc(docRef)).data();
        const modal = document.getElementById("modal-negociacion");
        const body = document.getElementById("modal-content-body");

        body.innerHTML = `
            <h3 style="margin-top:0">Detalles de Solicitud</h3>
            <p><b>A:</b> ${v.origen}</p>
            <p><b>B:</b> ${v.destino}</p>
            <p><b>Carga:</b> ${v.detalles.carga}kg | <b>Pers:</b> ${v.detalles.personas} | <b>Mascotas:</b> ${v.detalles.mascotas}</p>
            <p><b>Notas:</b> ${v.detalles.notas || 'Ninguna'}</p>
            <hr>
            <h2 style="text-align:center; color:var(--primary)">Oferta: $${v.ofertaActual}</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn-action" onclick="responderViaje('${id}', 'aceptar')">ACEPTAR</button>
                <button class="btn-action" style="background:#444" onclick="contraOferta('${id}')">CONTRAOFERTAR</button>
                <button class="btn-action" style="background:red; grid-column: span 2;" onclick="cerrarModal()">RECHAZAR / CERRAR</button>
            </div>
        `;
        modal.style.display = "flex";
    };

    window.responderViaje = async (id, accion, valor = null) => {
        const docRef = doc(db, "viajes", id);
        if(accion === 'aceptar') {
            await updateDoc(docRef, { estado: 'aceptado', driverId: miUid, driverNombre: miNombre });
            cerrarModal();
            abrirChat(id);
        } else if (accion === 'contraoferta') {
            await updateDoc(docRef, { ofertaActual: valor, ofertaDe: 'driver', driverId: miUid, estado: 'negociando' });
            cerrarModal();
        }
    };

    window.contraOferta = (id) => {
        const monto = prompt("¿Cuál es tu nueva propuesta de costo ($)?");
        if(monto && !isNaN(monto)) responderViaje(id, 'contraoferta', parseFloat(monto));
    };

    // --- CHAT ---
    function abrirChat(id) {
        const old = document.getElementById('chat-active'); if(old) old.remove();
        const chatUI = document.createElement("div");
        chatUI.className = "card"; chatUI.id = "chat-active";
        chatUI.innerHTML = `
            <div style="background:orange; padding:8px; border-radius:10px; margin-bottom:10px; font-size:11px; color:black; text-align:center;">
                ⚠️ NO CERRAR HASTA FINALIZAR EL VIAJE
            </div>
            <div id="chat-box" style="height:200px; overflow-y:auto; background:#eee; padding:10px; border-radius:10px; margin-bottom:10px;"></div>
            <div style="display:flex; gap:5px;">
                <input id="chat-input" placeholder="Mensaje...">
                <button onclick="enviarMensaje('${id}')" style="width:80px; background:var(--primary); border:none; border-radius:10px; color:white;">OK</button>
            </div>
            <button class="btn-action" style="background:red; margin-top:10px;" onclick="finalizarViaje('${id}')">FINALIZAR VIAJE</button>
        `;
        document.querySelector(".container").prepend(chatUI);

        onSnapshot(query(collection(db, "viajes", id, "mensajes"), orderBy("timestamp", "asc")), (snap) => {
            const box = document.getElementById("chat-box"); if(!box) return;
            box.innerHTML = "";
            snap.forEach(m => {
                const d = m.data();
                box.innerHTML += `<div style="margin-bottom:5px; font-size:13px;"><b>${d.user}:</b> ${d.msg}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.enviarMensaje = async (id) => {
        const inp = document.getElementById("chat-input");
        if(!inp.value) return;
        await addDoc(collection(db, "viajes", id, "mensajes"), { user: miNombre, msg: inp.value, timestamp: serverTimestamp() });
        inp.value = "";
    };

    window.finalizarViaje = async (id) => {
        const docRef = doc(db, "viajes", id);
        const v = (await getDoc(docRef)).data();
        await updateDoc(docRef, { 
            estado: 'finalizado', 
            fechaFinalizado: new Date().toISOString().split('T')[0],
            montoFinal: v.ofertaActual 
        });
        alert("Viaje finalizado exitosamente.");
        location.reload();
    };

    // --- PANEL ADMIN Y ESTADÍSTICAS ---
    async function mostrarEstadisticasDriver() {
        const hoy = new Date();
        const ultimos5 = [];
        for(let i=0; i<5; i++) {
            let d = new Date(); d.setDate(hoy.getDate() - i);
            ultimos5.push(d.toISOString().split('T')[0]);
        }

        const q = query(collection(db, "viajes"), where("driverId", "==", miUid), where("estado", "==", "finalizado"));
        const snap = await getDocs(q);
        let totales = {}; ultimos5.forEach(d => totales[d] = 0);

        snap.forEach(doc => {
            const data = doc.data();
            if (totales[data.fechaFinalizado] !== undefined) totales[data.fechaFinalizado] += data.montoFinal;
        });

        let html = `<table><tr><th>Fecha</th><th>Ingreso</th><th>Comisión (8%)</th></tr>`;
        ultimos5.forEach(d => {
            html += `<tr><td>${d}</td><td>$${totales[d].toFixed(2)}</td><td>$${(totales[d]*0.08).toFixed(2)}</td></tr>`;
        });
        document.getElementById("driver-stats").innerHTML = html + `</table>`;
    }

    async function initAdmin() {
        const snap = await getDocs(collection(db, "usuarios"));
        const container = document.getElementById("admin-users-list");
        container.innerHTML = "<h4>Gestión de Usuarios y Drivers</h4>";
        
        // Reporte para admin: últimos 5 días de todos
        const hoy = new Date();
        const viajesSnap = await getDocs(query(collection(db, "viajes"), where("estado", "==", "finalizado")));
        
        snap.forEach(uDoc => {
            const u = uDoc.data();
            if(u.email === "robs2002004@gmail.com") return;

            let viajesCont = 0;
            viajesSnap.forEach(v => { if(v.data().driverId === u.uid) viajesCont++; });

            const div = document.createElement("div");
            div.style.border = "1px solid #ddd"; div.style.padding = "10px"; div.style.marginBottom = "5px"; div.style.borderRadius = "10px";
            div.innerHTML = `
                <p style="margin:2px"><b>${u.nombre}</b> (${u.rol})</p>
                <p style="margin:2px; font-size:11px;">${u.email} | Viajes Totales: ${viajesCont}</p>
                <p style="margin:2px; font-size:11px;">Estado: ${u.activo ? '✅ ACTIVO' : '❌ DESACTIVADO'}</p>
                <button onclick="toggleUser('${uDoc.id}', ${u.activo})" style="font-size:10px;">Cambiar Estado</button>
            `;
            container.appendChild(div);
        });
    }

    window.toggleUser = async (id, actual) => {
        await updateDoc(doc(db, "usuarios", id), { activo: !actual });
        initAdmin();
    };

    // --- MONITOR DE POSICIÓN ---
    function iniciarRastreo(driverId) {
        if(navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                updateDoc(doc(db, "usuarios", driverId), {
                    lastLocation: { lat: pos.coords.latitude, lng: pos.coords.longitude },
                    lastUpdate: serverTimestamp()
                });
            }, null, { enableHighAccuracy: true });
        }
    }

    // --- OBSERVAR ESTADO DE AUTH ---
    onAuthStateChanged(auth, async (u) => {
        if(u) {
            miUid = u.uid;
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('btn-logout').style.display = 'block';

            if(u.email === "robs2002004@gmail.com") {
                document.getElementById('admin-view').classList.add('active-section');
                initAdmin();
            } else {
                const q = query(collection(db, "usuarios"), where("uid", "==", u.uid));
                const s = await getDocs(q);
                s.forEach(d => {
                    const user = d.data();
                    if(!user.activo) { alert("Tu cuenta ha sido desactivada."); cerrarSesion(); return; }
                    miRol = user.rol; miNombre = user.nombre;
                    if(miRol === 'cliente') {
                        document.getElementById('cliente-view').classList.add('active-section');
                        initLeaflet();
                        // Escuchar si alguien acepta su oferta
                        onSnapshot(query(collection(db, "viajes"), where("clienteId", "==", miUid)), snap => {
                            snap.forEach(dv => {
                                if(dv.data().estado === 'aceptado' && !document.getElementById('chat-active')) abrirChat(dv.id);
                                if(dv.data().estado === 'negociando' && dv.data().ofertaDe === 'driver') abrirNegociacion(dv.id);
                            });
                        });
                    } else {
                        document.getElementById('driver-view').classList.add('active-section');
                        mostrarEstadisticasDriver();
                        escucharViajesDriver();
                        iniciarRastreo(d.id);
                    }
                });
            }
        }
    });

    window.cerrarSesion = () => signOut(auth).then(() => location.reload());
    window.cerrarModal = () => document.getElementById("modal-negociacion").style.display = "none";

    async function cargarPaises() {
        const sel = document.getElementById('reg-prefijo');
        try {
            const res = await fetch('https://restcountries.com/v3.1/all?fields=idd,cca2');
            const data = await res.json();
            data.sort((a,b) => a.cca2.localeCompare(b.cca2)).forEach(c => {
                const code = c.idd.root + (c.idd.suffixes ? c.idd.suffixes[0] : "");
                if(code) sel.add(new Option(`${c.cca2} (${code})`, code));
            });
        } catch(e) { sel.add(new Option("+503", "+503")); }
    }
    cargarPaises();

    window.buscarDireccion = async (input, targetId) => {
        if (input.value.length < 4) return;
        const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(input.value)}&limit=5`);
        const data = await res.json();
        let h = "";
        data.features.forEach(f => {
            const lbl = `${f.properties.name || ''}, ${f.properties.city || ''}`;
            h += `<div class="suggestion-item" onclick="seleccionarPos('${input.id}','${lbl}',${f.geometry.coordinates[1]},${f.geometry.coordinates[0]},'${targetId}')">${lbl}</div>`;
        });
        document.getElementById(targetId).innerHTML = h;
    };

    window.seleccionarPos = (inputId, lbl, lat, lon, targetId) => {
        document.getElementById(inputId).value = lbl;
        document.getElementById(targetId).innerHTML = "";
        const c = [lat, lon];
        if (inputId === 'origin') { coordsOrigen = c; markerOrigen.setLatLng(c); }
        else { coordsDestino = c; markerDestino.setLatLng(c); }
        lMap.flyTo(c, 14);
    };
</script>
