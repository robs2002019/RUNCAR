<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNCAR - Login y Movilidad</title>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAdjJpRHTqVdIQy_gOP8xE4v4akueFORNs&libraries=places,geometry"></script>

    <style>
        :root { --primary: #2ecc71; --secondary: #1a1a1a; --accent: #f1c40f; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--secondary); color: white; padding-bottom: 50px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        header { text-align: center; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 0 0 25px 25px; border-bottom: 2px solid var(--primary); margin-bottom: 20px; }
        
        /* Pantallas de Acceso */
        #auth-container { display: block; }
        #app-container { display: none; } /* Se activa al loguearse */

        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .nav-btn { padding: 12px 20px; border: none; border-radius: 12px; background: rgba(255,255,255,0.1); color: white; font-weight: bold; cursor: pointer; }
        .nav-btn.active { background: var(--primary); }

        #map { width: 100%; height: 250px; border-radius: 20px; margin-bottom: 15px; border: 2px solid var(--primary); background: #222; }
        .card { background: var(--white); color: #333; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 20px; }
        
        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        .section { display: none; }
        .active-section { display: block; }
        #admin-modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; overflow-y:auto; padding:20px; display:none; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; letter-spacing: 2px;">RUN <span style="color:var(--primary)">CAR</span></h2>
</header>

<div class="container">

    <div id="auth-container">
        <div class="nav-bar">
            <button class="nav-btn active" onclick="showTabAuth('tab-login', this)">Entrar</button>
            <button class="nav-btn" onclick="showTabAuth('tab-registro', this)">Registrarse</button>
        </div>

        <div id="tab-login" class="section active-section">
            <div class="card">
                <h4>Iniciar Sesión</h4>
                <input type="email" id="login-email" placeholder="Correo">
                <input type="password" id="login-pass" placeholder="Contraseña">
                <button class="btn-action" onclick="iniciarSesion()">INGRESAR</button>
            </div>
        </div>

        <div id="tab-registro" class="section">
            <div class="card">
                <h4>Crear Cuenta</h4>
                <select id="reg-tipo" onchange="toggleRegFields()">
                    <option value="cliente">Soy Cliente</option>
                    <option value="driver">Quiero ser Conductor</option>
                </select>
                <input type="text" id="reg-nombre" placeholder="Nombre Completo">
                <input type="email" id="reg-email" placeholder="Correo Electrónico">
                <input type="password" id="reg-pass" placeholder="Contraseña (Mín. 6 caracteres)">
                <input type="tel" id="reg-telefono" placeholder="Teléfono">
                <label style="font-size:11px;">Foto de Perfil:</label>
                <input type="file" id="reg-foto" accept="image/*">

                <div id="driver-docs" style="display:none; background:#f0f0f0; padding:10px; border-radius:10px;">
                    <p style="font-size:11px; font-weight:bold;">DATOS DEL AUTO:</p>
                    <input type="text" id="marca" placeholder="Marca (Ej: Toyota)">
                    <input type="text" id="modelo" placeholder="Modelo">
                    <input type="number" id="anio" placeholder="Año (Mín. 2014)" min="2014">
                </div>
                <button class="btn-action" id="btn-reg" onclick="procesarRegistro()">FINALIZAR REGISTRO</button>
            </div>
        </div>
    </div>

    <div id="app-container">
        <div id="map"></div>
        <div class="card">
            <h4>Solicitar Transporte</h4>
            <div style="display:flex; gap:5px;">
                <input id="origin" placeholder="📍 Origen">
                <button onclick="obtenerGPS()" style="background:var(--primary); border:none; border-radius:10px; color:white; padding:0 15px;">📍</button>
            </div>
            <input id="destination" placeholder="🏁 Destino">
            <div id="info-recorrido" style="display:none; text-align:center; padding:10px;">
                <small>DISTANCIA: <b id="distText">0 km</b></small><br>
                <b style="font-size: 24px;" id="priceText">$0.00</b>
                <button class="btn-action" onclick="alert('Buscando conductor...')">PEDIR AHORA</button>
            </div>
            <button id="btn-calc" class="btn-action" style="background:#444;" onclick="calculateRoute()">CALCULAR COSTO</button>
        </div>
        <button class="btn-action" style="background:#c0392b;" onclick="cerrarSesion()">CERRAR SESIÓN</button>
    </div>

</div>

<div id="admin-modal">
    <button onclick="cerrarAdmin()" style="float:right; padding:10px; color:white;">CERRAR</button>
    <h2 style="color:var(--primary)">ADMINISTRACIÓN</h2>
    <div id="admin-content"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-storage.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAyRrBUmw4OEzS7EmvK_XmDk6Z5rrjLC3A",
        authDomain: "runcar-6eda0.firebaseapp.com",
        projectId: "runcar-6eda0",
        storageBucket: "runcar-6eda0.firebasestorage.app",
        messagingSenderId: "152627344672",
        appId: "1:152627344672:web:b420d1c8cbb670069b9345"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const auth = getAuth(app);

    // --- MANEJO DE SESIÓN ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("auth-container").style.display = "none";
            document.getElementById("app-container").style.display = "block";
            initMap();
        } else {
            document.getElementById("auth-container").style.display = "block";
            document.getElementById("app-container").style.display = "none";
        }
    });

    window.iniciarSesion = async () => {
        const email = document.getElementById("login-email").value;
        const pass = document.getElementById("login-pass").value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch(e) { alert("Error: Correo o contraseña incorrectos"); }
    };

    window.cerrarSesion = () => signOut(auth);

    // --- REGISTRO ---
    window.procesarRegistro = async () => {
        const btn = document.getElementById("btn-reg");
        const email = document.getElementById("reg-email").value;
        const pass = document.getElementById("reg-pass").value;
        const nombre = document.getElementById("reg-nombre").value;
        const foto = document.getElementById("reg-foto").files[0];

        if(!email || !pass || !foto) return alert("Faltan datos críticos");

        btn.disabled = true; btn.innerText = "Creando cuenta...";
        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, pass);
            const user = userCred.user;
            
            const snap = await uploadBytes(ref(storage, `perfiles/${user.uid}`), foto);
            const url = await getDownloadURL(snap.ref);

            let data = {
                uid: user.uid, nombre, email, rol: document.getElementById("reg-tipo").value,
                fotoPerfil: url, telefono: document.getElementById("reg-telefono").value,
                fecha: new Date(), estado: "pendiente"
            };

            if(data.rol === 'driver') {
                data.vehiculo = {
                    marca: document.getElementById("marca").value,
                    modelo: document.getElementById("modelo").value,
                    anio: document.getElementById("anio").value
                };
            }

            await addDoc(collection(db, "usuarios"), data);
            alert("¡Registro exitoso!");
        } catch(e) { alert("Error: " + e.message); btn.disabled = false; }
    };

    // --- MAPA Y RUTAS ---
    let map, directionsService, directionsRenderer;
    window.initMap = () => {
        map = new google.maps.Map(document.getElementById("map"), {
            center: { lat: 13.6893, lng: -89.1871 }, zoom: 13
        });
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({ map });
        new google.maps.places.Autocomplete(document.getElementById("origin"));
        new google.maps.places.Autocomplete(document.getElementById("destination"));
    };

    window.calculateRoute = () => {
        const start = document.getElementById("origin").value;
        const end = document.getElementById("destination").value;
        directionsService.route({ origin: start, destination: end, travelMode: 'DRIVING' }, (res, status) => {
            if (status === 'OK') {
                directionsRenderer.setDirections(res);
                const km = res.routes[0].legs[0].distance.value / 1000;
                const price = Math.ceil(km) <= 3 ? Math.ceil(km) : 3 + (km - 3) * 0.3;
                document.getElementById("distText").innerText = km.toFixed(1) + " km";
                document.getElementById("priceText").innerText = "$" + price.toFixed(2);
                document.getElementById("info-recorrido").style.display = "block";
                document.getElementById("btn-calc").style.display = "none";
            }
        });
    };

    // --- UTILIDADES ---
    window.showTabAuth = (id, btn) => {
        document.querySelectorAll('#auth-container .section').forEach(s => s.classList.remove('active-section'));
        document.getElementById(id).classList.add('active-section');
        document.querySelectorAll('#auth-container .nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    };
    window.obtenerGPS = () => navigator.geolocation.getCurrentPosition(p => { 
        document.getElementById("origin").value = `${p.coords.latitude},${p.coords.longitude}`; 
    });
    window.toggleRegFields = () => document.getElementById("driver-docs").style.display = document.getElementById("reg-tipo").value === 'driver' ? 'block' : 'none';
    window.cerrarAdmin = () => document.getElementById("admin-modal").style.display = "none";
    window.addEventListener('keydown', (e) => { if(e.key === 'w') document.getElementById("admin-modal").style.display = "block"; });
</script>
</body>
</html>
