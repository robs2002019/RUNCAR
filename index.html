<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN CAR PRO - GPS & Cargo</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@2.0.0-alpha.1/dist/leaflet.css" />

    <script type="importmap">
    {
        "imports": {
            "leaflet": "https://unpkg.com/leaflet@2.0.0-alpha.1/dist/leaflet.js"
        }
    }
    </script>
    
    <style>
        :root { --primary: #2ecc71; --secondary: #1a1a1a; --accent: #f1c40f; --white: #ffffff; --danger: #e74c3c; --chat-bg: #e5ddd5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--secondary); color: white; padding-bottom: 50px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        header { text-align: center; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 0 0 25px 25px; border-bottom: 2px solid var(--primary); margin-bottom: 20px; }
        .card { background: var(--white); color: #333; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 15px; position: relative; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        
        #map { width: 100%; height: 250px; border-radius: 20px; margin-bottom: 15px; border: 2px solid var(--primary); background: #222; }
        .section { display: none; }
        .active-section { display: block; }

        /* Grid de pasajeros */
        .cargo-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin: 10px 0; }
        .cargo-item { text-align: center; font-size: 12px; }
        .cargo-item input { text-align: center; padding: 8px; }

        .oferta-card { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--primary); color: #333; }
        .oferta-header { font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .ruta-info { font-size: 13px; margin: 5px 0; }
        
        .chat-box { height: 250px; background: var(--chat-bg); overflow-y: auto; padding: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; font-size: 13px; color: black; }
        .msg.mio { align-self: flex-end; background: #dcf8c6; }
        .msg.otro { align-self: flex-start; background: white; }
        
        .suggestions { background: white; color: black; position: absolute; width: 100%; z-index: 1000; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); max-height: 150px; overflow-y: auto; }
        .suggestion-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; letter-spacing: 2px;">RUN <span style="color:var(--primary)">CAR</span></h2>
</header>

<div class="container">
    <div id="auth-container" class="section active-section">
        <div class="card">
            <h3 style="text-align:center; margin-top:0;">Bienvenido</h3>
            <input type="email" id="auth-email" placeholder="Correo">
            <input type="password" id="auth-pass" placeholder="Contraseña">
            <div id="reg-fields" style="display:none;">
                <input type="text" id="reg-nombre" placeholder="Nombre Completo">
                <div class="phone-container">
                    <select id="reg-pais-code">
                        <option value="">Cargando países...</option>
                    </select>
                    <input type="tel" id="reg-tel" placeholder="WhatsApp / Celular">
                </div>
                <select id="reg-rol">
                    <option value="cliente">Soy Cliente</option>
                    <option value="driver">Soy Conductor</option>
                </select>
            </div>
            <button class="btn-action" onclick="ejecutarAuth()" id="btn-auth-main">INGRESAR</button>
            <p onclick="switchAuth()" style="text-align:center; cursor:pointer; color:#666;">¿No tienes cuenta? Regístrate</p>
        </div>
    </div>

    <div id="cliente-view" class="section">
        <div id="map"></div>
        <button class="btn-action" style="background:#3498db; margin-bottom:10px;" onclick="obtenerGps()">Usar mi ubicación actual 📍</button>
        
        <div class="card">
            <div style="position:relative;">
                <input id="origin" placeholder="📍 Punto de inicio" oninput="buscarDireccion(this, 'sug-origin')">
                <div id="sug-origin" class="suggestions"></div>
            </div>
            <div style="position:relative;">
                <input id="destination" placeholder="🏁 ¿A dónde vas?" oninput="buscarDireccion(this, 'sug-dest')">
                <div id="sug-dest" class="suggestions"></div>
            </div>

            <div class="cargo-grid">
                <div class="cargo-item">Pers.<input type="number" id="p-cant" value="1" min="1"></div>
                <div class="cargo-item">Masc.<input type="number" id="p-masc" value="0" min="0"></div>
                <div class="cargo-item">Bebés<input type="number" id="p-bebe" value="0" min="0"></div>
            </div>

            <div id="precio-area" style="display:none; text-align:center; border-top: 1px solid #eee; padding-top: 10px;">
                <p style="margin:5px 0;">Sugerencia App: <b id="priceMaps">$0.00</b></p>
                <small>Tu oferta:</small>
                <input type="number" id="oferta-cliente" style="font-size:22px; text-align:center; color:var(--primary); font-weight:bold;">
                <button class="btn-action" onclick="publicarViaje()">SOLICITAR AHORA</button>
            </div>
            
            <button id="btn-calc" class="btn-action" style="background:#444;" onclick="calcularRutaOSRM()">VER PRECIO Y CARGA</button>

            <div id="chat-area-cliente" style="display:none; margin-top:20px;">
                <div id="chat-box-cliente" class="chat-box"></div>
                <div style="display:flex; gap:5px;">
                    <input id="input-msg-cliente" placeholder="Escribe al conductor...">
                    <button onclick="enviarMensaje('cliente')" style="background:var(--primary); border:none; padding:10px; border-radius:10px; color:white;">➤</button>
                </div>
            </div>
        </div>
    </div>

    <div id="driver-view" class="section">
        <h4 style="color:var(--primary); margin-left:10px;">Viajes en tu zona</h4>
        <div id="lista-viajes-global"></div>

        <div id="chat-container-driver" class="card" style="display:none;">
            <h4 style="margin:0 0 10px 0;">Chat con el Cliente</h4>
            <div id="chat-box-driver" class="chat-box"></div>
            <div style="display:flex; gap:5px;">
                <input id="input-msg-driver" placeholder="Responder...">
                <button onclick="enviarMensaje('driver')" style="background:var(--primary); border:none; padding:10px; border-radius:10px; color:white;">➤</button>
            </div>
            <button class="btn-action" style="background:var(--accent); color:black; margin-top:15px;" onclick="finalizarViaje()">FINALIZAR VIAJE</button>
        </div>
    </div>

    <button id="btn-logout" class="btn-action" style="display:none; background:var(--danger); margin-top:20px;" onclick="cerrarSesion()">CERRAR SESIÓN</button>
</div>

<script type="module">
    import L from 'leaflet';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot, serverTimestamp, doc, updateDoc, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAyRrBUmw4OEzS7EmvK_XmDk6Z5rrjLC3A",
        authDomain: "runcar-6eda0.firebaseapp.com",
        projectId: "runcar-6eda0",
        storageBucket: "runcar-6eda0.firebasestorage.app",
        messagingSenderId: "152627344672",
        appId: "1:152627344672:web:b420d1c8cbb670069b9345"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let lMap, markerOrigen, markerDestino, polylineRuta;
    let coordsOrigen = null, coordsDestino = null;
    let miRol = "", miUid = "", miNombre = "", viajeActivoId = null;

    // --- MAPA Y GPS ---
    window.initLeaflet = () => {
        if (lMap) return;
        lMap = L.map('map').setView([13.7, -89.2], 12);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(lMap);
    };

    window.obtenerGps = () => {
        if (!navigator.geolocation) return alert("GPS no soportado");
        navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            coordsOrigen = [lat, lon];
            document.getElementById('origin').value = "Mi ubicación actual";
            if(markerOrigen) lMap.removeLayer(markerOrigen);
            markerOrigen = L.marker(coordsOrigen).addTo(lMap);
            lMap.flyTo(coordsOrigen, 16);
        });
    };

    window.buscarDireccion = async (input, targetId) => {
        const box = document.getElementById(targetId);
        if (input.value.length < 3) { box.innerHTML = ""; return; }
        const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(input.value)}&limit=5`);
        const data = await res.json();
        let h = "";
        data.features.forEach(f => {
            const lbl = `${f.properties.name || ''} ${f.properties.city || ''}`;
            h += `<div class="suggestion-item" onclick="seleccionarPos('${input.id}','${lbl}',${f.geometry.coordinates[1]},${f.geometry.coordinates[0]},'${targetId}')">${lbl}</div>`;
        });
        box.innerHTML = h;
    };

    window.seleccionarPos = (inputId, lbl, lat, lon, targetId) => {
        document.getElementById(inputId).value = lbl;
        document.getElementById(targetId).innerHTML = "";
        const c = [lat, lon];
        if (inputId === 'origin') {
            coordsOrigen = c;
            if (markerOrigen) lMap.removeLayer(markerOrigen);
            markerOrigen = L.marker(c).addTo(lMap);
        } else {
            coordsDestino = c;
            if (markerDestino) lMap.removeLayer(markerDestino);
            markerDestino = L.marker(c).addTo(lMap);
        }
        lMap.flyTo(c, 15);
    };

    window.calcularRutaOSRM = async () => {
        if (!coordsOrigen || !coordsDestino) return alert("Define origen y destino");
        const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coordsOrigen[1]},${coordsOrigen[0]};${coordsDestino[1]},${coordsDestino[0]}?overview=full&geometries=geojson`);
        const data = await res.json();
        if (data.code === 'Ok') {
            const r = data.routes[0];
            const km = r.distance / 1000;
            let p = km <= 3 ? 3.00 : 3 + (km-3)*0.35;
            if (polylineRuta) lMap.removeLayer(polylineRuta);
            polylineRuta = L.geoJSON(r.geometry, {style:{color:'#2ecc71', weight:6}}).addTo(lMap);
            lMap.fitBounds(polylineRuta.getBounds());
            document.getElementById("priceMaps").innerText = "$" + p.toFixed(2);
            document.getElementById("oferta-cliente").value = p.toFixed(2);
            document.getElementById("precio-area").style.display = 'block';
            document.getElementById("btn-calc").style.display = 'none';
        }
    };

    // --- SOLICITUD DE VIAJE ---
    window.publicarViaje = async () => {
        const payload = {
            clienteId: miUid,
            clienteNombre: miNombre,
            origen: document.getElementById("origin").value,
            destino: document.getElementById("destination").value,
            pasajeros: document.getElementById("p-cant").value,
            mascotas: document.getElementById("p-masc").value,
            bebes: document.getElementById("p-bebe").value,
            precioApp: parseFloat(document.getElementById("priceMaps").innerText.replace("$","")),
            ofertaCliente: parseFloat(document.getElementById("oferta-cliente").value),
            estado: "buscando",
            timestamp: serverTimestamp()
        };
        const docRef = await addDoc(collection(db, "viajes"), payload);
        viajeActivoId = docRef.id;
        escucharViajeCliente(docRef.id);
        alert("Buscando conductores...");
    };

    function escucharViajeCliente(id) {
        onSnapshot(doc(db, "viajes", id), (snap) => {
            const v = snap.data();
            if (v.estado === "aceptado") {
                document.getElementById("chat-area-cliente").style.display = "block";
                conectarChat(id, 'cliente');
            }
            if (v.estado === "finalizado") location.reload();
        });
    }

    // --- VISTA CONDUCTOR - LISTA DE OFERTAS ---
    function cargarViajesDisponibles() {
        onSnapshot(query(collection(db, "viajes"), where("estado", "==", "buscando")), (snap) => {
            let h = "";
            snap.forEach(d => {
                const v = d.data();
                h += `
                <div class="oferta-card">
                    <div class="oferta-header">
                        <span>👤 ${v.clienteNombre}</span>
                        <span style="color:var(--primary)">$${v.ofertaCliente}</span>
                    </div>
                    <div class="ruta-info">📍 <b>De:</b> ${v.origen}</div>
                    <div class="ruta-info">🏁 <b>A:</b> ${v.destino}</div>
                    <div class="ruta-info">👥 ${v.pasajeros} Pers. | 🐾 ${v.mascotas} Masc. | 👶 ${v.bebes} Bebé</div>
                    <div style="font-size:11px; margin-top:5px; color:#888;">Tarifa App: $${v.precioApp}</div>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button class="btn-action" style="padding:10px;" onclick="aceptarViaje('${d.id}')">ACEPTAR VIAJE</button>
                    </div>
                </div>`;
            });
            document.getElementById("lista-viajes-global").innerHTML = h || "<p style='text-align:center; color:#888;'>Esperando solicitudes...</p>";
        });
    }

    window.aceptarViaje = async (id) => {
        await updateDoc(doc(db, "viajes", id), {
            estado: "aceptado",
            driverId: miUid,
            driverNombre: miNombre
        });
        viajeActivoId = id;
        document.getElementById("lista-viajes-global").style.display = "none";
        document.getElementById("chat-container-driver").style.display = "block";
        conectarChat(id, 'driver');
    };

    // --- CHAT Y FINALIZACIÓN ---
    function conectarChat(viajeId, rol) {
        const q = query(collection(db, "mensajes"), where("viajeId", "==", viajeId), orderBy("time", "asc"));
        onSnapshot(q, (snap) => {
            let h = "";
            snap.forEach(m => {
                const data = m.data();
                h += `<div class="msg ${data.emisorId === miUid ? 'mio' : 'otro'}">${data.texto}</div>`;
            });
            const box = document.getElementById(rol === 'cliente' ? 'chat-box-cliente' : 'chat-box-driver');
            box.innerHTML = h;
            box.scrollTop = box.scrollHeight;
        });
    }

    window.enviarMensaje = async (rol) => {
        const inp = document.getElementById(rol === 'cliente' ? 'input-msg-cliente' : 'input-msg-driver');
        if (!inp.value) return;
        await addDoc(collection(db, "mensajes"), {
            viajeId: viajeActivoId,
            emisorId: miUid,
            texto: inp.value,
            time: serverTimestamp()
        });
        inp.value = "";
    };

    window.finalizarViaje = async () => {
        if (confirm("¿Confirmas que el viaje ha terminado y recibiste el pago?")) {
            await updateDoc(doc(db, "viajes", viajeActivoId), { estado: "finalizado" });
            location.reload();
        }
    };

    // --- AUTH ---
    window.switchAuth = () => {
        const isReg = document.getElementById('reg-fields').style.display === 'none';
        document.getElementById('reg-fields').style.display = isReg ? 'block' : 'none';
        document.getElementById('btn-auth-main').innerText = isReg ? 'REGISTRAR' : 'INGRESAR';
    };

    window.ejecutarAuth = async () => {
        const mail = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        const isReg = document.getElementById('reg-fields').style.display === 'block';
        try {
            if(isReg) {
                const uc = await createUserWithEmailAndPassword(auth, mail, pass);
                await addDoc(collection(db, "usuarios"), {
                    uid: uc.user.uid,
                    rol: document.getElementById('reg-rol').value,
                    nombre: document.getElementById('reg-nombre').value
                });
            } else { await signInWithEmailAndPassword(auth, mail, pass); }
        } catch (e) { alert(e.message); }
    };

    onAuthStateChanged(auth, async (u) => {
        if(u) {
            miUid = u.uid;
            const s = await getDocs(query(collection(db, "usuarios"), where("uid", "==", u.uid)));
            s.forEach(d => {
                miRol = d.data().rol; miNombre = d.data().nombre;
                document.getElementById('auth-container').style.display='none';
                document.getElementById('btn-logout').style.display='block';
                if(miRol === 'cliente') {
                    document.getElementById('cliente-view').classList.add('active-section');
                    initLeaflet();
                } else {
                    document.getElementById('driver-view').classList.add('active-section');
                    cargarViajesDisponibles();
                }
            });
        }
    });

    window.cerrarSesion = () => signOut(auth).then(()=>location.reload());
</script>
</body>
</html>
