<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNCAR PRO - Negociación en Vivo</title>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDj2kkjVmMqJSWN4OVbue2jPOidhGO2GOU&libraries=places,geometry"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --primary: #2ecc71; --secondary: #1a1a1a; --accent: #f1c40f; --white: #ffffff; --danger: #e74c3c; --gray: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--secondary); color: white; padding-bottom: 50px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        header { text-align: center; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 0 0 25px 25px; border-bottom: 2px solid var(--primary); margin-bottom: 20px; position: relative; }
        
        .card { background: var(--white); color: #333; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 15px; position: relative; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .btn-danger { background: var(--danger); }
        .btn-secondary { background: #444; }
        .btn-small { padding: 8px; font-size: 12px; width: auto; min-width: 80px; }
        
        #map { width: 100%; height: 250px; border-radius: 20px; margin-bottom: 15px; border: 2px solid var(--primary); }
        .section { display: none; }
        .active-section { display: block; }

        /* Estilos Chat */
        .chat-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; color: #333; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .chat-img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        .placa-badge { background: #000; color: #fff; padding: 2px 8px; border-radius: 4px; font-family: monospace; font-weight: bold; }
        #mensajes-box { height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 10px; background: #eee; border-radius: 10px; }
        .msg-mio { background: var(--primary); color: white; align-self: flex-end; padding: 10px; border-radius: 15px 15px 0 15px; max-width: 80%; }
        .msg-otro { background: #fff; color: #333; align-self: flex-start; padding: 10px; border-radius: 15px 15px 15px 0; max-width: 80%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Negociación */
        .oferta-card { border-left: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .oferta-info b { font-size: 1.2em; color: var(--primary); }
    </style>
</head>
<body>

<header>
    <button id="btn-admin" style="position: absolute; right: 15px; top: 25px; display: none; background: var(--accent); border:none; padding:5px 10px; border-radius:5px; font-weight:bold;" onclick="mostrarAdmin()">ADMIN</button>
    <h2 style="margin:0; letter-spacing: 2px;">RUN <span style="color:var(--primary)">CAR</span></h2>
</header>

<div class="container">
    <!-- AUTH SECTION -->
    <div id="auth-container" class="section active-section">
        <div class="card">
            <h3 style="text-align:center; margin-top:0;">Acceso RUNCAR</h3>
            <input type="email" id="auth-email" placeholder="Correo Electrónico">
            <input type="password" id="auth-pass" placeholder="Contraseña">
            
            <div id="reg-fields" style="display:none;">
                <input type="text" id="reg-nombre" placeholder="Nombre Completo">
                <select id="reg-prefijo"></select>
                <input type="tel" id="reg-tel" placeholder="Número WhatsApp">
                <select id="reg-rol" onchange="toggleRegDriver()">
                    <option value="cliente">Soy Cliente</option>
                    <option value="driver">Soy Conductor</option>
                </select>
                <input type="file" id="file-rostro" accept="image/*">
                <div id="campos-driver" style="display:none;">
                    <input type="text" id="reg-placa" placeholder="Número de Placa">
                </div>
            </div>

            <button class="btn-action" onclick="ejecutarAuth()" id="btn-auth-main">INGRESAR</button>
            <p onclick="switchAuth()" style="text-align:center; cursor:pointer; color:#666;">¿No tienes cuenta? Regístrate</p>
        </div>
    </div>

    <!-- VISTA CLIENTE -->
    <div id="cliente-view" class="section">
        <div id="map"></div>
        <div class="card">
            <input id="origin" placeholder="📍 Origen">
            <input id="destination" placeholder="🏁 Destino">
            <div id="precio-area" style="display:none;">
                <p style="text-align:center;">Tarifa Sugerida: <b id="priceMaps">$0.00</b></p>
                <input type="number" id="oferta-cliente" placeholder="Tu oferta $">
                <button class="btn-action" onclick="publicarViaje()">SOLICITAR VIAJE</button>
            </div>
            <button id="btn-calc" class="btn-action btn-secondary" onclick="calcularRuta()">CALCULAR RUTA</button>
        </div>
        <h4 style="margin-left:10px; color: var(--primary);">Ofertas de Conductores:</h4>
        <div id="lista-ofertas"></div>
    </div>

    <!-- VISTA CONDUCTOR -->
    <div id="driver-view" class="section">
        <h4 style="color:var(--primary)">Viajes Disponibles</h4>
        <div id="lista-viajes-global"></div>
        <h4 style="color:var(--accent)">Viajes Aceptados / Chat</h4>
        <div id="mis-chats-driver"></div>
    </div>

    <!-- CHAT VIEW -->
    <div id="chat-view" class="section">
        <div class="card">
            <div class="chat-header" id="chat-info-box">
                <img src="" id="chat-perfil-img" class="chat-img">
                <div>
                    <strong id="chat-nombre-usuario">...</strong><br>
                    <span id="chat-badge-placa" class="placa-badge" style="display:none;"></span>
                </div>
            </div>
            <div id="mensajes-box"></div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <input type="text" id="msg-input" placeholder="Escribe un mensaje...">
                <button class="btn-action" style="width:60px; margin:0;" onclick="enviarMensaje()">➤</button>
            </div>
            <button class="btn-action btn-finish" style="margin-top:15px; background:var(--accent); color:black;" onclick="finalizarViaje()">FINALIZAR VIAJE</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot, serverTimestamp, doc, updateDoc, getDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAyRrBUmw4OEzS7EmvK_XmDk6Z5rrjLC3A",
        authDomain: "runcar-6eda0.firebaseapp.com",
        projectId: "runcar-6eda0",
        storageBucket: "runcar-6eda0.firebasestorage.app",
        messagingSenderId: "152627344672",
        appId: "1:152627344672:web:b420d1c8cbb670069b9345"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const storage = getStorage(app);

    let isReg = false;
    let chatIdActivo = null;
    let kmGlobal = 0;

    // --- AUTH ---
    window.switchAuth = () => {
        isReg = !isReg;
        document.getElementById('reg-fields').style.display = isReg ? 'block' : 'none';
        document.getElementById('btn-auth-main').innerText = isReg ? 'REGISTRAR' : 'INGRESAR';
    };

    window.toggleRegDriver = () => {
        document.getElementById('campos-driver').style.display = (document.getElementById('reg-rol').value === 'driver') ? 'block' : 'none';
    };

    window.ejecutarAuth = async () => {
        const mail = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        if(isReg) {
            const uc = await createUserWithEmailAndPassword(auth, mail, pass);
            let fotoUrl = "";
            const file = document.getElementById('file-rostro').files[0];
            if(file) {
                const sRef = ref(storage, `perfiles/${uc.user.uid}`);
                await uploadBytes(sRef, file);
                fotoUrl = await getDownloadURL(sRef);
            }
            await addDoc(collection(db, "usuarios"), {
                uid: uc.user.uid,
                rol: document.getElementById('reg-rol').value,
                nombre: document.getElementById('reg-nombre').value,
                foto: fotoUrl,
                whatsapp: document.getElementById('reg-prefijo').value + document.getElementById('reg-tel').value,
                placa: document.getElementById('reg-placa').value || "",
                email: mail
            });
        } else {
            await signInWithEmailAndPassword(auth, mail, pass);
        }
    };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            const q = query(collection(db, "usuarios"), where("uid", "==", user.uid));
            const snap = await getDocs(q);
            snap.forEach(d => {
                const u = d.data();
                document.getElementById('auth-container').style.display = 'none';
                if(u.rol === 'cliente') {
                    document.getElementById('cliente-view').classList.add('active-section');
                    initMap(); escucharOfertas();
                } else {
                    document.getElementById('driver-view').classList.add('active-section');
                    escucharViajes(); escucharMisAceptaciones();
                }
            });
        }
    });

    // --- MAPS ---
    let ds, dr;
    window.initMap = () => {
        ds = new google.maps.DirectionsService();
        dr = new google.maps.DirectionsRenderer({ map: new google.maps.Map(document.getElementById("map"), { center: {lat:13.7, lng:-89.2}, zoom:12 }) });
        new google.maps.places.Autocomplete(document.getElementById("origin"));
        new google.maps.places.Autocomplete(document.getElementById("destination"));
    };

    window.calcularRuta = () => {
        const o = document.getElementById("origin").value;
        const d = document.getElementById("destination").value;
        ds.route({ origin:o, destination:d, travelMode:'DRIVING' }, (res, status) => {
            if(status === 'OK') {
                dr.setDirections(res);
                kmGlobal = (res.routes[0].legs[0].distance.value / 1000).toFixed(2);
                let p = kmGlobal <= 3 ? 3.00 : (3 + (kmGlobal - 3) * 0.30);
                document.getElementById("priceMaps").innerText = "$" + p.toFixed(2);
                document.getElementById("oferta-cliente").value = p.toFixed(2);
                document.getElementById("precio-area").style.display = 'block';
            }
        });
    };

    window.publicarViaje = async () => {
        await addDoc(collection(db, "viajes"), {
            cliente: auth.currentUser.uid,
            origen: document.getElementById("origin").value,
            destino: document.getElementById("destination").value,
            oferta: document.getElementById("oferta-cliente").value,
            estado: "abierto",
            fecha: serverTimestamp()
        });
        alert("Solicitud enviada. Espera ofertas...");
    };

    // --- LÓGICA DE NEGOCIACIÓN (ACEPTAR/RECHAZAR) ---
    function escucharOfertas() {
        onSnapshot(query(collection(db, "ofertas"), 
            where("clienteId", "==", auth.currentUser.uid), 
            where("estado", "==", "pendiente")), (snap) => {
            const container = document.getElementById("lista-ofertas");
            container.innerHTML = "";
            snap.forEach(async (docOferta) => {
                const of = docOferta.data();
                const uSnap = await getDocs(query(collection(db, "usuarios"), where("uid", "==", of.driver)));
                let nDriver = "Conductor"; uSnap.forEach(u => nDriver = u.data().nombre);

                const div = document.createElement('div');
                div.className = "card oferta-card";
                div.innerHTML = `
                    <div class="oferta-info">
                        <strong>${nDriver}</strong><br>Propone: <b>$${of.precio}</b>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button class="btn-action btn-small" onclick="gestionarOferta('${docOferta.id}', '${of.viajeId}', '${of.driver}', 'aceptada')">ACEPTAR</button>
                        <button class="btn-action btn-danger btn-small" onclick="gestionarOferta('${docOferta.id}', null, null, 'rechazada')">X</button>
                    </div>
                `;
                container.appendChild(div);
            });
        });
    }

    window.gestionarOferta = async (oid, vid, did, estado) => {
        if(estado === 'aceptada') {
            await updateDoc(doc(db, "ofertas", oid), { estado: "aceptada" });
            await updateDoc(doc(db, "viajes", vid), { estado: "aceptado", driverFinal: did });
            abrirChat(vid, did);
        } else {
            await updateDoc(doc(db, "ofertas", oid), { estado: "rechazada" });
        }
    };

    // --- CONDUCTOR ---
    function escucharViajes() {
        onSnapshot(query(collection(db, "viajes"), where("estado", "==", "abierto")), (snap) => {
            let h = "";
            snap.forEach(d => {
                const v = d.data();
                h += `<div class="card">
                    <p>De: ${v.origen.split(',')[0]} <br> A: ${v.destino.split(',')[0]}</p>
                    <p>Oferta Cliente: $${v.oferta}</p>
                    <input type="number" id="io-${d.id}" placeholder="Tu contraoferta $">
                    <button class="btn-action" onclick="enviarOferta('${d.id}', '${v.cliente}')">ENVIAR OFERTA</button>
                </div>`;
            });
            document.getElementById("lista-viajes-global").innerHTML = h || "Sin viajes.";
        });
    }

    window.enviarOferta = async (vid, cid) => {
        const p = document.getElementById(`io-${vid}`).value;
        if(!p) return;
        await addDoc(collection(db, "ofertas"), { viajeId: vid, driver: auth.currentUser.uid, precio: p, clienteId: cid, estado: "pendiente" });
        alert("Oferta enviada.");
    };

    function escucharMisAceptaciones() {
        onSnapshot(query(collection(db, "ofertas"), where("driver", "==", auth.currentUser.uid), where("estado", "==", "aceptada")), (snap) => {
            const container = document.getElementById("mis-chats-driver");
            container.innerHTML = "";
            snap.forEach(d => {
                const div = document.createElement('div');
                div.className = "card";
                div.innerHTML = `<p>✅ Oferta de $${d.data().precio} aceptada</p>
                                 <button class="btn-action" onclick="abrirChat('${d.data().viajeId}', '${d.data().clienteId}')">ABRIR CHAT</button>`;
                container.appendChild(div);
            });
        });
    }

    // --- CHAT ---
    window.abrirChat = async (vid, peerId) => {
        chatIdActivo = vid;
        const uSnap = await getDocs(query(collection(db, "usuarios"), where("uid", "==", peerId)));
        uSnap.forEach(d => {
            const u = d.data();
            document.getElementById('chat-nombre-usuario').innerText = u.nombre;
            document.getElementById('chat-perfil-img').src = u.foto || "https://via.placeholder.com/50";
            if(u.placa) {
                document.getElementById('chat-badge-placa').innerText = u.placa;
                document.getElementById('chat-badge-placa').style.display = 'inline';
            }
        });
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
        document.getElementById('chat-view').classList.add('active-section');
        escucharMensajes(vid);
    };

    function escucharMensajes(vid) {
        onSnapshot(query(collection(db, "mensajes"), where("viajeId", "==", vid), orderBy("fecha")), (snap) => {
            let h = "";
            snap.forEach(m => {
                const c = m.data().remitente === auth.currentUser.uid ? "msg-mio" : "msg-otro";
                h += `<div class="${c}">${m.data().texto}</div>`;
            });
            const b = document.getElementById("mensajes-box");
            b.innerHTML = h; b.scrollTop = b.scrollHeight;
        });
    }

    window.enviarMensaje = async () => {
        const t = document.getElementById('msg-input').value;
        if(!t) return;
        await addDoc(collection(db, "mensajes"), { viajeId: chatIdActivo, remitente: auth.currentUser.uid, texto: t, fecha: serverTimestamp() });
        document.getElementById('msg-input').value = "";
    };

    window.finalizarViaje = () => { if(confirm("¿Finalizar?")) location.reload(); };

    // Prefijos Países
    async function cargarPaises() {
        const sel = document.getElementById('reg-prefijo');
        const res = await fetch('https://restcountries.com/v3.1/all?fields=name,idd,flag,cca2');
        const data = await res.json();
        data.sort((a,b)=> a.name.common.localeCompare(b.name.common)).forEach(c => {
            const code = c.idd.root + (c.idd.suffixes ? c.idd.suffixes[0] : "");
            if(code) {
                const opt = new Option(`${c.flag} ${code}`, code);
                if(c.cca2 === 'SV') opt.selected = true;
                sel.add(opt);
            }
        });
    }
    cargarPaises();

</script>
</body>
</html>
