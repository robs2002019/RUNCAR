<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNCAR</title>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAdjJpRHTqVdIQy_gOP8xE4v4akueFORNs&libraries=places,geometry"></script>

    <style>
        :root { --primary: #2ecc71; --secondary: #1a1a1a; --accent: #f1c40f; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--secondary); color: white; padding-bottom: 50px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        header { text-align: center; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 0 0 25px 25px; border-bottom: 2px solid var(--primary); margin-bottom: 20px; }
        
        .card { background: var(--white); color: #333; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 15px; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        #map { width: 100%; height: 250px; border-radius: 20px; margin-bottom: 15px; border: 2px solid var(--primary); background: #222; }
        .section { display: none; }
        .active-section { display: block; }

        /* Estilos Negociación */
        .oferta-tag { background: #f9f9f9; padding: 15px; border-radius: 12px; margin: 10px 0; border-left: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .price-text { color: var(--primary); font-size: 18px; font-weight: bold; }
        .file-box { background: #f0f0f0; padding: 10px; border-radius: 10px; font-size: 12px; margin: 5px 0; border: 1px dashed #ccc; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; letter-spacing: 2px;">RUN <span style="color:var(--primary)">CAR</span></h2>
</header>

<div class="container">

    <div id="auth-container" class="section active-section">
        <div class="card">
            <h3 id="auth-title" style="margin-top:0; text-align:center;">Bienvenido</h3>
            <input type="email" id="auth-email" placeholder="Correo Electrónico">
            <input type="password" id="auth-pass" placeholder="Contraseña">
            
            <div id="reg-fields" style="display:none;">
                <input type="text" id="reg-nombre" placeholder="Nombre Completo">
                <div style="display:flex; gap:5px;">
                    <select id="reg-pais" style="flex:1;"><option value="+503">🇸🇻 +503</option><option value="+1">🇺🇸 +1</option></select>
                    <input type="tel" id="reg-tel" placeholder="WhatsApp" style="flex:2;">
                </div>
                <div class="file-box"><label>Foto de Perfil</label><input type="file" id="foto-perfil"></div>
                
                <select id="reg-rol" onchange="toggleDriverReg()">
                    <option value="cliente">Soy Cliente</option>
                    <option value="driver">Quiero ser Conductor</option>
                </select>

                <div id="driver-docs" style="display:none; border-top:1px solid #eee; margin-top:10px;">
                    <h5 style="color:var(--primary)">Documentos y Vehículo</h5>
                    <div class="file-box"><label>DUI, Licencia y Antecedentes (Fotos)</label><input type="file" multiple></div>
                    <input type="text" id="car-marca" placeholder="Marca y Modelo">
                    <select id="car-anio"></select>
                    <div class="file-box"><label>Fotos del Auto (Mínimo 5)</label><input type="file" multiple></div>
                </div>
            </div>

            <button class="btn-action" onclick="ejecutarAuth()" id="btn-auth-main">INGRESAR</button>
            <p onclick="switchAuth()" id="toggle-text" style="text-align:center; font-size:12px; cursor:pointer; color:#666; margin-top:15px;">¿No tienes cuenta? Regístrate aquí</p>
        </div>
    </div>

    <div id="cliente-view" class="section">
        <div id="map"></div>
        <div class="card">
            <h4>Solicitar Viaje</h4>
            <input id="origin" placeholder="📍 Origen">
            <input id="destination" placeholder="🏁 Destino">
            
            <div id="precio-area" style="display:none; text-align:center;">
                <p>Tarifa sugerida: <b id="priceMaps">$0.00</b></p>
                <input type="number" id="oferta-cliente" style="font-size:25px; text-align:center; color:var(--primary); font-weight:bold;">
                <button class="btn-action" onclick="publicarViaje()">PUBLICAR OFERTA</button>
            </div>
            <button id="btn-calc" class="btn-action" style="background:#444;" onclick="calcularRuta()">CALCULAR PRECIO</button>
        </div>
        <h4>Propuestas de Conductores</h4>
        <div id="lista-ofertas"></div>
    </div>

    <div id="driver-view" class="section">
        <h4 style="color:var(--primary)">Viajes disponibles</h4>
        <div id="lista-viajes-global"></div>
    </div>

    <button id="btn-logout" class="btn-action" style="display:none; background:#c0392b; margin-top:20px;" onclick="location.reload()">CERRAR SESIÓN</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAyRrBUmw4OEzS7EmvK_XmDk6Z5rrjLC3A",
        authDomain: "runcar-6eda0.firebaseapp.com",
        projectId: "runcar-6eda0",
        storageBucket: "runcar-6eda0.firebasestorage.app",
        messagingSenderId: "152627344672",
        appId: "1:152627344672:web:b420d1c8cbb670069b9345"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let isReg = false;
    let pBase = 0;

    // --- LÓGICA AUTH ---
    window.switchAuth = () => {
        isReg = !isReg;
        document.getElementById('reg-fields').style.display = isReg ? 'block' : 'none';
        document.getElementById('btn-auth-main').innerText = isReg ? 'CREAR CUENTA' : 'INGRESAR';
    };

    window.toggleDriverReg = () => {
        document.getElementById('driver-docs').style.display = document.getElementById('reg-rol').value === 'driver' ? 'block' : 'none';
    };

    // Llenar años
    const carAnio = document.getElementById('car-anio');
    for(let i=2027; i>=2014; i--) { carAnio.options.add(new Option(i, i)); }

    window.ejecutarAuth = async () => {
        const mail = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        try {
            if(isReg) {
                const uc = await createUserWithEmailAndPassword(auth, mail, pass);
                await addDoc(collection(db, "usuarios"), {
                    uid: uc.user.uid,
                    rol: document.getElementById('reg-rol').value,
                    nombre: document.getElementById('reg-nombre').value,
                    whatsapp: document.getElementById('reg-pais').value + document.getElementById('reg-tel').value
                });
                alert("Registro completado. Documentos en revisión.");
            } else {
                await signInWithEmailAndPassword(auth, mail, pass);
            }
        } catch (e) { alert(e.message); }
    };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('btn-logout').style.display = 'block';
            const q = query(collection(db, "usuarios"), where("uid", "==", user.uid));
            const snap = await getDocs(q);
            snap.forEach(d => {
                if(d.data().rol === 'cliente') {
                    document.getElementById('cliente-view').classList.add('active-section');
                    initMap();
                    escucharOfertas();
                } else {
                    document.getElementById('driver-view').classList.add('active-section');
                    escucharViajes();
                }
            });
        }
    });

    // --- GEOLOCALIZACIÓN Y TARIFA ---
    let ds, dr;
    window.initMap = () => {
        ds = new google.maps.DirectionsService();
        dr = new google.maps.DirectionsRenderer({ map: new google.maps.Map(document.getElementById("map"), { center: {lat:13.6, lng:-89.2}, zoom:12 }) });
        new google.maps.places.Autocomplete(document.getElementById("origin"));
        new google.maps.places.Autocomplete(document.getElementById("destination"));
    };

    window.calcularRuta = () => {
        const o = document.getElementById("origin").value;
        const d = document.getElementById("destination").value;
        ds.route({ origin:o, destination:d, travelMode:'DRIVING' }, (res, status) => {
            if(status === 'OK') {
                dr.setDirections(res);
                const km = res.routes[0].legs[0].distance.value / 1000;
                pBase = km <= 3 ? 3.00 : 3 + (km-3)*0.30;
                document.getElementById("priceMaps").innerText = "$" + pBase.toFixed(2);
                document.getElementById("oferta-cliente").value = pBase.toFixed(2);
                document.getElementById("precio-area").style.display = 'block';
                document.getElementById("btn-calc").style.display = 'none';
            }
        });
    };

    // --- NEGOCIACIÓN ---
    window.publicarViaje = async () => {
        await addDoc(collection(db, "viajes"), {
            cliente: auth.currentUser.uid,
            origen: document.getElementById("origin").value,
            destino: document.getElementById("destination").value,
            oferta: document.getElementById("oferta-cliente").value,
            estado: "abierto",
            fecha: serverTimestamp()
        });
        alert("Buscando conductores...");
    };

    function escucharViajes() {
        onSnapshot(query(collection(db, "viajes"), where("estado", "==", "abierto")), (snap) => {
            let h = "";
            snap.forEach(d => {
                const v = d.data();
                h += `<div class="card">
                    <small>${v.origen} → ${v.destino}</small>
                    <p>Ofrece: <b class="price-text">$${v.oferta}</b></p>
                    <input type="number" id="c-${d.id}" placeholder="Tu contraoferta $">
                    <button class="btn-action" onclick="enviarContraoferta('${d.id}')">ENVIAR PRECIO</button>
                </div>`;
            });
            document.getElementById("lista-viajes-global").innerHTML = h || "Esperando solicitudes...";
        });
    }

    window.enviarContraoferta = async (id) => {
        const val = document.getElementById(`c-${id}`).value;
        await addDoc(collection(db, "ofertas"), {
            viajeId: id,
            driver: auth.currentUser.uid,
            precio: val,
            clienteId: (await getDocs(query(collection(db, "viajes")))).docs.find(x => x.id === id).data().cliente
        });
        alert("Oferta enviada.");
    };

    function escucharOfertas() {
        onSnapshot(query(collection(db, "ofertas"), where("clienteId", "==", auth.currentUser.uid)), (snap) => {
            let h = "";
            snap.forEach(d => {
                const o = d.data();
                h += `<div class="oferta-tag">
                    <span>Conductor ofrece: <b class="price-text">$${o.precio}</b></span>
                    <button class="btn-action" style="width:auto; padding:10px;" onclick="confirmar()">ACEPTAR</button>
                </div>`;
            });
            document.getElementById("lista-ofertas").innerHTML = h;
        });
    }

    window.confirmar = () => alert("¡Viaje confirmado! El conductor va en camino.");
</script>
</body>
</html>
