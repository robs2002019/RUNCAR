<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RUN CAR PRO GLOBAL</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:#111827;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:10px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

input,
button,
select,
textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:15px;
}

button{
background:#10b981;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.hidden{
display:none;
}

#map,
#driverMap{
height:220px;
border-radius:15px;
margin-top:10px;
}

.status{
background:#059669;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.driver-card{
background:#334155;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.chat{
height:300px;
overflow:auto;
background:#111827;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.message{
background:#334155;
padding:8px;
border-radius:8px;
margin-top:8px;
}

.popup{
position:fixed;
top:10px;
left:10px;
right:10px;
background:#111827;
padding:15px;
border-radius:15px;
z-index:999999;
max-height:95vh;
overflow:auto;
border:2px solid #10b981;
}

.popupMap{
height:180px;
border-radius:10px;
margin-top:10px;
}

.warning{
background:red;
padding:10px;
border-radius:10px;
text-align:center;
margin-bottom:10px;
}

.preview{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
margin-top:10px;
}

</style>

</head>

<body>

<header>
RUN CAR PRO 🚖
</header>

<div class="container">

<!-- LOGIN -->

<div class="card"
id="loginPanel">

<h2>Registro / Login</h2>

<select id="userType">

<option value="cliente">
Cliente
</option>

<option value="driver">
Driver
</option>

<option value="admin">
Administrador
</option>

</select>

<!-- CLIENTE -->

<div id="clienteRegistro">

<input type="text"
placeholder="Nombre completo"
id="clienteNombre">

<input type="email"
placeholder="Correo"
id="clienteEmail">

<input type="tel"
placeholder="WhatsApp Internacional (+503...)"
id="clienteTelefono">

<input type="file"
id="clienteFoto">

<button onclick="loginGoogle()">
<i class="fa-brands fa-google"></i>
Continuar con Google
</button>

</div>

<!-- DRIVER -->

<div class="hidden"
id="driverRegistro">

<input type="text"
placeholder="Nombre completo"
id="driverNombre">

<input type="email"
placeholder="Correo"
id="driverEmail">

<input type="tel"
placeholder="WhatsApp Internacional"
id="driverTelefono">

<input type="number"
placeholder="Año del vehículo"
id="driverAnio">

<input type="text"
placeholder="Marca"
id="driverMarca">

<input type="text"
placeholder="Modelo"
id="driverModelo">

<input type="text"
placeholder="Placa"
id="driverPlaca">

<label>Licencia Conducir</label>
<input type="file">

<label>Solvencia Policía</label>
<input type="file">

<label>Antecedentes Penales</label>
<input type="file">

<label>Fotos Vehículo</label>
<input type="file"
multiple>

<button onclick="validarVehiculo()">
Validar Vehículo
</button>

<button onclick="loginGoogle()">
<i class="fa-brands fa-google"></i>
Continuar con Google
</button>

</div>

<button onclick="loginAdmin()">
Ingresar
</button>

</div>

<!-- CLIENTE PANEL -->

<div class="hidden"
id="clientePanel">

<div class="card">

<h2>Solicitar Viaje</h2>

<input type="text"
id="origen"
placeholder="Origen GPS automático o manual">

<input type="text"
id="destino"
placeholder="Selecciona destino tocando el mapa">

<div id="map"></div>

<input type="number"
id="personas"
placeholder="Cantidad personas">

<input type="number"
id="bebes"
placeholder="Cantidad bebés">

<input type="number"
id="pets"
placeholder="Cantidad mascotas">

<input type="number"
id="carga"
placeholder="Carga en KG">

<input type="tel"
id="whatsapp"
placeholder="WhatsApp Internacional">

<input type="number"
id="ofertaCliente"
placeholder="Oferta del cliente">

<div class="status"
id="tarifaApp">
Costo APP: $0
</div>

<button onclick="calcularViaje()">
Calcular Viaje
</button>

<button onclick="solicitarViaje()">
Enviar Solicitud
</button>

</div>

</div>

<!-- DRIVER PANEL -->

<div class="hidden"
id="driverPanel">

<div class="card">

<h2>Panel Driver</h2>

<button onclick="activarDriver()">
ACTIVAR ONLINE
</button>

<div class="status"
id="driverEstado">
OFFLINE
</div>

<div id="driverMap"></div>

</div>

<div class="card">

<h2>Últimos 5 días</h2>

<div id="historialDriver"></div>

</div>

</div>

<!-- ADMIN PANEL -->

<div class="hidden"
id="adminPanel">

<div class="card">

<h2>Administración</h2>

<div id="clientesAdmin"></div>

<div id="driversAdmin"></div>

</div>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">

//////////////////////////////////////////
// FIREBASE
//////////////////////////////////////////

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
doc,
setDoc,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

//////////////////////////////////////////
// FIREBASE CONFIG
//////////////////////////////////////////

const firebaseConfig = {

apiKey:
"AIzaSyAyRrBUmw4OEzS7EmvK_XmDk6Z5rrjLC3A",

authDomain:
"runcar-6eda0.firebaseapp.com",

projectId:
"runcar-6eda0",

storageBucket:
"runcar-6eda0.firebasestorage.app",

messagingSenderId:
"152627344672",

appId:
"1:152627344672:web:b420d1c8cbb670069b9345"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const auth =
getAuth(app);

//////////////////////////////////////////
// VARIABLES GLOBALES
//////////////////////////////////////////

const ADMIN_EMAIL =
"robs2002004@gmail.com";

let lMap,
driverMap,
markerOrigen,
markerDestino;

let coordsOrigen = null;
let coordsDestino = null;

let miRol = "";
let miUid = "";
let miNombre = "";

let viajeActivoId = null;

let distanciaGlobal = 10;
let costoGlobal = 0;

//////////////////////////////////////////
// CAMBIO REGISTRO
//////////////////////////////////////////

document.getElementById("userType")
.addEventListener("change",()=>{

let type =
document.getElementById("userType").value;

document.getElementById("clienteRegistro")
.classList.add("hidden");

document.getElementById("driverRegistro")
.classList.add("hidden");

if(type==="cliente"){

document.getElementById("clienteRegistro")
.classList.remove("hidden");

}

if(type==="driver"){

document.getElementById("driverRegistro")
.classList.remove("hidden");

}

});

//////////////////////////////////////////
// MAPAS
//////////////////////////////////////////

window.addEventListener("load",()=>{

lMap = L.map('map')
.setView([13.6929,-89.2182],13);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(lMap);

driverMap = L.map('driverMap')
.setView([13.6929,-89.2182],13);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(driverMap);

navigator.geolocation
.getCurrentPosition((pos)=>{

let lat = pos.coords.latitude;
let lng = pos.coords.longitude;

coordsOrigen = [lat,lng];

markerOrigen =
L.marker([lat,lng])
.addTo(lMap);

lMap.setView([lat,lng],15);

document.getElementById("origen")
.value =
lat + "," + lng;

});

lMap.on("click",(e)=>{

let lat = e.latlng.lat;
let lng = e.latlng.lng;

coordsDestino = [lat,lng];

if(markerDestino){

lMap.removeLayer(markerDestino);

}

markerDestino =
L.marker([lat,lng])
.addTo(lMap);

document.getElementById("destino")
.value =
lat + "," + lng;

});

});

//////////////////////////////////////////
// LOGIN GOOGLE
//////////////////////////////////////////

window.loginGoogle =
async function(){

try{

const provider =
new GoogleAuthProvider();

const result =
await signInWithPopup(auth,provider);

const user =
result.user;

miUid = user.uid;
miNombre = user.displayName;

let type =
document.getElementById("userType")
.value;

miRol = type;

await setDoc(
doc(db,"usuarios",miUid),
{

uid: miUid,

nombre: miNombre,

email: user.email,

foto: user.photoURL,

rol: miRol,

telefono:
type==="cliente"
?
document.getElementById("clienteTelefono").value
:
document.getElementById("driverTelefono").value,

timestamp:
Date.now()

},
{ merge:true }

);

alert(
"Bienvenido " + miNombre
);

document.getElementById("loginPanel")
.classList.add("hidden");

if(type==="cliente"){

document.getElementById("clientePanel")
.classList.remove("hidden");

}

if(type==="driver"){

document.getElementById("driverPanel")
.classList.remove("hidden");

mostrarHistorialDriver();

}

}catch(error){

console.log(error);

alert("Error Login");

}

}

//////////////////////////////////////////
// DETECTAR SESION
//////////////////////////////////////////

onAuthStateChanged(auth,(user)=>{

if(user){

miUid = user.uid;

}

});

//////////////////////////////////////////
// ADMIN
//////////////////////////////////////////

window.loginAdmin =
function(){

let email =
prompt("Correo administrador");

if(email!==ADMIN_EMAIL){

alert("Acceso Denegado");

return;

}

document.getElementById("loginPanel")
.classList.add("hidden");

document.getElementById("adminPanel")
.classList.remove("hidden");

cargarAdmin();

}

//////////////////////////////////////////
// VALIDAR VEHICULO
//////////////////////////////////////////

window.validarVehiculo =
function(){

let anio =
document.getElementById("driverAnio")
.value;

if(anio<2014){

alert(
"Solo vehículos 2014 en adelante"
);

return;

}

alert("Vehículo válido");

}

//////////////////////////////////////////
// CALCULO COSTO
//////////////////////////////////////////

window.calcularViaje =
function(){

if(distanciaGlobal<=3){

costoGlobal =
distanciaGlobal*1;

}else{

costoGlobal =
3+((distanciaGlobal-3)*0.30);

}

document.getElementById("tarifaApp")
.innerHTML =
`
Distancia:
${distanciaGlobal} KM<br>

Costo APP:
$${costoGlobal.toFixed(2)}
`;

}

//////////////////////////////////////////
// SOLICITAR VIAJE
//////////////////////////////////////////

window.solicitarViaje =
async function(){

let origen =
document.getElementById("origen").value;

let destino =
document.getElementById("destino").value;

let personas =
document.getElementById("personas").value;

let bebes =
document.getElementById("bebes").value;

let pets =
document.getElementById("pets").value;

let carga =
document.getElementById("carga").value;

let whatsapp =
document.getElementById("whatsapp").value;

let oferta =
document.getElementById("ofertaCliente").value;

try{

const docRef =
await addDoc(
collection(db,"viajes"),
{

clienteUid: miUid,

clienteNombre: miNombre,

origen,
destino,

personas,
bebes,
pets,
carga,

whatsapp,

oferta,

costoApp:
costoGlobal,

estado:
"pendiente",

timestamp:
Date.now()

}
);

viajeActivoId =
docRef.id;

alert("Solicitud enviada");

mostrarPopupDriver(
origen,
destino,
personas,
bebes,
pets,
carga,
whatsapp,
oferta
);

}catch(error){

console.log(error);

alert(
"Error al solicitar viaje"
);

}

}

//////////////////////////////////////////
// POPUP DRIVER
//////////////////////////////////////////

function mostrarPopupDriver(
origen,
destino,
personas,
bebes,
pets,
carga,
whatsapp,
oferta
){

let popup =
document.createElement("div");

popup.className = "popup";

popup.id = "popupDriver";

popup.innerHTML =
`

<h2>Nueva Solicitud</h2>

<b>Origen:</b><br>
${origen}<br><br>

<b>Destino:</b><br>
${destino}<br><br>

<b>Personas:</b>
${personas}<br>

<b>Bebés:</b>
${bebes}<br>

<b>Mascotas:</b>
${pets}<br>

<b>Carga:</b>
${carga} KG<br>

<b>WhatsApp:</b>
${whatsapp}<br><br>

<b>Costo APP:</b>
$${costoGlobal.toFixed(2)}<br>

<b>Oferta Cliente:</b>
$${oferta}<br><br>

<input type="number"
id="contraOferta"
placeholder="Contra oferta">

<button onclick="aceptarViaje()">
Aceptar Viaje
</button>

<button
style="background:red;"
onclick="rechazarViaje()">
Rechazar
</button>

`;

document.body.appendChild(popup);

}

//////////////////////////////////////////
// ACEPTAR / RECHAZAR
//////////////////////////////////////////

window.rechazarViaje =
function(){

document.getElementById("popupDriver")
.remove();

alert("Viaje rechazado");

}

window.aceptarViaje =
function(){

abrirChat();

}

//////////////////////////////////////////
// CHAT
//////////////////////////////////////////

function abrirChat(){

let chat =
document.createElement("div");

chat.className = "popup";

chat.innerHTML =
`

<h2>Chat Viaje</h2>

<div class="warning">

NO CERRAR EL CHAT
HASTA FINALIZAR EL VIAJE

</div>

<div class="chat"
id="chatViaje"></div>

<input type="text"
id="mensajeViaje"
placeholder="Mensaje">

<button onclick="enviarMensaje()">
Enviar
</button>

<button
style="background:#059669;"
onclick="finalizarViaje()">
Finalizar Viaje
</button>

`;

document.body.appendChild(chat);

}

//////////////////////////////////////////
// MENSAJES
//////////////////////////////////////////

window.enviarMensaje =
async function(){

let texto =
document.getElementById("mensajeViaje")
.value;

if(!texto) return;

let div =
document.createElement("div");

div.className = "message";

div.innerHTML =
miNombre + ": " + texto;

document.getElementById("chatViaje")
.appendChild(div);

await addDoc(
collection(
db,
"viajes",
viajeActivoId,
"mensajes"
),
{

uid: miUid,

nombre: miNombre,

mensaje: texto,

timestamp:
Date.now()

}
);

document.getElementById("mensajeViaje")
.value = "";

}

//////////////////////////////////////////
// FINALIZAR
//////////////////////////////////////////

window.finalizarViaje =
function(){

alert("Viaje Finalizado");

location.reload();

}

//////////////////////////////////////////
// DRIVER ONLINE
//////////////////////////////////////////

window.activarDriver =
async function(){

await setDoc(
doc(db,"driversOnline",miUid),
{

uid: miUid,

nombre: miNombre,

estado: "online",

timestamp:
Date.now()

}
);

document.getElementById("driverEstado")
.innerHTML =
"ONLINE";

alert("Driver Online");

}

//////////////////////////////////////////
// HISTORIAL
//////////////////////////////////////////

function mostrarHistorialDriver(){

let html = "";

for(let i=1;i<=5;i++){

let ingreso =
25+(i*5);

let comision =
(ingreso*0.08).toFixed(2);

html +=
`

<div class="driver-card">

Día ${i}<br>

Ingresos:
$${ingreso}<br>

Comisión 8%:
$${comision}

</div>

`;

}

document.getElementById("historialDriver")
.innerHTML = html;

}

//////////////////////////////////////////
// ADMIN
//////////////////////////////////////////

function cargarAdmin(){

document.getElementById("clientesAdmin")
.innerHTML =
`

<h2>Clientes</h2>

<div class="driver-card">

Carlos Martínez<br>

Estado: ACTIVO

<button onclick="desactivarUsuario()">
Desactivar
</button>

<button
style="background:red;"
onclick="eliminarUsuario()">
Eliminar
</button>

</div>

`;

document.getElementById("driversAdmin")
.innerHTML =
`

<h2>Drivers</h2>

<div class="driver-card">

Mario López<br>

Ingresos Hoy:
$60<br>

Comisión 8%:
$4.80

<button onclick="desactivarUsuario()">
Desactivar
</button>

<button
style="background:red;"
onclick="eliminarUsuario()">
Eliminar
</button>

</div>

`;

}

window.desactivarUsuario =
function(){

alert("Usuario desactivado");

}

window.eliminarUsuario =
function(){

alert("Usuario eliminado");

}

//////////////////////////////////////////
// ESCUCHAR VIAJES
//////////////////////////////////////////

onSnapshot(
collection(db,"viajes"),
(snapshot)=>{

snapshot.forEach((docu)=>{

console.log(
"NUEVO VIAJE:",
docu.data()
);

});

});

</script>

</body>
</html>
