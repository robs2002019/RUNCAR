<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNCAR PRO - Global </title>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDj2kkjVmMqJSWN4OVbue2jPOidhGO2GOU&libraries=places,geometry"></script>

    <style>
        :root { --primary: #2ecc71; --secondary: #1a1a1a; --accent: #f1c40f; --white: #ffffff; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--secondary); color: white; padding-bottom: 50px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        header { text-align: center; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 0 0 25px 25px; border-bottom: 2px solid var(--primary); margin-bottom: 20px; }
        
        .card { background: var(--white); color: #333; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 15px; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        #map { width: 100%; height: 250px; border-radius: 20px; margin-bottom: 15px; border: 2px solid var(--primary); background: #222; }
        .section { display: none; }
        .active-section { display: block; }

        .oferta-tag { background: #f9f9f9; padding: 15px; border-radius: 12px; margin: 10px 0; border-left: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .price-text { color: var(--primary); font-size: 22px; font-weight: bold; }
        
        #mensajes-box { height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 10px; background: #eee; border-radius: 10px; margin-bottom: 10px; }
        .msg-mio { background: var(--primary); color: white; align-self: flex-end; padding: 10px; border-radius: 15px 15px 0 15px; max-width: 80%; }
        .msg-otro { background: #fff; color: #333; align-self: flex-start; padding: 10px; border-radius: 15px 15px 15px 0; max-width: 80%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; color: #333; background: white; border-radius: 10px; overflow-x: auto; display: block; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; font-size: 13px; }
        .resumen-caja { background: #f1c40f; color: #000; padding: 15px; border-radius: 15px; margin-top: 10px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; letter-spacing: 2px;">RUN <span style="color:var(--primary)">CAR</span></h2>
</header>

<div class="container">

    <!-- LOGIN -->
    <div id="auth-container" class="section active-section">
        <div class="card">
            <h3 style="margin-top:0; text-align:center;">Acceso</h3>
            <input type="email" id="auth-email" placeholder="Correo Electrónico">
            <input type="password" id="auth-pass" placeholder="Contraseña">
            
            <div id="reg-fields" style="display:none;">
                <input type="text" id="reg-nombre" placeholder="Nombre Completo">
                <div style="display: flex; gap: 5px;">
                    <select id="reg-prefijo" style="flex: 1; font-size: 12px;"></select>
                    <input type="tel" id="reg-tel" placeholder="WhatsApp" style="flex: 2;">
                </div>
                <select id="reg-rol">
                    <option value="cliente">Soy Cliente</option>
                    <option value="driver">Quiero ser Conductor</option>
                </select>
            </div>

            <button class="btn-action" onclick="ejecutarAuth()" id="btn-auth-main">INGRESAR</button>
            <p onclick="switchAuth()" style="text-align:center; cursor:pointer; color:#666; margin-top:18px;">¿No tienes cuenta? Regístrate</p>
        </div>
    </div>

    <!-- CLIENTE -->
    <div id="cliente-view" class="section">
        <div id="map"></div>
        <div class="card">
            <input id="origin" placeholder="📍 Origen">
            <input id="destination" placeholder="🏁 Destino">
            <div id="precio-area" style="display:none; text-align:center;">
                <p>Tarifa sugerida: <b id="priceMaps">$0.00</b></p>
                <input type="number" id="oferta-cliente" style="font-size:20px; text-align:center;">
                <button class="btn-action" onclick="publicarViaje()">SOLICITAR VIAJE</button>
                <button class="btn-action" style="background:var(--danger); margin-top:5px;" onclick="cancelarSolicitud()">CANCELAR / LIMPIAR</button>
            </div>
            <button id="btn-calc" class="btn-action" style="background:#444;" onclick="calcularRuta()">CALCULAR PRECIO</button>
        </div>
        <h4>Ofertas recibidas:</h4>
        <div id="lista-ofertas"></div>
    </div>

    <!-- CONDUCTOR -->
    <div id="driver-view" class="section">
        <div class="card">
            <h4 style="margin:0">Contabilidad (Últimos 5 días)</h4>
            <div id="driver-stats" class="resumen-caja">Cargando...</div>
        </div>
        <h4 style="color:var(--primary)">Viajes Solicitados</h4>
        <div id="lista-viajes-global"></div>
        <hr>
        <h4 style="color:var(--accent)">Mis Viajes Confirmados</h4>
        <div id="mis-chats-driver"></div>
    </div>

    <!-- ADMIN -->
    <div id="admin-panel" class="section">
        <div class="card">
            <h3 style="text-align:center;">🛡️ Administración</h3>
            <div id="admin-global-stats" class="resumen-caja" style="margin-bottom:15px; background:#2ecc71; color:white;"></div>
            <table>
                <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>WhatsApp</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="lista-usuarios-admin"></tbody>
            </table>
            <button class="btn-action" style="margin-top:15px; background:#444;" onclick="location.reload()">CERRAR</button>
        </div>
    </div>

    <!-- CHAT -->
    <div id="chat-view" class="section">
        <div class="card">
            <h4 id="chat-titulo">Chat</h4>
            <div id="mensajes-box"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="msg-input" placeholder="Mensaje...">
                <button class="btn-action" style="width:60px;" onclick="enviarMensaje()">➤</button>
            </div>
            <button class="btn-action" style="margin-top:10px; background:var(--accent); color:black;" onclick="marcarComoFinalizado()">FINALIZAR VIAJE</button>
        </div>
    </div>

    <button id="btn-logout" class="btn-action" style="display:none; background:#c0392b; margin-top:20px;" onclick="cerrarSesion()">CERRAR SESIÓN</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot, serverTimestamp, doc, updateDoc, deleteDoc, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAyRrBUmw4OEzS7EmvK_XmDk6Z5rrjLC3A",
        authDomain: "runcar-6eda0.firebaseapp.com",
        projectId: "runcar-6eda0",
        storageBucket: "runcar-6eda0.firebasestorage.app",
        messagingSenderId: "152627344672",
        appId: "1:152627344672:web:b420d1c8cbb670069b9345"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let isReg = false;
    let chatIdActivo = null;
    let miRol = "";

    // --- PAÍSES ---
    async function cargarPaises() {
        const sel = document.getElementById('reg-prefijo');
        try {
            const res = await fetch('https://restcountries.com/v3.1/all?fields=name,idd,cca2');
            const data = await res.json();
            data.sort((a,b)=> a.name.common.localeCompare(b.name.common)).forEach(c => {
                const code = c.idd.root + (c.idd.suffixes ? c.idd.suffixes[0] : "");
                if(code) {
                    const opt = new Option(`${c.cca2} (${code})`, code);
                    if(c.cca2 === 'SV') opt.selected = true;
                    sel.add(opt);
                }
            });
        } catch(e) { sel.add(new Option("+503", "+503")); }
    }
    cargarPaises();

    // --- ADMIN (TECLA W) ---
    document.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'w') {
            const pass = prompt("Contraseña de Admin:");
            if (pass === "Cordia1987") {
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
                document.getElementById('admin-panel').classList.add('active-section');
                cargarUsuariosAdmin();
                calcularEstadisticasGlobales();
            }
        }
    });

    async function cargarUsuariosAdmin() {
        const snap = await getDocs(collection(db, "usuarios"));
        let h = "";
        snap.forEach(d => {
            const u = d.data();
            const activo = u.estado !== "bloqueado";
            h += `<tr>
                <td><b>${u.nombre}</b><br>${u.rol}</td>
                <td>${u.whatsapp}</td>
                <td>
                    <button onclick="cambiarEstadoUsuario('${d.id}', ${activo})" style="background:${activo?'#f1c40f':'#2ecc71'}; border:none; color:black; padding:5px; border-radius:5px; font-size:10px;">${activo?'BLOQUEAR':'ACTIVAR'}</button>
                    <button onclick="eliminarUsuario('${d.id}')" style="background:#e74c3c; border:none; color:white; padding:5px; border-radius:5px; font-size:10px;">ELIMINAR</button>
                </td>
            </tr>`;
        });
        document.getElementById('lista-usuarios-admin').innerHTML = h;
    }

    window.cambiarEstadoUsuario = async (id, status) => {
        await updateDoc(doc(db, "usuarios", id), { estado: status ? "bloqueado" : "activo" });
        cargarUsuariosAdmin();
    };

    window.eliminarUsuario = async (id) => {
        if(confirm("¿Seguro que deseas eliminar permanentemente a este usuario?")) {
            await deleteDoc(doc(db, "usuarios", id));
            cargarUsuariosAdmin();
        }
    };

    // --- LIMPIEZA DE VIAJES NO ACEPTADOS ---
    window.cancelarSolicitud = async () => {
        const q = query(collection(db, "viajes"), where("cliente", "==", auth.currentUser.uid), where("estado", "==", "abierto"));
        const snap = await getDocs(q);
        snap.forEach(async (d) => {
            await updateDoc(doc(db, "viajes", d.id), { estado: "cancelado" });
        });
        location.reload();
    };

    // --- CONTABILIDAD Y ESTADÍSTICAS ---
    async function calcularEstadisticasDriver() {
        const cincoDiasAtras = new Date();
        cincoDiasAtras.setDate(cincoDiasAtras.getDate() - 5);

        const q = query(
            collection(db, "viajes"), 
            where("driverFinal", "==", auth.currentUser.uid), 
            where("estado", "==", "finalizado"),
            orderBy("fecha", "desc")
        );

        const snap = await getDocs(q);
        let totalMonto = 0;
        let conteo = 0;

        snap.forEach(d => {
            totalMonto += parseFloat(d.data().oferta);
            conteo++;
        });

        const comision = totalMonto * 0.08;
        document.getElementById('driver-stats').innerHTML = `
            Viajes: ${conteo} | Total: $${totalMonto.toFixed(2)}<br>
            <span style="font-size:14px">Comisión a Pagar (8%): $${comision.toFixed(2)}</span>
        `;
    }

    async function calcularEstadisticasGlobales() {
        const q = query(collection(db, "viajes"), where("estado", "==", "finalizado"));
        const snap = await getDocs(q);
        let total = 0;
        snap.forEach(d => total += parseFloat(d.data().oferta));
        document.getElementById('admin-global-stats').innerHTML = `RECAUDACIÓN TOTAL SISTEMA: $${total.toFixed(2)} <br> COMISIONES TOTALES (8%): $${(total*0.08).toFixed(2)}`;
    }

    // --- AUTH ---
    window.switchAuth = () => {
        isReg = !isReg;
        document.getElementById('reg-fields').style.display = isReg ? 'block' : 'none';
        document.getElementById('btn-auth-main').innerText = isReg ? 'REGISTRAR' : 'INGRESAR';
    };

    window.ejecutarAuth = async () => {
        const mail = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        try {
            if(isReg) {
                const uc = await createUserWithEmailAndPassword(auth, mail, pass);
                await addDoc(collection(db, "usuarios"), {
                    uid: uc.user.uid,
                    rol: document.getElementById('reg-rol').value,
                    nombre: document.getElementById('reg-nombre').value,
                    whatsapp: document.getElementById('reg-prefijo').value + document.getElementById('reg-tel').value,
                    estado: "activo"
                });
            } else { await signInWithEmailAndPassword(auth, mail, pass); }
        } catch (e) { alert(e.message); }
    };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            const q = query(collection(db, "usuarios"), where("uid", "==", user.uid));
            const snap = await getDocs(q);
            if(snap.empty) return;
            snap.forEach(d => {
                const u = d.data();
                if(u.estado === "bloqueado") {
                    alert("Tu cuenta ha sido bloqueada por la administración.");
                    signOut(auth); location.reload(); return;
                }
                miRol = u.rol;
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('btn-logout').style.display = 'block';
                if(miRol === 'cliente') { 
                    document.getElementById('cliente-view').classList.add('active-section'); 
                    initMap(); escucharOfertas(); 
                } else { 
                    document.getElementById('driver-view').classList.add('active-section'); 
                    escucharViajes(); escucharMisAceptaciones(); calcularEstadisticasDriver();
                }
            });
        }
    });

    // --- MAPS & VIAJES ---
    let ds, dr;
    window.initMap = () => {
        ds = new google.maps.DirectionsService();
        dr = new google.maps.DirectionsRenderer({ map: new google.maps.Map(document.getElementById("map"), { center: {lat:13.7, lng:-89.2}, zoom:12 }) });
        new google.maps.places.Autocomplete(document.getElementById("origin"));
        new google.maps.places.Autocomplete(document.getElementById("destination"));
    };

    window.calcularRuta = () => {
        const o = document.getElementById("origin").value;
        const d = document.getElementById("destination").value;
        if(!o || !d) return;
        ds.route({ origin:o, destination:d, travelMode:'DRIVING' }, (res, status) => {
            if(status === 'OK') {
                dr.setDirections(res);
                const km = res.routes[0].legs[0].distance.value / 1000;
                let p = km <= 3 ? 3.00 : 3 + (km-3)*0.30;
                document.getElementById("priceMaps").innerText = "$" + p.toFixed(2);
                document.getElementById("oferta-cliente").value = p.toFixed(2);
                document.getElementById("precio-area").style.display = 'block';
                document.getElementById("btn-calc").style.display = 'none';
            }
        });
    };

    window.publicarViaje = async () => {
        await addDoc(collection(db, "viajes"), { 
            cliente: auth.currentUser.uid, 
            origen: document.getElementById("origin").value, 
            destino: document.getElementById("destination").value, 
            oferta: document.getElementById("oferta-cliente").value, 
            estado: "abierto", 
            fecha: serverTimestamp() 
        });
        alert("Solicitud enviada a conductores.");
    };

    function escucharViajes() {
        onSnapshot(query(collection(db, "viajes"), where("estado", "==", "abierto")), (snap) => {
            let h = "";
            snap.forEach(d => {
                const v = d.data();
                h += `<div class="card">
                    <p><b>Ruta:</b> ${v.origen.split(',')[0]} ➔ ${v.destino.split(',')[0]}</p>
                    <p>Ofrece: $${v.oferta}</p>
                    <input type="number" id="c-${d.id}" placeholder="Tu precio $">
                    <button class="btn-action" onclick="enviarContraoferta('${d.id}', '${v.cliente}')">OFERTAR</button>
                </div>`;
            });
            document.getElementById("lista-viajes-global").innerHTML = h || "No hay viajes disponibles.";
        });
    }

    window.enviarContraoferta = async (vid, cid) => {
        const p = document.getElementById(`c-${vid}`).value;
        if(!p) return alert("Ingresa un precio");
        await addDoc(collection(db, "ofertas"), { viajeId: vid, driver: auth.currentUser.uid, precio: parseFloat(p).toFixed(2), clienteId: cid, estado: "pendiente" });
        alert("Oferta enviada");
    };

    function escucharOfertas() {
        onSnapshot(query(collection(db, "ofertas"), where("clienteId", "==", auth.currentUser.uid), where("estado", "==", "pendiente")), (snap) => {
            let h = "";
            snap.forEach(d => {
                const o = d.data();
                h += `<div class="oferta-tag">
                    <b class="price-text">$${o.precio}</b> 
                    <button class="btn-action" style="width:auto; padding:8px;" onclick="aceptarOferta('${o.viajeId}', '${d.id}', '${o.driver}', '${o.precio}')">ACEPTAR</button>
                </div>`;
            });
            document.getElementById("lista-ofertas").innerHTML = h;
        });
    }

    window.aceptarOferta = async (vid, oid, did, precioFinal) => {
        await updateDoc(doc(db, "viajes", vid), { estado: "aceptado", driverFinal: did, oferta: precioFinal });
        await updateDoc(doc(db, "ofertas", oid), { estado: "aceptada" });
        abrirChat(vid, "Conductor");
    };

    function escucharMisAceptaciones() {
        onSnapshot(query(collection(db, "ofertas"), where("driver", "==", auth.currentUser.uid), where("estado", "==", "aceptada")), (snap) => {
            let h = "";
            snap.forEach(d => {
                const o = d.data();
                h += `<div class="card">✅ ¡Aceptado! $${o.precio} <button class="btn-action" onclick="abrirChat('${o.viajeId}', 'Cliente')">ABRIR CHAT</button></div>`;
            });
            document.getElementById("mis-chats-driver").innerHTML = h;
        });
    }

    // --- CHAT Y FINALIZACIÓN ---
    window.abrirChat = (id, tipo) => {
        chatIdActivo = id;
        document.getElementById('chat-titulo').innerText = "Chat con " + tipo;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
        document.getElementById('chat-view').classList.add('active-section');
        escucharMensajes(id);
    };

    window.enviarMensaje = async () => {
        const txt = document.getElementById('msg-input').value;
        if(!txt) return;
        await addDoc(collection(db, "mensajes"), { viajeId: chatIdActivo, remitente: auth.currentUser.uid, texto: txt, fecha: serverTimestamp() });
        document.getElementById('msg-input').value = "";
    };

    function escucharMensajes(id) {
        onSnapshot(query(collection(db, "mensajes"), where("viajeId", "==", id), orderBy("fecha")), (snap) => {
            let h = "";
            snap.forEach(m => {
                const c = m.data().remitente === auth.currentUser.uid ? "msg-mio" : "msg-otro";
                h += `<div class="${c}">${m.data().texto}</div>`;
            });
            const box = document.getElementById("mensajes-box");
            box.innerHTML = h; box.scrollTop = box.scrollHeight;
        });
    }

    window.marcarComoFinalizado = async () => {
        if(confirm("¿El viaje ha terminado y el pago fue recibido?")) {
            await updateDoc(doc(db, "viajes", chatIdActivo), { estado: "finalizado" });
            alert("Viaje guardado en el historial.");
            location.reload();
        }
    }

    window.cerrarSesion = () => signOut(auth).then(() => location.reload());
</script>
</body>
</html>
