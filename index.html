<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN CAR PRO</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root { --primary: #2ecc71; --secondary: #1a1a1a; --accent: #f1c40f; --white: #ffffff; --danger: #e74c3c; --chat-bg: #e5ddd5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--secondary); color: white; padding-bottom: 50px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        header { text-align: center; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 0 0 25px 25px; border-bottom: 2px solid var(--primary); margin-bottom: 20px; }
        .card { background: var(--white); color: #333; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 15px; position: relative; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        
        #map { width: 100%; height: 300px; border-radius: 20px; margin-bottom: 15px; border: 2px solid var(--primary); z-index: 1; }
        .section { display: none; }
        .active-section { display: block; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: white; color: #333; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; position: relative;}

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .suggestions { background: white; color: black; position: absolute; width: 100%; z-index: 1000; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); max-height: 150px; overflow-y: auto; }
        .suggestion-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; color: #333; font-size: 12px; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
        
        #chat-box { height: 250px; overflow-y: auto; background: var(--chat-bg); padding: 10px; border-radius: 10px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
        .file-label { font-size: 12px; display: block; margin-top: 6px; color: #555; font-weight: bold; }
        .countdown-timer { background: var(--danger); color: white; padding: 5px; text-align: center; border-radius: 8px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; letter-spacing: 2px;">RUN <span style="color:var(--primary)">CAR</span></h2>
</header>

<div class="container">
    <!-- AUTENTICACIÓN -->
    <div id="auth-container" class="section active-section">
        <div class="card">
            <h3 style="text-align:center; margin-top:0;">Acceso</h3>
            <input type="email" id="auth-email" placeholder="Correo">
            <input type="password" id="auth-pass" placeholder="Contraseña">
            
            <div id="reg-fields" style="display:none;">
                <input type="text" id="reg-nombre" placeholder="Nombre Completo">
                
                <label class="file-label">Foto de Perfil (Obligatorio):</label>
                <input type="file" id="reg-foto-perfil" accept="image/*">

                <div style="display: flex; gap: 5px; margin-top: 5px;">
                    <select id="reg-prefijo" style="flex: 1;"><option value="+503">+503</option></select>
                    <input type="tel" id="reg-tel" placeholder="WhatsApp" style="flex: 2;">
                </div>
                <select id="reg-rol">
                    <option value="cliente">Soy Cliente</option>
                    <option value="driver">Quiero ser Conductor</option>
                </select>

                <div id="driver-register-fields" style="display: none; border-top: 1px dashed #ccc; margin-top: 10px; padding-top: 5px;">
                    <input type="text" id="reg-placa" placeholder="Número de Placa">
                    <input type="number" id="reg-anio" placeholder="Año del Vehículo (Mayor a 2014)">
                    
                    <label class="file-label">Foto de Licencia de Conducir:</label>
                    <input type="file" id="reg-foto-licencia" accept="image/*">
                    
                    <label class="file-label">Foto de Tarjeta de Circulación:</label>
                    <input type="file" id="reg-foto-tarjeta" accept="image/*">

                    <label class="file-label">Foto de solvencia de la Policía:</label>
                    <input type="file" id="reg-foto-solvencia" accept="image/*">

                    <label class="file-label">Foto de Antecedentes Penales:</label>
                    <input type="file" id="reg-foto-antecedentes" accept="image/*">
                    
                    <label class="file-label">Fotos del Vehículo:</label>
                    <input type="file" id="reg-foto-vehiculo" accept="image/*">
                </div>
            </div>
            
            <button class="btn-action" id="btn-auth-main">INGRESAR</button>
            <p id="btn-switch-auth" style="text-align:center; cursor:pointer; color:#666;" onclick="switchAuth()">¿No tienes cuenta? Regístrate</p>
        </div>
    </div>

    <!-- VISTA CLIENTE -->
    <div id="cliente-view" class="section">
        <div id="map"></div>
        <div class="card">
            <button id="btn-gps" onclick="usarGPS()" style="background:#3498db; margin-bottom:10px;" class="btn-action">📍 USAR MI UBICACIÓN ACTUAL</button>
            <input id="origin" placeholder="📍 Origen (Dirección o Coordenadas)" oninput="buscarDireccion(this, 'sug-origin')">
            <div id="sug-origin" class="suggestions"></div>
            <input id="destination" placeholder="🏁 Destino (Dirección o Coordenadas)" oninput="buscarDireccion(this, 'sug-dest')">
            <div id="sug-dest" class="suggestions"></div>

            <div class="grid-inputs">
                <div><label><small>Pers.</small></label><input type="number" id="p-adultos" value="1"></div>
                <div><label><small>Bebés</small></label><input type="number" id="p-bebes" value="0"></div>
                <div><label><small>Mascotas</small></label><input type="number" id="p-mascotas" value="0"></div>
                <div><label><small>Carga (kg)</small></label><input type="number" id="p-carga" value="0"></div>
                <div style="grid-column: span 2;">
                    <textarea id="p-notes" placeholder="Notas extras (ej. Maletas grandes, aire acondicionado...)"></textarea>
                </div>
            </div>

            <div id="precio-area" style="display:none; text-align:center; border-top: 1px solid #eee; margin-top:10px; padding-top:10px;">
                <p>Distancia: <b id="distanciaText">0 km</b> | Sugerido App: <b id="priceMaps">$0.00</b></p>
                <input type="number" id="oferta-cliente" placeholder="Tu oferta $" style="font-size:18px; text-align:center;">
                <button class="btn-action" id="btn-publicar-viaje" onclick="publicarViaje()">ENVIAR OFERTA AL CONDUCTOR</button>
            </div>
            <button id="btn-calc" onclick="calcularRutaOSRM()" class="btn-action" style="background:#444;">CALCULAR RUTA</button>
        </div>
    </div>

    <!-- VISTA CONDUCTOR -->
    <div id="driver-view" class="section">
        <div class="card">
            <h4 style="margin:0">Ganancias (Últimos 5 días)</h4>
            <div id="driver-stats"></div>
        </div>
        <h4 style="color:var(--primary)">Viajes Solicitados</h4>
        <div id="lista-viajes-global"></div>
    </div>

    <!-- VENTANA FLOTANTE (NEGOCIACIÓN) -->
    <div id="modal-negociacion" class="modal">
        <div class="modal-content" id="modal-content-body"></div>
    </div>

    <button id="btn-logout" onclick="cerrarSesion()" class="btn-action" style="display:none; background:var(--danger); margin-top:20px;">CERRAR SESIÓN</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot, serverTimestamp, doc, updateDoc, getDoc, orderBy, setDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAyRrBUmw4OEzS7EmvK_XmDk6Z5rrjLC3A",
        authDomain: "runcar-6eda0.firebaseapp.com",
        projectId: "runcar-6eda0",
        storageBucket: "runcar-6eda0.firebasestorage.app",
        messagingSenderId: "152627344672",
        appId: "1:152627344672:web:b420d1c8cbb670069b9345"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let lMap, markerOrigen, markerDestino, polylineRuta;
    let coordsOrigen = null, coordsDestino = null;
    let miRol = "", miUid = "", miNombre = "", miFoto = "", isReg = false;
    let chatEscuchandoActivo = false;
    let countdownInterval = null;

    document.getElementById('reg-rol').addEventListener('change', function() {
        document.getElementById('driver-register-fields').style.display = this.value === 'driver' ? 'block' : 'none';
    });

    const toBase64 = file => new Promise((resolve, reject) => {
        if(!file) return resolve("");
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    // --- CONEXIÓN / MONITOREO SESIÓN ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            miUid = user.uid;
            const userDoc = await getDoc(doc(db, "usuarios", miUid));
            if(userDoc.exists()) {
                const data = userDoc.data();
                miRol = data.rol;
                miNombre = data.nombre;
                miFoto = data.fotoPerfil;
                
                document.getElementById('auth-container').classList.remove('active-section');
                document.getElementById('btn-logout').style.display = 'block';
                
                if(miRol === 'cliente') {
                    document.getElementById('cliente-view').classList.add('active-section');
                    window.initLeaflet();
                    escucharViajeCliente();
                } else if(miRol === 'driver') {
                    document.getElementById('driver-view').classList.add('active-section');
                    mostrarContabilidad();
                    escucharViajesDriver();
                }
            }
        } else {
            miUid = ""; miRol = "";
            document.getElementById('auth-container').classList.add('active-section');
            document.getElementById('cliente-view').classList.remove('active-section');
            document.getElementById('driver-view').classList.remove('active-section');
            document.getElementById('btn-logout').style.display = 'none';
            if(document.getElementById('chat-active')) document.getElementById('chat-active').remove();
        }
    });

    window.cerrarSesion = () => signOut(auth);

    // --- MAPA ---
    window.initLeaflet = () => {
        if (lMap) return;
        lMap = L.map('map').setView([13.7, -89.2], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(lMap);

        markerOrigen = L.marker([13.7, -89.2], {draggable: true}).addTo(lMap).bindPopup("Origen (A)");
        markerDestino = L.marker([13.71, -89.21], {draggable: true}).addTo(lMap).bindPopup("Destino (B)");

        markerOrigen.on('dragend', (e) => {
            const pos = e.target.getLatLng();
            coordsOrigen = [pos.lat, pos.lng];
            reverseGeocode(pos, 'origin');
        });
        markerDestino.on('dragend', (e) => {
            const pos = e.target.getLatLng();
            coordsDestino = [pos.lat, pos.lng];
            reverseGeocode(pos, 'destination');
        });
    };

    async function reverseGeocode(latlng, inputId) {
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latlng.lat}&lon=${latlng.lng}`);
            const data = await res.json();
            document.getElementById(inputId).value = data.display_name || `${latlng.lat}, ${latlng.lng}`;
        } catch(e) {
            document.getElementById(inputId).value = `${latlng.lat}, ${latlng.lng}`;
        }
    }

    window.usarGPS = () => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const c = [pos.coords.latitude, pos.coords.longitude];
                coordsOrigen = c;
                markerOrigen.setLatLng(c);
                lMap.flyTo(c, 15);
                reverseGeocode({lat: c[0], lng: c[1]}, 'origin');
            });
        }
    };

    window.buscarDireccion = async (input, targetId) => {
        const val = input.value;
        if(val.includes(',') && val.split(',').length === 2) {
            const p = val.split(',');
            const c = [parseFloat(p[0]), parseFloat(p[1])];
            if(!isNaN(c[0]) && !isNaN(c[1])) {
                if(input.id === 'origin') { coordsOrigen = c; markerOrigen.setLatLng(c); }
                else { coordsDestino = c; markerDestino.setLatLng(c); }
                return;
            }
        }
        if (val.length < 4) return;
        try {
            const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(val)}&limit=5`);
            const data = await res.json();
            let h = "";
            data.features.forEach(f => {
                const lbl = `${f.properties.name || ''} ${f.properties.city || ''}`.trim();
                h += `<div class="suggestion-item" onclick="seleccionarPos('${input.id}','${lbl.replace(/'/g, "\\'")}',${f.geometry.coordinates[1]},${f.geometry.coordinates[0]},'${targetId}')">${lbl}</div>`;
            });
            document.getElementById(targetId).innerHTML = h;
        } catch(e) { console.error(e); }
    };

    window.seleccionarPos = (inputId, lbl, lat, lon, targetId) => {
        document.getElementById(inputId).value = lbl;
        document.getElementById(targetId).innerHTML = "";
        const c = [lat, lon];
        if (inputId === 'origin') { coordsOrigen = c; markerOrigen.setLatLng(c); }
        else { coordsDestino = c; markerDestino.setLatLng(c); }
        lMap.flyTo(c, 14);
    };

    window.calcularRutaOSRM = async () => {
        if(!coordsOrigen || !coordsDestino) return alert("Selecciona origen y destino");
        try {
            const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coordsOrigen[1]},${coordsOrigen[0]};${coordsDestino[1]},${coordsDestino[0]}?overview=full&geometries=geojson`);
            const data = await res.json();
            if (data.code === 'Ok') {
                const r = data.routes[0];
                const km = r.distance / 1000;
                
                let precio = 0;
                if(km <= 1) precio = 1;
                else if(km <= 2) precio = 2;
                else if(km <= 3) precio = 3;
                else precio = 3 + (km - 3) * 0.30;

                if (polylineRuta) lMap.removeLayer(polylineRuta);
                polylineRuta = L.geoJSON(r.geometry, {style:{color:'#2ecc71', weight:5}}).addTo(lMap);
                lMap.fitBounds(polylineRuta.getBounds());

                document.getElementById("distanciaText").innerText = km.toFixed(2) + " km";
                document.getElementById("priceMaps").innerText = "$" + precio.toFixed(2);
                document.getElementById("oferta-cliente").value = precio.toFixed(2);
                document.getElementById("precio-area").style.display = 'block';
            }
        } catch(e) { alert("Error al calcular ruta"); }
    };

    // --- TEMPORIZADOR DE 8 SEGUNDOS GLOBAL ---
    function iniciarTemporizador(idViaje, accionTimeout) {
        clearInterval(countdownInterval);
        let tiempoRestante = 8;
        const timerElement = document.getElementById("timer-countdown");
        if(timerElement) timerElement.innerText = tiempoRestante;

        countdownInterval = setInterval(async () => {
            tiempoRestante--;
            const timerElementUpdate = document.getElementById("timer-countdown");
            if(timerElementUpdate) timerElementUpdate.innerText = tiempoRestante;

            if(tiempoRestante <= 0) {
                clearInterval(countdownInterval);
                cerrarModal();
                if(accionTimeout) await accionTimeout(idViaje);
            }
        }, 1000);
    }

    // --- GESTIÓN DE VIAJES Y NEGOCIACIÓN ---
    window.publicarViaje = async () => {
        if (!miUid) return alert("Identificación de usuario no válida.");
        const viaje = {
            clienteId: miUid,
            clienteNombre: miNombre,
            origen: document.getElementById("origin").value,
            destino: document.getElementById("destination").value,
            km: document.getElementById("distanciaText").innerText,
            precioApp: document.getElementById("priceMaps").innerText,
            ofertaActual: parseFloat(document.getElementById("oferta-cliente").value),
            ofertaDe: "cliente",
            personas: document.getElementById("p-adultos").value,
            bebes: document.getElementById("p-bebes").value,
            mascotas: document.getElementById("p-mascotas").value,
            carga: document.getElementById("p-carga").value,
            notas: document.getElementById("p-notes").value,
            estado: "buscando",
            timestamp: serverTimestamp()
        };
        const docRef = await addDoc(collection(db, "viajes"), viaje);
        abrirModalEsperaCliente(docRef.id);
    };

    function abrirModalEsperaCliente(idViaje) {
        const modal = document.getElementById("modal-negociacion");
        const body = document.getElementById("modal-content-body");
        body.innerHTML = `
            <div class="countdown-timer">Tiempo para respuesta: <span id="timer-countdown">8</span>s</div>
            <h3>Esperando Conductores...</h3>
            <p>Tu oferta base y sugerida han sido enviadas. Tienen 8 segundos para interactuar.</p>
        `;
        modal.style.display = "flex";
        
        iniciarTemporizador(idViaje, async (id) => {
            await updateDoc(doc(db, "viajes", id), { estado: 'cancelado' });
            alert("No se recibió respuesta a tiempo. La solicitud se cerró.");
        });
    }

    function escucharViajeCliente() {
        const q = query(collection(db, "viajes"), where("clienteId", "==", miUid));
        onSnapshot(q, (snap) => {
            if(snap.empty) return;
            let documentos = [];
            snap.forEach(doc => { documentos.push({ id: doc.id, ...doc.data() }); });
            documentos.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
            
            const v = documentos[0];
            const vId = v.id;

            if(v.estado === "negociando" && v.ofertaDe === "driver") {
                abrirNegociacionCliente(vId, v);
            } 
            else if(v.estado === "accepted") {
                clearInterval(countdownInterval);
                if(!document.getElementById('chat-active')) {
                    window.abrirChat(vId);
                }
            }
            else if(v.estado === "rechazado" || v.estado === "cancelado") {
                clearInterval(countdownInterval);
                cerrarModal();
            }
        });
    }

    function escucharViajesDriver() {
        onSnapshot(collection(db, "viajes"), (snap) => {
            const container = document.getElementById("lista-viajes-global");
            if(!container) return;
            container.innerHTML = "";
            snap.forEach(docSnap => {
                const v = docSnap.data();
                const vid = docSnap.id;
                
                if(v.estado === "buscando") {
                    const card = document.createElement("div");
                    card.className = "card";
                    card.innerHTML = `
                        <p><b>De:</b> ${v.origen ? v.origen.substring(0,40) : ''}...</p>
                        <p><b>A:</b> ${v.destino ? v.destino.substring(0,40) : ''}...</p>
                        <p><b>Precio App:</b> ${v.precioApp} | <b>Oferta Cliente:</b> $${v.ofertaActual}</p>
                        <button class="btn-action" onclick="abrirNegociacionDriver('${vid}')">VER DETALLES / RESPONDER</button>
                    `;
                    container.appendChild(card);
                }
            });
        });
    }

    window.abrirNegociacionDriver = async (id) => {
        const docRef = doc(db, "viajes", id);
        const snapshot = await getDoc(docRef);
        if(!snapshot.exists() || snapshot.data().estado !== "buscando") {
            alert("El viaje ya no está disponible.");
            return;
        }
        const v = snapshot.data();
        const modal = document.getElementById("modal-negociacion");
        const body = document.getElementById("modal-content-body");

        body.innerHTML = `
            <div class="countdown-timer">Tiempo restante: <span id="timer-countdown">8</span>s</div>
            <h3>Detalles del Viaje</h3>
            <p><small><b>Origen:</b> ${v.origen}</small></p>
            <p><small><b>Destino:</b> ${v.destino}</small></p>
            <p><b>Precio App:</b> ${v.precioApp} | <b>Oferta de Cliente:</b> $${v.ofertaActual}</p>
            <hr>
            <div style="display:flex; flex-direction:column; gap:5px;">
                <button class="btn-action" onclick="responderDriver('${id}', 'aceptar')">ACEPTAR VIAJE</button>
                <button class="btn-action" style="background:#f1c40f; color:black;" onclick="contraofertaDriver('${id}')">ENVIAR PROPUESTA</button>
                <button class="btn-action" style="background:red" onclick="responderDriver('${id}', 'rechazar')">CANCELAR / RECHAZAR</button>
            </div>
        `;
        modal.style.display = "flex";

        // Vinculación del listener para cerrar la ventana del driver si el viaje es cancelado externamente
        const unsub = onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists() && (docSnap.data().estado === 'cancelado' || docSnap.data().estado === 'accepted')) {
                clearInterval(countdownInterval);
                cerrarModal();
                unsub();
            }
        });

        iniciarTemporizador(id, async (idViaje) => {
            cerrarModal();
            unsub();
        });
    };

    window.responderDriver = async (id, accion, valor = null) => {
        clearInterval(countdownInterval);
        const docRef = doc(db, "viajes", id);
        
        // Verificar transacciones concurrentes: El primero que acepta se lo lleva
        const snapActual = await getDoc(docRef);
        if(snapActual.data().estado === 'accepted' && accion === 'aceptar') {
            cerrarModal();
            alert("Otro conductor ya aceptó este viaje.");
            return;
        }

        if(accion === 'aceptar') {
            await updateDoc(docRef, { estado: 'accepted', driverId: miUid, driverNombre: miNombre });
            cerrarModal();
            window.abrirChat(id);
        } else if (accion === 'contraoferta') {
            await updateDoc(docRef, { 
                ofertaActual: valor, 
                ofertaDe: 'driver', 
                driverId: miUid, 
                driverNombre: miNombre, 
                estado: 'negociando' 
            });
            cerrarModal();
            abrirModalEsperaContraoferta(id);
        } else if (accion === 'rechazar') {
            await updateDoc(docRef, { estado: 'rechazado' });
            cerrarModal();
        }
    };

    function abrirModalEsperaContraoferta(idViaje) {
        const modal = document.getElementById("modal-negociacion");
        const body = document.getElementById("modal-content-body");
        body.innerHTML = `
            <div class="countdown-timer">Esperando cliente: <span id="timer-countdown">8</span>s</div>
            <h3>Propuesta Enviada</h3>
            <p>Esperando que el cliente acepte o rechace tu precio...</p>
        `;
        modal.style.display = "flex";

        const unsub = onSnapshot(doc(db, "viajes", idViaje), (docSnap) => {
            if (docSnap.exists() && docSnap.data().estado === 'rechazado') {
                clearInterval(countdownInterval);
                cerrarModal();
                alert("El cliente rechazó tu propuesta.");
                unsub();
            }
        });

        iniciarTemporizador(idViaje, async (id) => {
            await updateDoc(doc(db, "viajes", id), { estado: 'rechazado' });
            cerrarModal();
            unsub();
        });
    }

    window.contraofertaDriver = (id) => {
        const monto = prompt("Ingresa tu propuesta de precio para el viaje:");
        if(monto && !isNaN(monto)) {
            responderDriver(id, 'contraoferta', parseFloat(monto));
        }
    };

    window.abrirNegociacionCliente = async (id, v) => {
        const modal = document.getElementById("modal-negociacion");
        const body = document.getElementById("modal-content-body");

        body.innerHTML = `
            <div class="countdown-timer">Tiempo para decidir: <span id="timer-countdown">8</span>s</div>
            <h3>¡Nueva Propuesta de Conductor!</h3>
            <p>El conductor <b>${v.driverNombre}</b> propone un precio diferente.</p>
            <p style="font-size:18px; text-align:center; color:var(--primary)"><b>Nueva Oferta: $${v.ofertaActual}</b></p>
            <hr>
            <div style="display:flex; gap:5px;">
                <button class="btn-action" onclick="responderCliente('${id}', 'aceptar')">ACEPTAR</button>
                <button class="btn-action" style="background:red" onclick="responderCliente('${id}', 'rechazar')">RECHAZAR</button>
            </div>
        `;
        modal.style.display = "flex";

        iniciarTemporizador(id, async (idViaje) => {
            await updateDoc(doc(db, "viajes", idViaje), { estado: 'rechazado' });
            cerrarModal();
        });
    };

    window.responderCliente = async (id, accion) => {
        clearInterval(countdownInterval);
        const docRef = doc(db, "viajes", id);
        if(accion === 'aceptar') {
            await updateDoc(docRef, { estado: 'accepted' });
            cerrarModal();
            window.abrirChat(id);
        } else if(accion === 'rechazar') {
            await updateDoc(docRef, { estado: 'rechazado' }); 
            cerrarModal();
        }
    };

    // --- CHAT EN TIEMPO REAL ---
    window.abrirChat = (id) => {
        cerrarModal();
        const oldChat = document.getElementById('chat-active');
        if(oldChat) oldChat.remove();

        document.getElementById('driver-view').classList.remove('active-section');
        document.getElementById('cliente-view').classList.remove('active-section');

        const chatUI = document.createElement("div");
        chatUI.className = "card active-section";
        chatUI.id = "chat-active";

        chatUI.innerHTML = `
            <div style="background:orange;padding:10px;border-radius:10px;margin-bottom:10px;font-size:12px;color:black;font-weight:bold;text-align:center;">
                ⚠️ VIAJE EN CURSO - CHAT ACTIVO
            </div>
            <div id="chat-box"></div>
            <input id="chat-input" placeholder="Escribe un mensaje...">
            <button class="btn-action" id="btn-send-msg">ENVIAR</button>
            <button class="btn-action" style="background:var(--danger);margin-top:10px;" id="btn-finalizar-viaje">FINALIZAR VIAJE</button>
        `;

        document.querySelector(".container").insertBefore(chatUI, document.getElementById('btn-logout'));

        document.getElementById('btn-send-msg').onclick = () => window.enviarMensaje(id);
        document.getElementById('btn-finalizar-viaje').onclick = () => window.finalizarViaje(id);

        if (chatEscuchandoActivo) return; 
        chatEscuchandoActivo = true;

        const mensajesRef = query(collection(db, "viajes", id, "mensajes"), orderBy("timestamp", "asc"));

        onSnapshot(mensajesRef, (snapshot) => {
            const box = document.getElementById("chat-box");
            if(!box) return;
            box.innerHTML = "";

            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                const isMine = data.uid === miUid;
                const div = document.createElement("div");
                
                const fotoAvatar = data.foto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

                div.style.display = "flex";
                div.style.flexDirection = isMine ? "row-reverse" : "row";
                div.style.alignItems = "flex-end";
                div.style.gap = "8px";

                div.innerHTML = `
                    <img src="${fotoAvatar}" style="width:35px; height:35px; border-radius:50%; object-fit:cover; border:2px solid ${isMine ? 'var(--primary)' : '#ccc'};">
                    <div style="
                        max-width:75%;
                        padding:10px;
                        border-radius:15px;
                        background:${isMine ? '#2ecc71' : '#ffffff'};
                        color:${isMine ? 'white' : 'black'};
                        box-shadow:0 2px 5px rgba(0,0,0,0.2);
                        word-wrap:break-word;
                    ">
                        <b style="font-size:11px;">${data.user}</b><br>
                        ${data.msg}
                    </div>
                `;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    window.enviarMensaje = async (id) => {
        const input = document.getElementById("chat-input");
        if(!input) return;
        const texto = input.value.trim();
        if(texto === "") return;

        try {
            await addDoc(collection(db, "viajes", id, "mensajes"), {
                uid: miUid,
                user: miNombre,
                foto: miFoto, 
                msg: texto,
                timestamp: serverTimestamp()
            });
            input.value = "";
        } catch(error) { console.error("Error enviando mensaje:", error); }
    };

    window.finalizarViaje = async (id) => {
        const docRef = doc(db, "viajes", id);
        const v = (await getDoc(docRef)).data();
        await updateDoc(docRef, { 
            estado: 'finalizado', 
            fechaFinalizado: new Date().toISOString().split('T')[0],
            precioFinal: v.ofertaActual 
        });
        alert("Viaje finalizado exitosamente.");
        location.reload();
    };

    // --- CONTABILIDAD ---
    async function obtenerSubtotalesDriver(driverUid, diasArray) {
        const q = query(collection(db, "viajes"), where("driverId", "==", driverUid), where("estado", "==", "finalizado"));
        const snap = await getDocs(q);
        let subTotales = {};
        diasArray.forEach(d => subTotales[d] = 0);
        snap.forEach(doc => {
            const v = doc.data();
            if (subTotales[v.fechaFinalizado] !== undefined) subTotales[v.fechaFinalizado] += v.precioFinal || 0;
        });
        return subTotales;
    }

    async function mostrarContabilidad() {
        const hoy = new Date();
        const dias = [];
        for(let i=0; i<5; i++) {
            let d = new Date();
            d.setDate(hoy.getDate() - i);
            dias.push(d.toISOString().split('T')[0]);
        }

        const subTotales = await obtenerSubtotalesDriver(miUid, dias);
        let tabla = `<table><tr><th>Fecha</th><th>Total</th><th>8%</th></tr>`;
        dias.forEach(dia => {
            const total = subTotales[dia];
            tabla += `<tr><td>${dia}</td><td>$${total.toFixed(2)}</td><td>$${(total * 0.08).toFixed(2)}</td></tr>`;
        });
        tabla += `</table>`;
        document.getElementById("driver-stats").innerHTML = tabla;
    }

    window.cerrarModal = () => {
        document.getElementById("modal-negociacion").style.display = "none";
    };

    // --- AUTENTICACIÓN ---
    window.switchAuth = () => {
        isReg = !isReg;
        document.getElementById('reg-fields').style.display = isReg ? 'block' : 'none';
        document.getElementById('btn-auth-main').innerText = isReg ? 'REGISTRARME' : 'INGRESAR';
        if(!isReg) document.getElementById('driver-register-fields').style.display = 'none';
    };

    document.getElementById('btn-auth-main').addEventListener('click', async () => {
        const mail = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        
        if(!mail || !pass) return alert("Ingresa correo y contraseña");

        try {
            if(isReg) {
                const nombre = document.getElementById('reg-nombre').value;
                const rolSeleccionado = document.getElementById('reg-rol').value;
                
                const filePerfil = document.getElementById('reg-foto-perfil').files[0];
                if(!filePerfil) return alert("La foto de perfil es obligatoria.");
                const base64Perfil = await toBase64(filePerfil);

                let datosUsuario = {
                    nombre: nombre,
                    rol: rolSeleccionado,
                    fotoPerfil: base64Perfil, 
                    whatsapp: document.getElementById('reg-prefijo').value + document.getElementById('reg-tel').value,
                    activo: true
                };

                if(rolSeleccionado === 'driver') {
                    const anio = parseInt(document.getElementById('reg-anio').value);
                    if(isNaN(anio) || anio <= 2014) {
                        return alert("Error: El año del vehículo debe ser estrictamente mayor al 2014 para poder registrarte.");
                    }
                    datosUsuario.placa = document.getElementById('reg-placa').value;
                    datosUsuario.anio = anio;
                    datosUsuario.fotoLicencia = await toBase64(document.getElementById('reg-foto-licencia').files[0]);
                    datosUsuario.fotoTarjeta = await toBase64(document.getElementById('reg-foto-tarjeta').files[0]);
                    datosUsuario.fotoSolvencia = await toBase64(document.getElementById('reg-foto-solvencia').files[0]);
                    datosUsuario.fotoAntecedentes = await toBase64(document.getElementById('reg-foto-antecedentes').files[0]);
                    datosUsuario.fotoVehiculo = await toBase64(document.getElementById('reg-foto-vehiculo').files[0]);
                }

                const userCredential = await createUserWithEmailAndPassword(auth, mail, pass);
                await setDoc(doc(db, "usuarios", userCredential.user.uid), datosUsuario);
            } else {
                await signInWithEmailAndPassword(auth, mail, pass);
            }
        } catch(error) { alert("Error en autenticación: " + error.message); }
    });
</script>
</body>
</html>
