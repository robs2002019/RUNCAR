<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RUN CAR PRO GLOBAL</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"/>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.11/build/css/intlTelInput.css"/>

<style>

:root{
--primary:#0ea5e9;
--bg:#0f172a;
--card:#1e293b;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:var(--bg);
color:white;
}

header{
background:#111827;
padding:15px;
text-align:center;
font-size:1.3rem;
font-weight:bold;
color:var(--primary);
border-bottom:2px solid var(--primary);
}

.container{
padding:15px;
max-width:900px;
margin:auto;
}

.card{
background:var(--card);
padding:20px;
border-radius:15px;
margin-bottom:20px;
border:1px solid #334155;
}

.hidden{
display:none!important;
}

h2{
margin-bottom:15px;
color:var(--primary);
font-size:1rem;
text-transform:uppercase;
letter-spacing:1px;
}

input,
textarea,
select{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#334155;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
background:var(--primary);
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

#map{
width:100%;
height:350px;
border-radius:12px;
margin-top:10px;
}

.stats-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.stat-box{
background:#111827;
padding:10px;
border-radius:10px;
text-align:center;
border:1px solid #334155;
}

.role-selector{
display:flex;
gap:10px;
margin-bottom:15px;
}

.role-btn{
flex:1;
padding:12px;
border-radius:10px;
background:#334155;
text-align:center;
cursor:pointer;
}

.role-btn.active{
background:var(--primary);
}

.chat-area{
height:220px;
overflow-y:auto;
background:#0f172a;
padding:10px;
border-radius:10px;
display:flex;
flex-direction:column;
}

.msg{
padding:8px 12px;
border-radius:12px;
margin-bottom:5px;
max-width:80%;
font-size:.9rem;
}

.msg.sent{
background:var(--primary);
align-self:flex-end;
}

.msg.received{
background:#334155;
align-self:flex-start;
}

.trip-card{
background:#111827;
padding:10px;
border-radius:10px;
margin-bottom:10px;
border:1px solid #334155;
}

.small{
font-size:.8rem;
color:#94a3b8;
margin-top:5px;
}

</style>

</head>
<body>

<header>
RUN CAR PRO GLOBAL
</header>

<div class="container">

<!-- LOGIN -->

<div id="sectionAuth" class="card">

<h2>Bienvenido</h2>

<p class="small">
Inicia sesión para continuar
</p>

<button id="btnGoogleLogin"
style="background:white;color:black;">

<img
src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
width="18"
style="vertical-align:middle;margin-right:8px;">

Continuar con Google

</button>

</div>

<!-- PERFIL -->

<div id="sectionProfile"
class="card hidden">

<h2>Completa tu Perfil</h2>

<div class="role-selector">

<div id="selectCliente"
class="role-btn active">
Soy Cliente
</div>

<div id="selectDriver"
class="role-btn">
Soy Conductor
</div>

</div>

<input type="text"
id="regNombre"
placeholder="Nombre completo">

<input type="tel"
id="regTel">

<div id="fieldsDriver"
class="hidden">

<input type="text"
id="vehiculoMarca"
placeholder="Marca y modelo">

<input type="text"
id="vehiculoPlaca"
placeholder="Número de placa">

<label class="small">
Licencia / Documentos
</label>

<input type="file"
id="driverDocs"
accept="image/*">

</div>

<button id="btnSaveProfile">
Finalizar Registro
</button>

</div>

<!-- APP -->

<div id="sectionMain"
class="hidden">

<!-- CLIENTE -->

<div id="panelCliente"
class="card">

<h2>
📍 Solicitar Viaje
</h2>

<input type="text"
id="inputA"
placeholder="Origen"
readonly>

<input type="text"
id="inputB"
placeholder="Destino"
readonly>

<div id="map"></div>

<div class="stats
