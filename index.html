<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN CAR PRO</title>
    
    <!-- Leaflet CSS para los mapas -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- intl-tel-input CSS para banderas y código de país -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/css/intlTelInput.css" />
    
    <style>
        :root {
            --primary: #2ecc71;
            --danger: #e74c3c;
            --bg: #f4f7f6;
            --text: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        /* Control de Vistas */
        .app-section { display: none; }
        .active-section { display: block; animation: fadeIn 0.3s ease-in; }
        
        /* Tarjetas y Formularios */
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        input, select {
            width: 100%; padding: 12px; margin: 8px 0 16px;
            border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box;
            font-size: 14px;
        }
        
        /* Ajuste específico para que el input telefónico de banderas encaje en el diseño */
        .iti { width: 100%; margin: 8px 0 16px; display: block; }
        .iti input { margin: 0; padding-left: 52px !important; }

        .btn-action {
            width: 100%; padding: 14px; background: var(--primary);
            color: white; border: none; border-radius: 8px; cursor: pointer;
            font-weight: bold; font-size: 15px; transition: background 0.2s;
        }
        .btn-action:hover { background: #27ae60; }
        .btn-link {
            background: none; color: var(--primary); border: none;
            cursor: pointer; font-size: 14px; width: 100%; padding: 10px;
        }
        
        /* Mapa */
        #map { height: 350px; width: 100%; border-radius: 12px; margin-bottom: 15px; z-index: 1;}
        .suggestion-item {
            padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px;
        }
        .suggestion-item:hover { background: #f9f9f9; }
        
        /* Modal */
        #modal-negociacion {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 9999;
        }
        .modal-content {
            background: white; padding: 20px; border-radius: 16px;
            width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .countdown-timer {
            text-align: center; font-size: 16px; font-weight: bold;
            color: var(--danger); margin-bottom: 15px;
        }
        
        /* Utilidades */
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <!-- Botón de Cerrar Sesión Global -->
    <div style="text-align: right; margin-bottom: 10px;">
        <button id="btn-logout" class="btn-link" style="display:none; width:auto; color:var(--danger);" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>

    <!-- ============================================== -->
    <!-- 1. PANTALLA DE AUTENTICACIÓN / REGISTRO        -->
    <!-- ============================================== -->
    <div id="auth-container" class="app-section active-section card">
        <h2 style="text-align:center; margin-top:0;">RUN CAR</h2>
        
        <label>Correo Electrónico</label>
        <input type="email" id="auth-email" placeholder="tucorreo@email.com">
        
        <label>Contraseña</label>
        <input type="password" id="auth-pass" placeholder="******">
        
        <!-- Campos extra para Registro (Ocultos por defecto) -->
        <div id="reg-fields" style="display:none;">
            <label>Nombre Completo</label>
            <input type="text" id="reg-nombre" placeholder="Ej. Juan Pérez">
            
            <label>Teléfono</label>
            <!-- El input de teléfono modificado para la librería intl-tel-input -->
            <input type="tel" id="reg-tel">
            
            <label>Foto de Perfil</label>
            <input type="file" id="reg-foto-perfil" accept="image/*">
            
            <label>¿Qué deseas hacer?</label>
            <select id="reg-rol">
                <option value="cliente">Quiero viajar (Cliente)</option>
                <option value="driver">Quiero conducir (Conductor)</option>
            </select>
            
            <!-- Datos del vehículo (Ocultos por defecto) -->
            <div id="driver-register-fields" style="display:none; background:#f9f9f9; padding:10px; border-radius:8px;">
                <h4>Datos de tu Vehículo</h4>
                <input type="text" id="reg-placa" placeholder="Placa (Ej. P123456)">
                <input type="text" id="reg-marca" placeholder="Marca (Ej. Toyota)">
                <input type="text" id="reg-modelo" placeholder="Modelo (Ej. Corolla)">
                <input type="number" id="reg-anio" placeholder="Año (Ej. 2018)">
            </div>
        </div>
        
        <button id="btn-auth-main" class="btn-action">INGRESAR</button>
        <button id="btn-switch-auth" class="btn-link" onclick="switchAuth()">¿No tienes cuenta? Regístrate</button>
    </div>

    <!-- ============================================== -->
    <!-- 2. PANTALLA DEL CLIENTE (Pasajero)             -->
    <!-- ============================================== -->
    <div id="cliente-view" class="app-section">
        <div class="card">
            <h3>¿A dónde vamos?</h3>
            <div class="flex-between">
                <label>Origen (A):</label>
                <button class="btn-link" style="width:auto; padding:0;" onclick="usarGPS()">📍 Usar mi GPS</button>
            </div>
            <input type="text" id="origin" placeholder="Ej. Metrocentro San Salvador" oninput="buscarDireccion(this, 'sugerencias-origen')">
            <div id="sugerencias-origen"></div>
            
            <label>Destino (B):</label>
            <input type="text" id="destination" placeholder="Ej. Plaza Merliot" oninput="buscarDireccion(this, 'sugerencias-destino')">
            <div id="sugerencias-destino"></div>
            
            <button class="btn-action" style="background:#34495e; margin-bottom:15px;" onclick="calcularRutaOSRM()">Trazar Ruta en Mapa</button>
            
            <div id="map"></div>
            
            <!-- Resumen de tarifa -->
            <div id="precio-area" style="display:none; background:#e8f8f5; padding:15px; border-radius:8px; margin-bottom:15px;">
                <p style="margin:0 0 5px;">Distancia estimada: <b id="distanciaText">0 km</b></p>
                <p style="margin:0 0 10px;">Tarifa base recomendada: <b id="priceMaps" style="color:var(--primary);">$0.00</b></p>
                <label><b>Tu oferta final:</b></label>
                <input type="number" id="oferta-cliente" step="0.5" placeholder="¿Cuánto ofreces?" style="margin-bottom:0; font-size:18px; font-weight:bold;">
            </div>
            
            <button class="btn-action" onclick="publicarViaje()">SOLICITAR VIAJE</button>
        </div>
    </div>

    <!-- ============================================== -->
    <!-- 3. PANTALLA DEL CONDUCTOR                      -->
    <!-- ============================================== -->
    <div id="driver-view" class="app-section">
        <div class="card" style="background:#2c3e50; color:white;">
            <h3 style="margin-top:0;">Resumen Financiero</h3>
            <div class="flex-between" style="font-size:14px; margin-bottom:5px;">
                <span>Total Bruto:</span> <span id="driver-total-bruto">$0.00</span>
            </div>
            <div class="flex-between" style="font-size:14px; margin-bottom:5px; color:#e74c3c;">
                <span>Comisión App (8%):</span> <span id="driver-comision">-$0.00</span>
            </div>
            <hr style="border-top:1px solid #34495e;">
            <div class="flex-between" style="font-size:18px; font-weight:bold; color:#2ecc71;">
                <span>Ganancia Neta:</span> <span id="driver-total-neto">$0.00</span>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0;">Historial Reciente</h3>
            <table style="width:100%; text-align:left; font-size:14px; border-collapse:collapse;">
                <tbody id="body-ingresos-dias">
                    <!-- Se llena con JS -->
                </tbody>
            </table>
        </div>

        <h3 style="color:#555;">Viajes Disponibles</h3>
        <div id="lista-viajes-global">
            <!-- Tarjetas de viajes buscando conductor se generan aquí -->
        </div>
    </div>

</div>

<!-- ============================================== -->
<!-- 4. MODAL GLOBAL DE NEGOCIACIÓN                 -->
<!-- ============================================== -->
<div id="modal-negociacion">
    <div class="modal-content" id="modal-content-body">
        <!-- El contenido se inyecta dinámicamente vía JavaScript (Cliente o Conductor) -->
    </div>
</div>

<!-- Scripts de Librerías Externas -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/js/intlTelInput.min.js"></script>

<!-- ============================================== -->
<!-- 5. LÓGICA DE LA APLICACIÓN (FIREBASE + JS)     -->
<!-- ============================================== -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot, serverTimestamp, doc, updateDoc, getDoc, orderBy, setDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

    // NOTA DE SEGURIDAD: En producción, asegúrate de restringir esta API Key desde Google Cloud Console
    const firebaseConfig = {
        apiKey: "AIzaSyAyRrBUmw4OEzS7EmvK_XmDk6Z5rrjLC3A",
        authDomain: "runcar-6eda0.firebaseapp.com",
        projectId: "runcar-6eda0",
        storageBucket: "runcar-6eda0.firebasestorage.app",
        messagingSenderId: "152627344672",
        appId: "1:152627344672:web:b420d1c8cbb670069b9345"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // --- INICIALIZACIÓN DE INTL-TEL-INPUT ---
    const phoneInputField = document.querySelector("#reg-tel");
    const phoneInput = window.intlTelInput(phoneInputField, {
        initialCountry: "sv", // País por defecto (El Salvador)
        separateDialCode: true,
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/js/utils.js",
    });

    let lMap, markerOrigen, markerDestino, polylineRuta;
    let coordsOrigen = null, coordsDestino = null;
    let miRol = "", miUid = "", miNombre = "", miFoto = "", isReg = false;
    let miPlaca = "", miMarca = "", miModelo = "";
    let countdownInterval = null;
    let ultimoExpiresAt = null; 

    // Ocultar/Mostrar campos del conductor en registro
    document.getElementById('reg-rol').addEventListener('change', function() {
        document.getElementById('driver-register-fields').style.display = this.value === 'driver' ? 'block' : 'none';
    });

    const toBase64 = file => new Promise((resolve, reject) => {
        if(!file) return resolve("");
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    // --- AUTENTICACIÓN Y REGISTRO ---
    document.getElementById('btn-auth-main').onclick = async () => {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        if(!email || !pass) return alert("Por favor, ingresa correo y contraseña.");

        if(!isReg) {
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch(e) { alert("Error al ingresar: " + e.message); }
        } else {
            const nombre = document.getElementById('reg-nombre').value;
            const rol = document.getElementById('reg-rol').value;
            // OBTENER NÚMERO CON CÓDIGO DE PAÍS
            const tel = phoneInput.getNumber(); 
            const fotoPerfilFile = document.getElementById('reg-foto-perfil').files[0];
            
            if(!nombre || !fotoPerfilFile) return alert("Nombre y Foto de perfil son obligatorios.");
            if(!phoneInput.isValidNumber()) return alert("El número de teléfono ingresado no es válido.");

            const fotoBase64 = await toBase64(fotoPerfilFile);

            let driverData = {};
            if(rol === 'driver') {
                const placa = document.getElementById('reg-placa').value;
                const marca = document.getElementById('reg-marca').value;
                const modelo = document.getElementById('reg-modelo').value;
                const anio = document.getElementById('reg-anio').value;
                if(!placa || !marca || !modelo || !anio) return alert("Completa todos los datos de tu vehículo.");
                driverData = { placa, marca, modelo, anio: parseInt(anio), ingresosDiarios: [] };
            }

            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "usuarios", res.user.uid), {
                    uid: res.user.uid, email, nombre, rol, telefono: tel, fotoPerfil: fotoBase64, ...driverData
                });
            } catch(e) { alert("Error al registrarse: " + e.message); }
        }
    };

    window.switchAuth = () => {
        isReg = !isReg;
        document.getElementById('reg-fields').style.display = isReg ? 'block' : 'none';
        document.getElementById('btn-auth-main').innerText = isReg ? 'REGISTRARSE' : 'INGRESAR';
        document.getElementById('btn-switch-auth').innerText = isReg ? '¿Ya tienes cuenta? Ingresa' : '¿No tienes cuenta? Regístrate';
    };

    // --- MONITOREO SESIÓN ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            miUid = user.uid;
            onSnapshot(doc(db, "usuarios", miUid), (userDoc) => {
                if(userDoc.exists()) {
                    const data = userDoc.data();
                    miRol = data.rol; miNombre = data.nombre; miFoto = data.fotoPerfil;
                    miPlaca = data.placa || ""; miMarca = data.marca || ""; miModelo = data.modelo || "";
                    
                    document.getElementById('auth-container').classList.remove('active-section');
                    document.getElementById('btn-logout').style.display = 'block';
                    
                    if(miRol === 'cliente') {
                        document.getElementById('cliente-view').classList.add('active-section');
                        window.initLeaflet(); escucharViajeCliente();
                    } else if(miRol === 'driver') {
                        document.getElementById('driver-view').classList.add('active-section');
                        calcularYRenderizarFinanzas(data.ingresosDiarios || []);
                        escucharViajesDriver();
                    }
                }
            });
        } else {
            miUid = ""; miRol = "";
            document.getElementById('auth-container').classList.add('active-section');
            document.getElementById('cliente-view').classList.remove('active-section');
            document.getElementById('driver-view').classList.remove('active-section');
            document.getElementById('btn-logout').style.display = 'none';
            if(document.getElementById('chat-active')) document.getElementById('chat-active').remove();
        }
    });

    window.cerrarSesion = () => signOut(auth);

    // --- FINANZAS (CONDUCTOR) ---
    function calcularYRenderizarFinanzas(ingresosDiarios) {
        const tbody = document.getElementById("body-ingresos-dias");
        if(!tbody) return;
        tbody.innerHTML = "";

        const ultimosCinco = [...ingresosDiarios]
            .sort((a,b) => new Date(b.fecha) - new Date(a.fecha))
            .slice(0, 5);

        let totalBruto = 0;

        if(ultimosCinco.length === 0) {
            tbody.innerHTML = `<tr><td colspan="2" style="text-align:center; padding:10px; color:#999;">Sin actividad de viajes registrada</td></tr>`;
        } else {
            ultimosCinco.forEach(item => {
                totalBruto += item.monto;
                tbody.innerHTML += `
                    <tr>
                        <td style="padding:8px 0; border-bottom:1px solid #eee;">${formatearFechaElegante(item.fecha)}</td>
                        <td style="padding:8px 0; border-bottom:1px solid #eee; text-align:right;"><b>$${item.monto.toFixed(2)}</b></td>
                    </tr>
                `;
            });
        }

        const comision = totalBruto * 0.08;
        const totalNeto = totalBruto - comision;

        document.getElementById("driver-total-bruto").innerText = `$${totalBruto.toFixed(2)}`;
        document.getElementById("driver-comision").innerText = `-$${comision.toFixed(2)}`;
        document.getElementById("driver-total-neto").innerText = `$${totalNeto.toFixed(2)}`;
    }

    function formatearFechaElegante(fechaStr) {
        const opciones = { day: 'numeric', month: 'short', year: 'numeric' };
        return new Date(fechaStr + "T00:00:00").toLocaleDateString('es-ES', opciones);
    }

    // --- MAPA ---
    window.initLeaflet = () => {
        if (lMap) return;
        lMap = L.map('map').setView([13.7, -89.2], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(lMap);
        markerOrigen = L.marker([13.7, -89.2], {draggable: true}).addTo(lMap).bindPopup("Origen (A)");
        markerDestino = L.marker([13.71, -89.21], {draggable: true}).addTo(lMap).bindPopup("Destino (B)");

        markerOrigen.on('dragend', (e) => { const pos = e.target.getLatLng(); coordsOrigen = [pos.lat, pos.lng]; reverseGeocode(pos, 'origin'); });
        markerDestino.on('dragend', (e) => { const pos = e.target.getLatLng(); coordsDestino = [pos.lat, pos.lng]; reverseGeocode(pos, 'destination'); });
    };

    async function reverseGeocode(latlng, inputId) {
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latlng.lat}&lon=${latlng.lng}`);
            const data = await res.json();
            document.getElementById(inputId).value = data.display_name || `${latlng.lat}, ${latlng.lng}`;
        } catch(e) { document.getElementById(inputId).value = `${latlng.lat}, ${latlng.lng}`; }
    }

    window.usarGPS = () => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const c = [pos.coords.latitude, pos.coords.longitude]; coordsOrigen = c;
                markerOrigen.setLatLng(c); lMap.flyTo(c, 15); reverseGeocode({lat: c[0], lng: c[1]}, 'origin');
            });
        } else {
            alert("Tu navegador no soporta geolocalización.");
        }
    };

    window.buscarDireccion = async (input, targetId) => {
        const val = input.value;
        if(val.includes(',') && val.split(',').length === 2) {
            const p = val.split(','); const c = [parseFloat(p[0]), parseFloat(p[1])];
            if(!isNaN(c[0]) && !isNaN(c[1])) {
                if(input.id === 'origin') { coordsOrigen = c; markerOrigen.setLatLng(c); } else { coordsDestino = c; markerDestino.setLatLng(c); }
                return;
            }
        }
        if (val.length < 4) return;
        try {
            const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(val)}&limit=5`);
            const data = await res.json(); let h = "";
            data.features.forEach(f => {
                const lbl = `${f.properties.name || ''} ${f.properties.city || ''}`.trim();
                h += `<div class="suggestion-item" onclick="seleccionarPos('${input.id}','${lbl.replace(/'/g, "\\'")}',${f.geometry.coordinates[1]},${f.geometry.coordinates[0]},'${targetId}')">${lbl}</div>`;
            });
            document.getElementById(targetId).innerHTML = h;
        } catch(e) {}
    };

    window.seleccionarPos = (inputId, lbl, lat, lon, targetId) => {
        document.getElementById(inputId).value = lbl; document.getElementById(targetId).innerHTML = "";
        const c = [lat, lon];
        if (inputId === 'origin') { coordsOrigen = c; markerOrigen.setLatLng(c); } else { coordsDestino = c; markerDestino.setLatLng(c); }
        lMap.flyTo(c, 14);
    };

    window.calcularRutaOSRM = async () => {
        if(!coordsOrigen || !coordsDestino) return alert("Selecciona origen y destino primero.");
        try {
            const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coordsOrigen[1]},${coordsOrigen[0]};${coordsDestino[1]},${coordsDestino[0]}?overview=full&geometries=geojson`);
            const data = await res.json();
            if (data.code === 'Ok') {
                const r = data.routes[0]; const km = r.distance / 1000;
                let precio = km <= 1 ? 1 : km <= 2 ? 2 : km <= 3 ? 3 : 3 + (km - 3) * 0.30;
                if (polylineRuta) lMap.removeLayer(polylineRuta);
                polylineRuta = L.geoJSON(r.geometry, {style:{color:'#2ecc71', weight:5}}).addTo(lMap);
                lMap.fitBounds(polylineRuta.getBounds());
                document.getElementById("distanciaText").innerText = km.toFixed(2) + " km";
                document.getElementById("priceMaps").innerText = "$" + precio.toFixed(2);
                document.getElementById("oferta-cliente").value = precio.toFixed(2);
                document.getElementById("precio-area").style.display = 'block';
            }
        } catch(e) { alert("Error al calcular la ruta en el mapa."); }
    };

    // --- SINCRO TEMPORIZADOR GLOBAL ---
    function iniciarTemporizador(idViaje, expiresAt, accionTimeout) {
        if (ultimoExpiresAt === expiresAt) return; 
        ultimoExpiresAt = expiresAt;
        
        clearInterval(countdownInterval);
        const actualizar = async () => {
            let tiempoRestante = Math.round((expiresAt - Date.now()) / 1000);
            if(tiempoRestante < 0) tiempoRestante = 0;
            
            const timerElements = document.querySelectorAll(".timer-countdown");
            timerElements.forEach(el => el.innerText = tiempoRestante);

            if(tiempoRestante <= 0) {
                clearInterval(countdownInterval);
                cerrarModal();
                ultimoExpiresAt = null;
                if(accionTimeout) await accionTimeout(idViaje);
            }
        };
        actualizar();
        countdownInterval = setInterval(actualizar, 1000);
    }

    window.cerrarModal = () => { 
        document.getElementById("modal-negociacion").style.display = "none"; 
        clearInterval(countdownInterval);
        ultimoExpiresAt = null;
    };

    // --- FLUJO CLIENTE ---
    window.publicarViaje = async () => {
        if (!miUid) return alert("Identificación no válida.");
        const ofertaVal = parseFloat(document.getElementById("oferta-cliente").value);
        if(isNaN(ofertaVal) || ofertaVal <= 0) return alert("Ingresa una oferta correcta.");

        const viaje = {
            clienteId: miUid, clienteNombre: miNombre, clienteFoto: miFoto || "",
            origen: document.getElementById("origin").value, destino: document.getElementById("destination").value,
            km: document.getElementById("distanciaText").innerText, precioApp: document.getElementById("priceMaps").innerText,
            ofertaActual: ofertaVal, ofertaDe: "cliente", estado: "buscando", propuestasDrivers: {},
            expiresAt: Date.now() + 150000, timestamp: serverTimestamp() // 2.5 min para negociar
        };
        await addDoc(collection(db, "viajes"), viaje);
    };

    function escucharViajeCliente() {
        const q = query(collection(db, "viajes"), where("clienteId", "==", miUid));
        onSnapshot(q, (snap) => {
            if(snap.empty) return;
            let documentos = [];
            snap.forEach(doc => { documentos.push({ id: doc.id, ...doc.data() }); });
            documentos.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
            const v = documentos[0]; const vId = v.id;

            if(v.estado === "cancelado" || v.estado === "finalizado") {
                clearInterval(countdownInterval); cerrarModal();
                return;
            }

            if(v.estado === "accepted") {
                clearInterval(countdownInterval); cerrarModal();
                alert(`¡Viaje aceptado por ${v.driverNombre}! Vehículo: ${v.driverMarca} ${v.driverModelo}. Placa: ${v.driverPlaca}`);
                return;
            }

            if(v.estado === "buscando" || v.estado === "negociando") {
                const modal = document.getElementById("modal-negociacion");
                if (modal.style.display !== "flex") modal.style.display = "flex";
                
                iniciarTemporizador(vId, v.expiresAt, async (id) => {
                    await updateDoc(doc(db, "viajes", id), { estado: 'cancelado' });
                    alert("Tiempo de negociación agotado. Intenta solicitar de nuevo.");
                });

                const body = document.getElementById("modal-content-body");
                let htmlPropuestas = "";
                const propuestas = Object.values(v.propuestasDrivers || {});
                const pendientes = propuestas.filter(p => p.estado === "pendiente");

                if(pendientes.length === 0) {
                    htmlPropuestas = `<p style='text-align:center;color:#666;'>Esperando ofertas de conductores en tu zona...</p>`;
                } else {
                    pendientes.forEach(p => {
                        htmlPropuestas += `
                            <div style="background:#f9f9f9; padding:12px; border-radius:12px; margin-bottom:8px; border:1px solid #eee;">
                                <div style="display:flex; align-items:center; gap:8px;">
                                    <img src="${p.driverFoto || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" style="width:32px; height:32px; border-radius:50%; object-fit:cover;">
                                    <span style="font-weight:bold; font-size:13px;">${p.driverNombre}</span>
                                </div>
                                <p style="margin:4px 0; font-size:11px; color:#555;">🚘 ${p.driverMarca} ${p.driverModelo} (${p.driverPlaca})</p>
                                <p style="margin:5px 0; font-size:15px; color:var(--primary);"><b>Propone: $${p.monto.toFixed(2)}</b> <small style='color:#666;'>(Oferta ${p.count}/2)</small></p>
                                <div style="display:flex; gap:5px;">
                                    <button class="btn-action" style="padding:8px; font-size:12px;" onclick="responderContraofertaCliente('${vId}', '${p.driverId}', 'aceptar')">ACEPTAR</button>
                                    <button class="btn-action" style="padding:8px; font-size:12px; background:var(--danger);" onclick="responderContraofertaCliente('${vId}', '${p.driverId}', 'rechazar')">RECHAZAR</button>
                                </div>
                            </div>
                        `;
                    });
                }

                body.innerHTML = `
                    <div class="countdown-timer">Buscando conductores... <span class="timer-countdown">0</span>s</div>
                    <h3 style="margin-top:0; color:#333; text-align:center;">Panel de Ofertas</h3>
                    <p style="text-align:center; margin:0 0 10px 0; font-size:14px; color:#333;">Tu oferta base: <b style="color:var(--primary); font-size:18px;">$${v.ofertaActual}</b></p>
                    <hr style="border:0; border-top:1px solid #eee; margin-bottom:10px;">
                    <div style="max-height: 250px; overflow-y:auto; margin-bottom:10px; padding-right:5px;">${htmlPropuestas}</div>
                    <button class="btn-action" style="background:#7f8c8d;" onclick="cancelarSolicitudCliente('${vId}')">CANCELAR VIAJE</button>
                `;
            }
        });
    }

    window.cancelarSolicitudCliente = async (idViaje) => {
        if(confirm("¿Deseas cancelar la solicitud de este viaje?")) {
            clearInterval(countdownInterval); 
            await updateDoc(doc(db, "viajes", idViaje), { estado: 'cancelado' }); 
            cerrarModal();
        }
    };

    window.responderContraofertaCliente = async (viajeId, driverId, accion) => {
        const docRef = doc(db, "viajes", viajeId);
        if(accion === 'aceptar') {
            const snap = await getDoc(docRef); const v = snap.data();
            const prop = v.propuestasDrivers[driverId];
            await updateDoc(docRef, {
                estado: 'accepted', 
                driverId: prop.driverId, 
                driverNombre: prop.driverNombre, 
                driverFoto: prop.driverFoto,
                driverPlaca: prop.driverPlaca, 
                driverMarca: prop.driverMarca, 
                driverModelo: prop.driverModelo, 
                ofertaActual: prop.monto
            });
            cerrarModal();
        } else {
            await updateDoc(docRef, { [`propuestasDrivers.${driverId}.estado`]: 'rechazado' });
        }
    };

    // --- FLUJO CONDUCTOR ---
    function escucharViajesDriver() {
        onSnapshot(collection(db, "viajes"), (snap) => {
            const container = document.getElementById("lista-viajes-global"); if(!container) return; container.innerHTML = "";
            let hayViajes = false;
            
            snap.forEach(docSnap => {
                const v = docSnap.data(); const vid = docSnap.id;
                if(v.estado === "buscando" || v.estado === "negociando") {
                    hayViajes = true;
                    const card = document.createElement("div"); card.className = "card";
                    card.innerHTML = `
                        <p style="margin:0 0 5px 0; font-size:13px;"><b>Origen:</b> ${v.origen ? v.origen.substring(0,40) : ''}...</p>
                        <p style="margin:0 0 5px 0; font-size:13px;"><b>Destino:</b> ${v.destino ? v.destino.substring(0,40) : ''}...</p>
                        <hr style="border:0; border-top:1px dashed #eee; margin:10px 0;">
                        <div class="flex-between" style="margin-bottom:10px;">
                            <span style="font-size:12px; color:#777;">Tarifa recomendada: ${v.precioApp}</span>
                            <span style="font-size:16px;"><b>Paga:</b> <b style="color:var(--primary)">$${v.ofertaActual}</b></span>
                        </div>
                        <button class="btn-action" onclick="abrirNegociacionDriver('${vid}')">VER Y NEGOCIAR</button>
                    `;
                    container.appendChild(card);
                }
            });

            if(!hayViajes) {
                container.innerHTML = `<p style="text-align:center; color:#777; padding:20px;">No hay viajes disponibles en este momento. Sigue conectado.</p>`;
            }
        });
    }

    // --- CONTINUACIÓN DEL CÓDIGO CORTADO ---
    window.abrirNegociacionDriver = async (id) => {
        const docRef = doc(db, "viajes", id); const snapshot = await getDoc(docRef);
        if(!snapshot.exists() || (snapshot.data().estado !== "buscando" && snapshot.data().estado !== "negociando")) {
            return alert("Este viaje ya fue tomado o cancelado por el cliente.");
        }
        
        let v = snapshot.data(); 
        const modal = document.getElementById("modal-negociacion"); 
        const body = document.getElementById("modal-content-body");
        
        body.innerHTML = `
            <div class="countdown-timer">Tiempo restante: <span class="timer-countdown">0</span>s</div>
            <h3 style="margin-top:0;">Detalles del Viaje</h3>
            <p><strong>Origen:</strong> ${v.origen}</p>
            <p><strong>Destino:</strong> ${v.destino}</p>
            <p><strong>Distancia:</strong> ${v.km}</p>
            <hr style="border-top:1px solid #eee;">
            <p style="font-size: 16px;">Oferta del cliente: <b style="color:var(--primary); font-size:20px;">$${v.ofertaActual}</b></p>
            
            <label>Tu contraoferta:</label>
            <input type="number" id="oferta-driver" step="0.5" value="${v.ofertaActual}">
            
            <button class="btn-action" onclick="enviarOfertaDriver('${id}')">ENVIAR OFERTA AL CLIENTE</button>
            <button class="btn-action" style="background:#7f8c8d; margin-top:10px;" onclick="cerrarModal()">CERRAR</button>
        `;
        
        modal.style.display = "flex";
        
        iniciarTemporizador(id, v.expiresAt, () => {
            alert("El tiempo de negociación ha expirado para este viaje.");
        });
    };

    window.enviarOfertaDriver = async (id) => {
        const ofertaVal = parseFloat(document.getElementById("oferta-driver").value);
        if(isNaN(ofertaVal) || ofertaVal <= 0) return alert("Ingresa una oferta válida.");
        
        const docRef = doc(db, "viajes", id);
        
        // Actualizamos la oferta en la base de datos para este conductor en específico
        await updateDoc(docRef, {
            estado: 'negociando',
            [`propuestasDrivers.${miUid}`]: {
                driverId: miUid,
                driverNombre: miNombre,
                driverFoto: miFoto,
                driverPlaca: miPlaca,
                driverMarca: miMarca,
                driverModelo: miModelo,
                monto: ofertaVal,
                estado: 'pendiente',
                count: 1 // Aquí puedes llevar el tracking de cuántas ofertas lleva
            }
        });
        
        alert("¡Tu oferta ha sido enviada al cliente!");
        cerrarModal();
    };

</script>
</body>
</html>
