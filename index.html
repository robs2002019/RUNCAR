<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN CAR PRO - Sistema Unificado</title>
    
    <link rel='stylesheet' href='https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css' />
    <script src='https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js'></script>
    
    <style>
        :root { --primary: #2ecc71; --secondary: #1a1a1a; --accent: #f1c40f; --white: #ffffff; --gray: #f4f4f4; --danger: #e74c3c; --admin: #9b59b6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--secondary); color: white; padding-bottom: 30px; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        
        header { text-align: center; padding: 15px; background: rgba(0,0,0,0.3); border-bottom: 2px solid var(--primary); margin-bottom: 15px; border-radius: 0 0 20px 20px; }
        #local-time { font-weight: bold; color: var(--primary); font-size: 14px; margin-top: 5px; }

        .card { background: var(--white); color: #333; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 15px; }
        
        h3, h4 { margin-top: 0; color: var(--secondary); text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; box-sizing: border-box; }
        
        .phone-group { display: flex; gap: 5px; }
        .phone-group select { flex: 1; font-size: 11px; }
        .phone-group input { flex: 2; }

        .file-label { display: block; font-size: 12px; color: #666; margin-top: 8px; font-weight: bold; }
        input[type="file"] { padding: 8px; font-size: 11px; background: #f9f9f9; border: 1px dashed #ccc; }

        #map { width: 100%; height: 300px; border-radius: 20px; border: 2px solid var(--primary); margin-bottom: 15px; display: none; }
        
        .btn-main { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-main:hover { background: #27ae60; opacity: 0.9; }
        .btn-danger { background: var(--danger); }
        .btn-admin { background: var(--admin); }

        .input-group { position: relative; }
        .gps-btn { position: absolute; right: 10px; top: 12px; background: none; border: none; font-size: 20px; cursor: pointer; z-index: 5; }
        
        .suggestions { position: absolute; width: 100%; background: white; z-index: 2000; border-radius: 0 0 12px 12px; box-shadow: 0 8px 15px rgba(0,0,0,0.2); max-height: 150px; overflow-y: auto; top: 100%; }
        .suggestion-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px; color: #333; }

        /* Estilos de Tabla de Ganancias */
        .stats-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        .stats-table th { background: #f8f9fa; padding: 8px; border: 1px solid #eee; }
        .stats-table td { padding: 8px; border: 1px solid #eee; text-align: center; }
        .comision-text { color: var(--danger); font-weight: bold; }

        /* Modal Negociación */
        .modal-negociacion { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: white; color: #333; border-radius: 25px 25px 0 0; padding: 25px; box-sizing: border-box; z-index: 3000; display: none; box-shadow: 0 -10px 40px rgba(0,0,0,0.6); }

        .hidden { display: none; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 style="margin:0">RUN <span style="color:var(--primary)">CAR</span> PRO</h2>
        <div id="local-time">00:00:00</div>
    </header>

    <div id="auth-view" class="card">
        <h3>Acceso al Sistema</h3>
        <input type="text" id="reg-name" placeholder="Nombre completo">
        <input type="email" id="reg-email" placeholder="Correo electrónico">
        
        <div class="phone-group">
            <select id="country-code"></select>
            <input type="tel" id="reg-phone" placeholder="WhatsApp">
        </div>

        <select id="reg-role" onchange="toggleForm()">
            <option value="client">Soy Cliente</option>
            <option value="driver">Quiero ser Conductor</option>
        </select>

        <div id="client-fields">
            <span class="file-label">Foto de Rostro:</span>
            <input type="file" accept="image/*">
        </div>

        <div id="driver-fields" class="hidden">
            <span class="file-label">Foto Perfil y Licencia:</span>
            <input type="file" accept="image/*" multiple>
            <input type="text" id="car-model" placeholder="Modelo Vehículo">
            <input type="text" id="car-plate-input" placeholder="Placa">
        </div>

        <button class="btn-main" onclick="validarYEntrar()">ENTRAR</button>
    </div>

    <div id="admin-view" class="hidden">
        <div class="card" style="border-top: 5px solid var(--admin);">
            <h3 style="color:var(--admin)">Panel Administrador</h3>
            <p style="font-size:12px; text-align:center;">Gestión Global de Usuarios y Finanzas</p>
            
            <h4>Usuarios Registrados</h4>
            <div id="admin-user-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 20px;">
                </div>

            <h4>Historial Global 5 Días (8% Com)</h4>
            <table class="stats-table">
                <thead>
                    <tr><th>Fecha</th><th>Total $</th><th>8%</th></tr>
                </thead>
                <tbody id="admin-global-stats"></tbody>
            </table>
            
            <button class="btn-main btn-danger" onclick="location.reload()">CERRAR SESIÓN</button>
        </div>
    </div>

    <div id="app-view" class="hidden">
        
        <div id="driver-earnings-card" class="card hidden" style="border-top: 5px solid var(--accent);">
            <h4>Mis Ganancias (Últimos 5 días)</h4>
            <table class="stats-table">
                <thead>
                    <tr><th>Día</th><th>Bruto</th><th>8% App</th></tr>
                </thead>
                <tbody id="driver-stats-body"></tbody>
            </table>
        </div>

        <div id="map"></div>
        
        <div class="card" id="search-card">
            <div class="input-group">
                <input id="origin" placeholder="📍 Origen" oninput="buscarDireccion(this, 'sug-origin')">
                <button onclick="obtenerGPS()" class="gps-btn">🎯</button>
                <div id="sug-origin" class="suggestions"></div>
            </div>

            <div class="input-group">
                <input id="destination" placeholder="🏁 Destino" oninput="buscarDireccion(this, 'sug-dest')">
                <div id="sug-dest" class="suggestions"></div>
            </div>

            <div id="info-ruta" class="hidden" style="text-align: center; margin-top: 10px;">
                <span style="font-size: 16px;">Tarifa: <b style="color:var(--primary)">$<span id="txt-precio">0.00</span></b></span>
                <button class="btn-main" onclick="abrirNegociacion()">OFERTAR</button>
            </div>
            
            <button class="btn-main" id="btn-calc" onclick="calcularRuta()">CALCULAR</button>
        </div>
    </div>
</div>

<div id="modal-oferta" class="modal-negociacion">
    <h3>Tu Propuesta</h3>
    <div style="display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:20px;">
        <span style="font-size:28px; font-weight:bold; color:var(--primary)">$</span>
        <input type="number" id="input-oferta" style="width:140px; font-size:28px; text-align:center; margin:0; border: 2px solid var(--primary);" step="0.50">
    </div>
    <button class="btn-main" onclick="enviarPropuesta()">ENVIAR TARIFA</button>
    <button class="btn-main btn-danger" onclick="cerrarModal()">CANCELAR</button>
</div>

<script>
    let map, markerO, markerD, coordsO, coordsD, userRole;
    const ADMIN_EMAIL = "robs2002004@gmail.com";

    // --- RELOJ ---
    setInterval(() => {
        document.getElementById('local-time').innerText = new Date().toLocaleTimeString('es-ES');
    }, 1000);

    function toggleForm() {
        const role = document.getElementById('reg-role').value;
        document.getElementById('driver-fields').classList.toggle('hidden', role !== 'driver');
        document.getElementById('client-fields').classList.toggle('hidden', role === 'driver');
    }

    function validarYEntrar() {
        const email = document.getElementById('reg-email').value.trim();
        const nombre = document.getElementById('reg-name').value;
        userRole = document.getElementById('reg-role').value;

        if (!nombre || !email) return alert("Por favor completa los datos básicos");

        document.getElementById('auth-view').classList.add('hidden');

        // Lógica de Administrador
        if (email === ADMIN_EMAIL) {
            activarAdmin();
        } else {
            activarApp();
        }
    }

    // --- LÓGICA DE ADMINISTRADOR ---
    function activarAdmin() {
        document.getElementById('admin-view').classList.remove('hidden');
        generarListaUsuariosAdmin();
        generarEstadisticas(document.getElementById('admin-global-stats'), true);
    }

    function generarListaUsuariosAdmin() {
        const list = document.getElementById('admin-user-list');
        const mockUsers = [
            {name: "Juan Pérez", role: "Driver", status: "Activo"},
            {name: "Maria Luz", role: "Cliente", status: "Activo"},
            {name: "Carlos RT", role: "Driver", status: "Inactivo"}
        ];
        
        let html = "";
        mockUsers.forEach((u, i) => {
            html += `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:8px; border-bottom:1px solid #eee; font-size:12px;">
                    <div><b>${u.name}</b> (${u.role})</div>
                    <div style="display:flex; gap:5px;">
                        <button onclick="alert('Estado cambiado')" style="font-size:10px; cursor:pointer;">ON/OFF</button>
                        <button onclick="this.parentElement.parentElement.remove()" style="font-size:10px; background:red; color:white; border:none;">X</button>
                    </div>
                </div>
            `;
        });
        list.innerHTML = html;
    }

    // --- LÓGICA DE APP (CLIENTE/DRIVER) ---
    function activarApp() {
        document.getElementById('app-view').classList.remove('hidden');
        document.getElementById('map').style.display = 'block';
        
        if (userRole === 'driver') {
            document.getElementById('driver-earnings-card').classList.remove('hidden');
            generarEstadisticas(document.getElementById('driver-stats-body'), false);
        }
        initMap();
    }

    function generarEstadisticas(container, isAdmin) {
        const hoy = new Date();
        let html = "";
        for (let i = 0; i < 5; i++) {
            const fecha = new Date(hoy);
            fecha.setDate(hoy.getDate() - i);
            const fechaStr = fecha.toLocaleDateString('es-ES', {day:'2-digit', month:'short'});
            
            // Simulación de montos: Admin ve el total de todos, Driver ve el propio
            const baseMonto = isAdmin ? 150.00 : 45.00;
            const monto = (Math.random() * 50 + baseMonto).toFixed(2);
            const comision = (monto * 0.08).toFixed(2);
            
            html += `<tr><td>${fechaStr}</td><td>$${monto}</td><td class="comision-text">-$${comision}</td></tr>`;
        }
        container.innerHTML = html;
    }

    // --- FUNCIONES DE MAPA Y NEGOCIACIÓN (SIMPLIFICADAS) ---
    function initMap() {
        map = new maplibregl.Map({
            container: 'map',
            style: 'https://demotiles.maplibre.org/style.json',
            center: [-89.20, 13.70], zoom: 12
        });
        setTimeout(() => map.resize(), 500);
    }

    function calcularRuta() {
        let km = (Math.random() * 5 + 1).toFixed(2);
        // Nueva Tarifa Solicitada: 1km-$1, 2km-$2, 3km-$3, 4km+ ($3 + extra*0.30)
        let precio = km <= 3 ? km : (3 + (km - 3) * 0.30);
        
        document.getElementById('txt-dist').innerText = km + " km";
        document.getElementById('txt-precio').innerText = parseFloat(precio).toFixed(2);
        document.getElementById('input-oferta').value = parseFloat(precio).toFixed(2);
        document.getElementById('info-ruta').classList.remove('hidden');
        document.getElementById('btn-calc').classList.add('hidden');
    }

    function abrirNegociacion() { document.getElementById('modal-oferta').style.display = 'block'; }
    function cerrarModal() { document.getElementById('modal-oferta').style.display = 'none'; }
    
    function enviarPropuesta() {
        alert("Propuesta enviada. Esperando conductores...");
        cerrarModal();
    }

    function obtenerGPS() {
        alert("Obteniendo ubicación GPS...");
    }

    function buscarDireccion(input, target) {
        if(input.value.length > 3) {
            document.getElementById(target).innerHTML = `<div class="suggestion-item" onclick="this.parentElement.innerHTML=''">Ubicación simulada detectada...</div>`;
        }
    }

    async function initPaises() {
        const select = document.getElementById('country-code');
        try {
            const res = await fetch('https://restcountries.com/v3.1/all?fields=idd,cca2');
            const data = await res.json();
            data.forEach(c => {
                if(c.idd.root) {
                    const code = c.idd.root + (c.idd.suffixes ? c.idd.suffixes[0] : "");
                    const opt = new Option(`${c.cca2} (${code})`, code);
                    if(c.cca2 === 'SV') opt.selected = true;
                    select.add(opt);
                }
            });
        } catch(e) { select.add(new Option("SV (+503)", "+503")); }
    }
    initPaises();
</script>

</body>
</html>
