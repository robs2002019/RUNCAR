<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN CAR PRO - Global GPS</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root { --primary: #2ecc71; --secondary: #1a1a1a; --accent: #f1c40f; --white: #ffffff; --danger: #e74c3c; --chat-bg: #e5ddd5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--secondary); color: white; padding-bottom: 50px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        header { text-align: center; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 0 0 25px 25px; border-bottom: 2px solid var(--primary); margin-bottom: 20px; }
        .card { background: var(--white); color: #333; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 15px; position: relative; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        
        #map { width: 100%; height: 300px; border-radius: 20px; margin-bottom: 15px; border: 2px solid var(--primary); background: #222; z-index: 1; }
        .section { display: none; }
        .active-section { display: block; }

        .btn-gps { position: absolute; right: 10px; top: 18px; background: var(--primary); border: none; border-radius: 50%; width: 35px; height: 35px; color: white; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .suggestions { background: white; color: black; position: absolute; width: 100%; z-index: 1000; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); max-height: 200px; overflow-y: auto; margin-top: -5px; }
        .suggestion-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; }
        
        /* Estilos Contabilidad */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; color: #333; background: white; border-radius: 10px; overflow: hidden; font-size: 13px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #666; }
        .resumen-caja { background: var(--accent); color: #000; padding: 15px; border-radius: 15px; margin-top: 10px; font-weight: bold; text-align: center; font-size: 16px; }
        
        .msg { padding: 8px 12px; border-radius: 10px; margin-bottom: 5px; max-width: 80%; font-size: 14px; }
        .mio { background: #dcf8c6; align-self: flex-end; }
        .otro { background: #fff; align-self: flex-start; border: 1px solid #ddd; }
        .oferta-tag { background: #f9f9f9; padding: 15px; border-radius: 12px; margin: 10px 0; border-left: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center; color: #333; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; letter-spacing: 2px;">RUN <span style="color:var(--primary)">CAR</span> PRO</h2>
</header>

<div class="container">
    <div id="auth-container" class="section active-section">
        <div class="card">
            <h3 style="margin-top:0; text-align:center;">Acceso</h3>
            <input type="email" id="auth-email" placeholder="Correo Electrónico">
            <input type="password" id="auth-pass" placeholder="Contraseña">
            <div id="reg-fields" style="display:none;">
                <input type="text" id="reg-nombre" placeholder="Nombre Completo">
                <div style="display: flex; gap: 5px;">
                    <select id="reg-prefijo" style="flex: 1; font-size: 12px;"></select>
                    <input type="tel" id="reg-tel" placeholder="WhatsApp" style="flex: 2;">
                </div>
                <select id="reg-rol">
                    <option value="cliente">Soy Cliente</option>
                    <option value="driver">Quiero ser Conductor</option>
                </select>
            </div>
            <button class="btn-action" onclick="ejecutarAuth()" id="btn-auth-main">INGRESAR</button>
            <p onclick="switchAuth()" style="text-align:center; cursor:pointer; color:#666; margin-top:18px;">¿No tienes cuenta? Regístrate</p>
        </div>
    </div>

    <div id="cliente-view" class="section">
        <div id="map"></div>
        <div class="card">
            <div style="position:relative;">
                <input id="origin" placeholder="📍 Detectando ubicación..." oninput="buscarDireccion(this, 'sug-origin')">
                <button class="btn-gps" onclick="obtenerUbicacionReal()">🎯</button>
                <div id="sug-origin" class="suggestions"></div>
            </div>
            <div style="position:relative;">
                <input id="destination" placeholder="🏁 ¿A dónde vas?" oninput="buscarDireccion(this, 'sug-dest')">
                <div id="sug-dest" class="suggestions"></div>
            </div>
            
            <div id="precio-area" style="display:none; text-align:center;">
                <p>Tarifa sugerida: <b id="priceMaps">$0.00</b></p>
                <input type="number" id="oferta-cliente" style="font-size:20px; text-align:center; border: 2px solid var(--primary);">
                <button class="btn-action" id="btn-solicitar" onclick="publicarViaje()">SOLICITAR AHORA</button>
            </div>
            
            <button id="btn-calc" class="btn-action" style="background:#444;" onclick="calcularRutaOSRM()">VER PRECIO Y RUTA</button>
            
            <div id="chat-area-cliente" style="display:none; margin-top:15px;">
                <h4 style="margin:5px 0; color:var(--primary)">Viaje en curso</h4>
                <div id="chat-box-cliente" style="height:150px; background:#eee; overflow-y:auto; padding:10px; border-radius:10px; display:flex; flex-direction:column; gap:5px; color:black;"></div>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <input id="input-msg-cliente" placeholder="Escribe al conductor..." style="margin:0;">
                    <button onclick="enviarMensaje('cliente')" style="background:var(--primary); color:white; border:none; padding:10px; border-radius:10px;">Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="driver-view" class="section">
        <div class="card">
            <h4 style="margin:0">📊 Mi Contabilidad</h4>
            <div id="driver-stats">Calculando...</div>
        </div>
        
        <h4 style="color:var(--primary)">Viajes en la zona</h4>
        <div id="lista-viajes-global"></div>
        
        <div id="chat-container-driver" class="card" style="display:none;">
            <h4 style="margin:0; color:var(--primary)">Chat con Cliente</h4>
            <div id="chat-box-driver" style="height:200px; background:#eee; overflow-y:auto; padding:10px; border-radius:10px; margin:10px 0; display:flex; flex-direction:column; gap:5px; color:black;"></div>
            <div style="display:flex; gap:5px;">
                <input id="input-msg-driver" placeholder="Mensaje..." style="margin:0;">
                <button onclick="enviarMensaje('driver')" style="background:var(--primary); color:white; border:none; padding:10px; border-radius:10px;">Enviar</button>
            </div>
            <button class="btn-action" style="background:var(--accent); color:black; margin-top:10px;" onclick="finalizarViaje()">TERMINAR Y COBRAR</button>
        </div>
    </div>

    <button id="btn-logout" class="btn-action" style="display:none; background:#c0392b; margin-top:20px;" onclick="cerrarSesion()">CERRAR SESIÓN</button>
</div>

<div id="modal-oferta-cliente" style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: white; color: #333; padding: 20px; border-radius: 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.4); z-index: 2000; display: none; border-top: 5px solid var(--accent);">
    <h3 style="margin-top:0">¡Nueva Oferta!</h3>
    <p id="info-oferta-driver"></p>
    <div style="display:flex; gap:10px;">
        <button class="btn-action" onclick="responderOferta(true)">ACEPTAR</button>
        <button class="btn-action" style="background:var(--danger)" onclick="responderOferta(false)">RECHAZAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot, serverTimestamp, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAyRrBUmw4OEzS7EmvK_XmDk6Z5rrjLC3A",
        authDomain: "runcar-6eda0.firebaseapp.com",
        projectId: "runcar-6eda0",
        storageBucket: "runcar-6eda0.firebasestorage.app",
        messagingSenderId: "152627344672",
        appId: "1:152627344672:web:b420d1c8cbb670069b9345"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let lMap, markerOrigen, markerDestino, polylineRuta;
    let coordsOrigen = null, coordsDestino = null, miUid = "", miRol = "", miNombre = "", viajeActivoId = null;

    // --- PAISES ---
    async function cargarPaises() {
        const sel = document.getElementById('reg-prefijo');
        try {
            const res = await fetch('https://restcountries.com/v3.1/all?fields=name,idd,cca2');
            const data = await res.json();
            data.sort((a,b)=> a.name.common.localeCompare(b.name.common)).forEach(c => {
                const code = c.idd.root + (c.idd.suffixes ? c.idd.suffixes[0] : "");
                if(code) {
                    const opt = new Option(`${c.cca2} (${code})`, code);
                    if(c.cca2 === 'SV') opt.selected = true;
                    sel.add(opt);
                }
            });
        } catch(e) { sel.add(new Option("+503", "+503")); }
    }
    cargarPaises();

    // --- MAPA GOOGLE + LEAFLET ---
    window.initLeaflet = () => {
        if (lMap) return;
        lMap = L.map('map').setView([13.7, -89.2], 12);
        
        // Capa de Google Maps (Roadmap)
        L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains:['mt0','mt1','mt2','mt3']
        }).addTo(lMap);

        obtenerUbicacionReal();
    };

    window.obtenerUbicacionReal = () => {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude, lon = pos.coords.longitude;
            coordsOrigen = [lat, lon];
            lMap.flyTo(coordsOrigen, 16);
            if (markerOrigen) lMap.removeLayer(markerOrigen);
            markerOrigen = L.marker(coordsOrigen).addTo(lMap);

            // Geocodificación inversa
            const res = await fetch(`https://photon.komoot.io/reverse?lon=${lon}&lat=${lat}`);
            const data = await res.json();
            if(data.features.length > 0) {
                const f = data.features[0].properties;
                document.getElementById("origin").value = `${f.name || ''} ${f.city || ''}`.trim();
            }
        });
    };

    window.buscarDireccion = async (input, targetId) => {
        if (input.value.length < 3) return;
        const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(input.value)}&limit=5`);
        const data = await res.json();
        document.getElementById(targetId).innerHTML = data.features.map(f => `
            <div class="suggestion-item" onclick="seleccionarPos('${input.id}','${f.properties.name || f.properties.street}',${f.geometry.coordinates[1]},${f.geometry.coordinates[0]},'${targetId}')">
                ${f.properties.name || f.properties.street} - ${f.properties.city || ''}
            </div>`).join('');
    };

    window.seleccionarPos = (inputId, lbl, lat, lon, targetId) => {
        document.getElementById(inputId).value = lbl;
        document.getElementById(targetId).innerHTML = "";
        const c = [lat, lon];
        if (inputId === 'origin') { coordsOrigen = c; if(markerOrigen) lMap.removeLayer(markerOrigen); markerOrigen = L.marker(c).addTo(lMap); }
        else { coordsDestino = c; if(markerDestino) lMap.removeLayer(markerDestino); markerDestino = L.marker(c).addTo(lMap); }
        lMap.flyTo(c, 15);
    };

    window.calcularRutaOSRM = async () => {
        if (!coordsOrigen || !coordsDestino) return alert("Faltan ubicaciones");
        const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coordsOrigen[1]},${coordsOrigen[0]};${coordsDestino[1]},${coordsDestino[0]}?overview=full&geometries=geojson`);
        const data = await res.json();
        if (data.code === 'Ok') {
            const r = data.routes[0];
            const km = r.distance / 1000;
            let p = km <= 3 ? 3.00 : 3 + (km-3)*0.30;
            if (polylineRuta) lMap.removeLayer(polylineRuta);
            polylineRuta = L.geoJSON(r.geometry, {style:{color:'#2ecc71', weight:5}}).addTo(lMap);
            lMap.fitBounds(polylineRuta.getBounds());
            document.getElementById("priceMaps").innerText = "$" + p.toFixed(2);
            document.getElementById("oferta-cliente").value = p.toFixed(2);
            document.getElementById("precio-area").style.display = 'block';
            document.getElementById("btn-calc").style.display = 'none';
        }
    };

    // --- CONTABILIDAD DRIVER ---
    async function actualizarContabilidad() {
        const q = query(collection(db, "viajes"), where("driverId", "==", miUid), where("estado", "==", "finalizado"));
        const snap = await getDocs(q);
        let total = 0, dias = {};
        snap.forEach(d => {
            const v = d.data();
            total += v.precioFinal || 0;
            dias[v.fechaFinalizado] = (dias[v.fechaFinalizado] || 0) + (v.precioFinal || 0);
        });
        
        let html = "<table><tr><th>Fecha</th><th>Ganancia</th></tr>";
        Object.keys(dias).sort().reverse().forEach(f => {
            html += `<tr><td>${f}</td><td>$${dias[f].toFixed(2)}</td></tr>`;
        });
        html += `</table><div class="resumen-caja">TOTAL: $${total.toFixed(2)}</div>`;
        document.getElementById("driver-stats").innerHTML = total > 0 ? html : "No hay viajes hoy.";
    }

    // --- LÓGICA DE VIAJES ---
    window.publicarViaje = async () => {
        const oferta = document.getElementById("oferta-cliente").value;
        const docRef = await addDoc(collection(db, "viajes"), {
            clienteId: miUid, clienteNombre: miNombre,
            origen: document.getElementById("origin").value,
            destino: document.getElementById("destination").value,
            ofertaActual: parseFloat(oferta),
            estado: "buscando", timestamp: serverTimestamp()
        });
        viajeActivoId = docRef.id;
        escucharViaje(docRef.id);
    };

    function escucharViaje(id) {
        onSnapshot(doc(db, "viajes", id), (snap) => {
            const v = snap.data();
            if (v.estado === "negociando" && miRol === 'cliente') {
                document.getElementById("info-oferta-driver").innerText = `${v.driverNombre} ofrece $${v.contraOferta}`;
                document.getElementById("modal-oferta-cliente").style.display = "block";
            }
            if (v.estado === "aceptado") {
                document.getElementById("modal-oferta-cliente").style.display = "none";
                document.getElementById("precio-area").style.display = "none";
                document.getElementById(miRol === 'cliente' ? 'chat-area-cliente' : 'chat-container-driver').style.display = "block";
                if(miRol === 'driver') document.getElementById('lista-viajes-global').style.display = 'none';
                conectarChat(id);
            }
            if (v.estado === "finalizado") location.reload();
        });
    }

    function cargarViajesDisponibles() {
        onSnapshot(query(collection(db, "viajes"), where("estado", "==", "buscando")), (snap) => {
            document.getElementById("lista-viajes-global").innerHTML = snap.docs.map(d => `
                <div class="oferta-tag">
                    <div><b>${d.data().clienteNombre}</b><br><small>${d.data().destino}</small><br><b>$${d.data().ofertaActual}</b></div>
                    <button class="btn-action" style="width:100px; background:var(--accent); color:black;" onclick="enviarContraOferta('${d.id}', ${d.data().ofertaActual})">ACEPTAR</button>
                </div>`).join('') || "Buscando clientes...";
        });
    }

    window.enviarContraOferta = async (id, cliOferta) => {
        const contra = prompt("¿Cuánto quieres cobrar?", cliOferta);
        if (contra) {
            await updateDoc(doc(db, "viajes", id), {
                driverId: miUid, driverNombre: miNombre,
                contraOferta: parseFloat(contra), estado: "negociando"
            });
            viajeActivoId = id;
            escucharViaje(id);
        }
    };

    window.responderOferta = async (si) => {
        const v = await getDoc(doc(db, "viajes", viajeActivoId));
        if (si) await updateDoc(doc(db, "viajes", viajeActivoId), { estado: "aceptado", precioFinal: v.data().contraOferta });
        else { await updateDoc(doc(db, "viajes", viajeActivoId), { estado: "buscando" }); document.getElementById("modal-oferta-cliente").style.display = "none"; }
    };

    function conectarChat(id) {
        onSnapshot(query(collection(db, "mensajes"), where("viajeId", "==", id)), (snap) => {
            let msgs = snap.docs.map(d => d.data()).sort((a,b) => a.time - b.time);
            const box = document.getElementById(miRol === 'cliente' ? 'chat-box-cliente' : 'chat-box-driver');
            box.innerHTML = msgs.map(m => `<div class="msg ${m.emisorId === miUid ? 'mio' : 'otro'}">${m.texto}</div>`).join('');
            box.scrollTop = box.scrollHeight;
        });
    }

    window.enviarMensaje = async (rol) => {
        const inp = document.getElementById(rol === 'cliente' ? 'input-msg-cliente' : 'input-msg-driver');
        if (!inp.value) return;
        await addDoc(collection(db, "mensajes"), { viajeId: viajeActivoId, emisorId: miUid, texto: inp.value, time: Date.now() });
        inp.value = "";
    };

    window.finalizarViaje = async () => {
        const hoy = new Date().toISOString().split('T')[0];
        await updateDoc(doc(db, "viajes", viajeActivoId), { estado: "finalizado", fechaFinalizado: hoy });
    };

    // --- AUTH ---
    window.switchAuth = () => {
        const isReg = document.getElementById('reg-fields').style.display === 'none';
        document.getElementById('reg-fields').style.display = isReg ? 'block' : 'none';
        document.getElementById('btn-auth-main').innerText = isReg ? 'REGISTRARME' : 'INGRESAR';
    };

    window.ejecutarAuth = async () => {
        const mail = document.getElementById('auth-email').value, pass = document.getElementById('auth-pass').value;
        try {
            if(document.getElementById('reg-fields').style.display === 'block') {
                const uc = await createUserWithEmailAndPassword(auth, mail, pass);
                await addDoc(collection(db, "usuarios"), { uid: uc.user.uid, nombre: document.getElementById('reg-nombre').value, rol: document.getElementById('reg-rol').value });
            } else { await signInWithEmailAndPassword(auth, mail, pass); }
        } catch(e) { alert(e.message); }
    };

    onAuthStateChanged(auth, async (u) => {
        if(u) {
            miUid = u.uid;
            const s = await getDocs(query(collection(db, "usuarios"), where("uid", "==", u.uid)));
            s.forEach(d => {
                miRol = d.data().rol; miNombre = d.data().nombre;
                document.getElementById('auth-container').style.display='none';
                document.getElementById('btn-logout').style.display='block';
                if(miRol === 'cliente') { document.getElementById('cliente-view').style.display='block'; initLeaflet(); }
                else { document.getElementById('driver-view').style.display='block'; cargarViajesDisponibles(); actualizarContabilidad(); }
            });
        }
    });

    window.cerrarSesion = () => signOut(auth).then(()=>location.reload());
</script>
</body>
</html>
