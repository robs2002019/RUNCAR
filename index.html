<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN CAR - Oficial</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.11/build/css/intlTelInput.css"/>

    <style>
        *{ margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body{ background:#0f172a; color:white; }
        header{ background:#111827; padding:20px; text-align:center; font-size:28px; font-weight:bold; border-bottom: 2px solid #0ea5e9; }
        .container{ padding:15px; max-width: 800px; margin: auto; }
        .card{ background:#1e293b; padding:20px; border-radius:15px; margin-bottom:20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        h2{ margin-bottom:15px; color:#38bdf8; font-size: 1.2rem; }
        input, select, textarea{ width:100%; padding:12px; margin-top:10px; border:1px solid #334155; border-radius:10px; background:#334155; color:white; }
        label{ display: block; margin-top: 15px; font-size: 0.9rem; color: #94a3b8; }
        button{ width:100%; padding:14px; margin-top:12px; border:none; border-radius:10px; background:#0ea5e9; color:white; font-size:16px; font-weight: bold; cursor:pointer; transition: 0.3s; }
        button:hover{ background:#0284c7; }
        #map{ width:100%; height:400px; border-radius:15px; margin-top:15px; z-index: 1; }
        .info-box{ margin-top:15px; background:#111827; padding:15px; border-radius:12px; font-size:18px; text-align: center; border-left: 4px solid #0ea5e9; }
        .chat-box{ height:200px; overflow-y:auto; background:#0f172a; padding:10px; border-radius:10px; margin-top:10px; border: 1px solid #334155; }
        .mensaje{ background:#334155; padding:8px 12px; border-radius:10px; margin-bottom:8px; font-size: 0.9rem; }
        .admin-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .estado { padding:10px; border-radius:10px; text-align:center; margin-top:5px; font-weight:bold; }
        .online { background: #16a34a; }
        .offline { background: #dc2626; }
    </style>
</head>
<body>

<header>RUN CAR</header>

<div class="container">

    <div class="card" id="loginSection">
        <h2>Registro / Login</h2>
        <button id="googleLoginBtn">Continuar con Google</button>
        <p id="userEmail" style="text-align:center; margin-top:10px; color:#38bdf8;"></p>
    </div>

    <div class="card">
        <h2>Perfil Cliente</h2>
        <input type="text" id="clienteNombre" placeholder="Nombre completo">
        <input type="text" id="clientePais" placeholder="País">
        <input type="text" id="clienteCiudad" placeholder="Ciudad">
        <div style="margin-top:10px;">
            <input type="tel" id="telefonoCliente">
        </div>
        <label>Foto de perfil</label>
        <input type="file" id="clienteFoto" accept="image/*">
        <button id="guardarCliente">Guardar Perfil Cliente</button>
    </div>

    <div class="card">
        <h2>Perfil Conductor (Driver)</h2>
        <input type="text" id="driverNombre" placeholder="Nombre completo">
        <div style="margin-top:10px;">
            <input type="tel" id="telefonoDriver">
        </div>
        <input type="text" id="marcaVehiculo" placeholder="Marca (Ej: Toyota)">
        <input type="text" id="modeloVehiculo" placeholder="Modelo (Ej: Corolla)">
        <input type="number" id="anoVehiculo" placeholder="Año (Mínimo 2014)">
        <input type="text" id="placaVehiculo" placeholder="Número de placa">
        
        <label>Documentación (Fotos/PDF)</label>
        <input type="file" id="fotoRostro" accept="image/*">
        <label>Licencia de Conducir</label>
        <input type="file" id="licenciaConducir">
        <button id="guardarDriver">Registrarse como Driver</button>
    </div>

    <div class="card">
        <h2>Solicitar Viaje</h2>
        <input type="text" id="puntoA" placeholder="Origen (GPS actual...)" readonly>
        <input type="text" id="puntoB" placeholder="Destino (Click en el mapa)">
        
        <div id="map"></div>

        <div class="info-box">
            Distancia: <span id="distanciaTexto">0 km</span><br>
            Sugerencia: <span id="costoViaje">$0.00</span>
        </div>

        <input type="number" id="ofertaCliente" placeholder="Tu oferta ($)">
        <button id="calcularRutaBtn">Calcular Ruta</button>
        <button id="enviarSolicitud" style="background:#16a34a;">Pedir RUN CAR</button>
    </div>

    <div class="card">
        <h2>Estado del Viaje</h2>
        <div id="estadoViaje" class="info-box">Esperando solicitud...</div>
        <div id="temporizador" style="font-size:20px; text-align:center; margin:10px;">30</div>
        
        <div class="chat-box" id="chatMensajes"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="mensajeChat" placeholder="Mensaje...">
            <button id="enviarMensaje" style="width:100px;">Enviar</button>
        </div>
    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.11/build/js/intlTelInput.min.js"></script>

<script type="module">
    // CONFIGURACIÓN FIREBASE (Mantén la tuya)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAyRrBUmw4OEzS7EmvK_XmDk6Z5rrjLC3A",
        authDomain: "runcar-6eda0.firebaseapp.com",
        projectId: "runcar-6eda0",
        storageBucket: "runcar-6eda0.firebasestorage.app",
        messagingSenderId: "152627344672",
        appId: "1:152627344672:web:b420d1c8cbb670069b9345"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let userCoords = { lat: 13.6929, lng: -89.2182 }; // Default

    // --- AUTENTICACIÓN ---
    document.getElementById('googleLoginBtn').onclick = async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            currentUser = result.user;
            document.getElementById('userEmail').innerText = "Conectado como: " + currentUser.email;
            alert("Bienvenido " + currentUser.displayName);
        } catch (error) {
            console.error(error);
            alert("Error al iniciar sesión");
        }
    };

    // --- SUBIR ARCHIVOS ---
    async function subirArchivo(file, folder) {
        if(!file) return "";
        const storageRef = ref(storage, `${folder}/${currentUser.uid}_${Date.now()}`);
        await uploadBytes(storageRef, file);
        return await getDownloadURL(storageRef);
    }

    // --- GUARDAR CLIENTE ---
    document.getElementById('guardarCliente').onclick = async () => {
        if(!currentUser) return alert("Inicia sesión primero");
        const btn = document.getElementById('guardarCliente');
        btn.innerText = "Guardando...";
        
        const fotoURL = await subirArchivo(document.getElementById('clienteFoto').files[0], "clientes");

        await setDoc(doc(db, "users", currentUser.uid), {
            role: "cliente",
            nombre: document.getElementById('clienteNombre').value,
            telefono: document.getElementById('telefonoCliente').value,
            foto: fotoURL,
            updatedAt: serverTimestamp()
        }, { merge: true });

        btn.innerText = "Guardar Perfil Cliente";
        alert("¡Datos de cliente guardados!");
    };

    // --- GUARDAR DRIVER ---
    document.getElementById('guardarDriver').onclick = async () => {
        if(!currentUser) return alert("Inicia sesión primero");
        const anio = parseInt(document.getElementById('anoVehiculo').value);
        if(anio < 2014) return alert("El vehículo debe ser año 2014 o superior.");

        const btn = document.getElementById('guardarDriver');
        btn.innerText = "Procesando...";

        const licenciaURL = await subirArchivo(document.getElementById('licenciaConducir').files[0], "drivers/docs");

        await setDoc(doc(db, "users", currentUser.uid), {
            role: "driver",
            nombre: document.getElementById('driverNombre').value,
            vehiculo: {
                marca: document.getElementById('marcaVehiculo').value,
                modelo: document.getElementById('modeloVehiculo').value,
                anio: anio,
                placa: document.getElementById('placaVehiculo').value
            },
            licencia: licenciaURL,
            status: "pendiente_aprobacion"
        }, { merge: true });

        btn.innerText = "Registrarse como Driver";
        alert("Registro enviado a revisión");
    };

    // --- MAPA Y GPS REAL ---
    const map = L.map('map').setView([userCoords.lat, userCoords.lng], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let routingControl = null;
    let destinoCoord = null;

    // Obtener Ubicación Real
    navigator.geolocation.getCurrentPosition((pos) => {
        userCoords.lat = pos.coords.latitude;
        userCoords.lng = pos.coords.longitude;
        map.setView([userCoords.lat, userCoords.lng], 15);
        L.marker([userCoords.lat, userCoords.lng]).addTo(map).bindPopup("Estás aquí").openPopup();
        document.getElementById('puntoA').value = `Mi ubicación (${userCoords.lat.toFixed(4)})`;
    }, (err) => {
        console.warn("Error GPS:", err.message);
        alert("Activa el GPS para una mejor experiencia");
    });

    // Click en mapa para destino
    map.on('click', (e) => {
        destinoCoord = e.latlng;
        document.getElementById('puntoB').value = `${destinoCoord.lat.toFixed(4)}, ${destinoCoord.lng.toFixed(4)}`;
        
        if (routingControl) map.removeControl(routingControl);

        routingControl = L.Routing.control({
            waypoints: [
                L.latLng(userCoords.lat, userCoords.lng),
                L.latLng(destinoCoord.lat, destinoCoord.lng)
            ],
            createMarker: () => null 
        }).addTo(map);

        routingControl.on('routesfound', (e) => {
            const dist = e.routes[0].summary.totalDistance / 1000;
            document.getElementById('distanciaTexto').innerText = dist.toFixed(2) + " km";
            
            // Cálculo tarifa
     let costo = 0;

if(km <= 3){

costo = km * 1;

}else{

const extra = km - 3;

costo = 3 + (extra * 0.30);

}

document.getElementById(
"costoViaje"
).innerHTML =
"$" + costo.toFixed(2);

document.getElementById(
"ofertaApp"
).value =
costo.toFixed(2);

}
);

};


    // --- ENVIAR SOLICITUD ---
    document.getElementById('enviarSolicitud').onclick = async () => {
        if(!currentUser) return alert("Inicia sesión");
        if(!destinoCoord) return alert("Selecciona un destino en el mapa");

        await addDoc(collection(db, "viajes"), {
            clienteId: currentUser.uid,
            clienteNombre: currentUser.displayName,
            origen: { lat: userCoords.lat, lng: userCoords.lng },
            destino: { lat: destinoCoord.lat, lng: destinoCoord.lng },
            oferta: document.getElementById('ofertaCliente').value,
            estado: "buscando",
            timestamp: serverTimestamp()
        });

        iniciarTemporizador();
        document.getElementById('estadoViaje').innerText = "Buscando Driver cercano...";
    };

    function iniciarTemporizador() {
        let seg = 30;
        const t = setInterval(() => {
            seg--;
            document.getElementById('temporizador').innerText = seg;
            if(seg <= 0) {
                clearInterval(t);
                document.getElementById('estadoViaje').innerText = "No hay conductores disponibles ahora.";
            }
        }, 1000);
    }

    // --- CHAT SIMPLE ---
    document.getElementById('enviarMensaje').onclick = () => {
        const msg = document.getElementById('mensajeChat').value;
        if(!msg) return;
        const box = document.getElementById('chatMensajes');
        const div = document.createElement('div');
        div.className = 'mensaje';
        div.innerText = `Tú: ${msg}`;
        box.appendChild(div);
        document.getElementById('mensajeChat').value = "";
        box.scrollTop = box.scrollHeight;
    };

    // --- INICIALIZAR TELÉFONOS ---
    window.intlTelInput(document.querySelector("#telefonoCliente"), { initialCountry: "sv", separateDialCode: true });
    window.intlTelInput(document.querySelector("#telefonoDriver"), { initialCountry: "sv", separateDialCode: true });

</script>

</body>
</html>
