<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNCAR - Registro Oficial</title>
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #facc15; 
            --bg: #f3f4f6;
            --white: #ffffff;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        header { text-align: center; padding-bottom: 30px; }
        header h1 { color: var(--primary); letter-spacing: -1px; font-size: 2.5rem; }
        
        .module {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #e5e7eb;
            margin-bottom: 30px;
        }
        .module-header {
            background: var(--primary);
            color: var(--accent);
            padding: 15px;
            font-weight: bold;
            text-align: center;
        }
        .field-group { padding: 20px; }
        
        label { display: block; margin-top: 10px; font-weight: bold; color: #374151; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .file-input { background: #f9fafb; border: 1px dashed #cbd5e1; padding: 10px; }
        
        button {
            background: var(--accent);
            color: var(--primary);
            border: none;
            padding: 15px;
            width: 100%;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover { background: #eab308; transform: translateY(-2px); }
        .driver-accent { border-top: 5px solid var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>RUN<span style="color:var(--accent)">CAR</span></h1>
        <span>Plataforma de Transporte Internacional</span>
    </header>

    <div class="module">
        <div class="module-header">REGISTRO DE CLIENTES (ID: 01)</div>
        <div class="field-group" id="form-cliente">
            <label>Nombre Completo:</label>
            <input type="text" id="c_nombre" placeholder="Nombre y Apellido">
            
            <label>Correo Electrónico:</label>
            <input type="email" id="c_correo" placeholder="correo@ejemplo.com">
            
            <label>Número de Teléfono:</label>
            <input type="tel" id="c_telefono" placeholder="Ej: +503 7777-7777">
            
            <button onclick="registrar('cliente')">REGISTRARSE COMO CLIENTE</button>
        </div>
    </div>

    <div class="module driver-accent">
        <div class="module-header">REGISTRO DE DRIVERS (ID: 02)</div>
        <div class="field-group" id="form-driver">
            <label>Nombre del Conductor:</label>
            <input type="text" id="d_nombre" placeholder="Nombre completo">
            
            <label>Email de Trabajo:</label>
            <input type="email" id="d_correo" placeholder="conductor@runcar.com">
            
            <label>Teléfono de Contacto:</label>
            <input type="tel" id="d_telefono" placeholder="Número activo">

            <div style="background: #fff8e1; padding: 10px; border-radius: 8px; margin-top: 15px;">
                <p style="margin: 0; font-size: 0.8rem; font-weight: bold;">DOCUMENTACIÓN (Fotos/PDF):</p>
                <label>Licencia de Conducir:</label>
                <input type="file" id="d_licencia" class="file-input">
                
                <label>Antecedentes Penales:</label>
                <input type="file" id="d_antecedentes" class="file-input">
            </div>
            
            <button onclick="registrar('driver')">ENVIAR SOLICITUD DE DRIVER</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAyRrBUmw4OEzS7EmvK_XmDk6Z5rrjLC3A",
        authDomain: "runcar-6eda0.firebaseapp.com",
        projectId: "runcar-6eda0",
        storageBucket: "runcar-6eda0.firebasestorage.app",
        messagingSenderId: "152627344672",
        appId: "1:152627344672:web:b420d1c8cbb670069b9345"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function registrar(tipo) {
        let datos = {};
        const prefijo = tipo === 'cliente' ? 'c_' : 'd_';
        
        const nombre = document.getElementById(prefijo + 'nombre').value;
        const correo = document.getElementById(prefijo + 'correo').value;
        const telefono = document.getElementById(prefijo + 'telefono').value;

        if(!nombre || !correo || !telefono) {
            alert("Por favor completa los campos principales.");
            return;
        }

        datos = {
            nombre: nombre,
            email: correo,
            telefono: telefono,
            rol: tipo,
            fechaRegistro: new Date(),
            estado: tipo === 'driver' ? 'pendiente_revision' : 'activo'
        };

        try {
            // Esto creará automáticamente las colecciones "usuarios" en tu Firebase
            const docRef = await addDoc(collection(db, "usuarios"), datos);
            alert("¡Éxito! Registrado como " + tipo + ". ID: " + docRef.id);
            
            // Limpiar campos
            document.getElementById(prefijo + 'nombre').value = "";
            document.getElementById(prefijo + 'correo').value = "";
            document.getElementById(prefijo + 'telefono').value = "";
        } catch (e) {
            console.error("Error: ", e);
            alert("Error al conectar con Firebase. Revisa las reglas de seguridad.");
        }
    }

    window.registrar = registrar;
</script>

</body>
</html>
