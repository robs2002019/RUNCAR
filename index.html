<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RUN CAR PRO GLOBAL</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

:root{
--primary:#2ecc71;
--secondary:#121212;
--danger:#e74c3c;
--white:#ffffff;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:var(--secondary);
color:white;
}

header{
padding:15px;
text-align:center;
background:black;
border-bottom:2px solid var(--primary);
}

.container{
max-width:500px;
margin:auto;
padding:15px;
}

.card{
background:white;
color:black;
padding:18px;
border-radius:20px;
margin-bottom:15px;
box-shadow:0 5px 20px rgba(0,0,0,.4);
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
margin-top:5px;
}

.btn-primary{
background:var(--primary);
color:white;
}

.btn-danger{
background:var(--danger);
color:white;
}

#map{
height:350px;
border-radius:20px;
margin-bottom:15px;
border:2px solid var(--primary);
}

.section{
display:none;
}

.active{
display:block;
}

.suggestions{
background:white;
color:black;
border-radius:10px;
overflow:hidden;
max-height:150px;
overflow-y:auto;
}

.suggestion-item{
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content{
background:white;
color:black;
padding:20px;
border-radius:20px;
width:90%;
max-width:400px;
}

.chat-box{
height:200px;
overflow-y:auto;
background:#eee;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
<h2>
RUN <span style="color:#2ecc71;">CAR</span> PRO
</h2>
</header>

<div class="container">

<!-- LOGIN -->
<div id="authSection" class="section active">

<div class="card">

<h3 id="authTitle">Acceso</h3>

<input type="email" id="email" placeholder="Correo">

<input type="password" id="password" placeholder="Contraseña">

<div id="registerFields" style="display:none;">

<input type="text" id="nombre" placeholder="Nombre completo">

<select id="rol">
<option value="cliente">Cliente</option>
<option value="driver">Conductor</option>
</select>

<input type="tel" id="telefono" placeholder="WhatsApp">

<input type="file" id="fotoPerfil">

<div id="driverFields" style="display:none;">

<input type="text" id="marca" placeholder="Marca vehículo">

<input type="text" id="modelo" placeholder="Modelo">

<input type="number" id="year" placeholder="Año mínimo 2014">

<input type="text" id="placa" placeholder="Placa">

<input type="file" id="fotoAuto">

<input type="file" id="fotoLicencia">

</div>

</div>

<button id="btnAuth" class="btn-primary">
INGRESAR
</button>

<p id="switchMode"
style="text-align:center;cursor:pointer;">
¿No tienes cuenta? Regístrate
</p>

</div>
</div>

<!-- CLIENTE -->
<div id="clienteSection" class="section">

<div id="map"></div>

<div class="card">

<button id="btnGPS" class="btn-primary">
USAR GPS
</button>

<input id="origin"
placeholder="Origen">

<div id="originSug"
class="suggestions"></div>

<input id="destination"
placeholder="Destino">

<div id="destSug"
class="suggestions"></div>

<button id="btnRuta"
class="btn-primary">
CALCULAR
</button>

<div id="precioArea"
style="display:none;">

<h3 id="distanciaText"></h3>

<h2 id="priceMaps"></h2>

<input type="number"
id="ofertaCliente"
placeholder="Tu oferta">

<button id="btnPublicar"
class="btn-primary">
PUBLICAR VIAJE
</button>

</div>

</div>

</div>

<!-- DRIVER -->
<div id="driverSection"
class="section">

<div id="listaViajes"></div>

</div>

<!-- CHAT -->
<div id="chatContainer"></div>

<button id="logoutBtn"
class="btn-danger"
style="display:none;">
CERRAR SESIÓN
</button>

</div>

<!-- MODAL -->
<div class="modal"
id="modal">

<div class="modal-content"
id="modalBody"></div>

</div>

<script type="module">

import {
initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
where,
onSnapshot,
serverTimestamp,
doc,
updateDoc,
getDoc,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.1/firebase-storage.js";

const firebaseConfig = {

apiKey:"AIzaSyAyRrBUmw4OEzS7EmvK_XmDk6Z5rrjLC3A",

authDomain:"runcar-6eda0.firebaseapp.com",

projectId:"runcar-6eda0",

storageBucket:"runcar-6eda0.firebasestorage.app",

messagingSenderId:"152627344672",

appId:"1:152627344672:web:b420d1c8cbb670069b9345"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

const storage = getStorage(app);

let isRegister = false;

let miUid = "";

let miNombre = "";

let miRol = "";

let map;

let markerA;

let markerB;

let polyline;

let coordsA = null;

let coordsB = null;

const authTitle = document.getElementById("authTitle");

const registerFields = document.getElementById("registerFields");

const switchMode = document.getElementById("switchMode");

const btnAuth = document.getElementById("btnAuth");

const rol = document.getElementById("rol");

rol.addEventListener("change",()=>{

document.getElementById("driverFields").style.display =
rol.value === "driver" ? "block" : "none";

});

switchMode.addEventListener("click",()=>{

isRegister = !isRegister;

registerFields.style.display =
isRegister ? "block" : "none";

authTitle.innerText =
isRegister ? "Registro" : "Acceso";

btnAuth.innerText =
isRegister ? "REGISTRARME" : "INGRESAR";

});

function initMap(){

if(map) return;

map = L.map("map").setView([13.7,-89.2],13);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
).addTo(map);

markerA = L.marker([13.7,-89.2],
{draggable:true}).addTo(map);

markerB = L.marker([13.71,-89.21],
{draggable:true}).addTo(map);

markerA.on("dragend",e=>{

coordsA = [
e.target.getLatLng().lat,
e.target.getLatLng().lng
];

});

markerB.on("dragend",e=>{

coordsB = [
e.target.getLatLng().lat,
e.target.getLatLng().lng
];

});

}

document.getElementById("btnGPS")
.addEventListener("click",()=>{

navigator.geolocation.getCurrentPosition(pos=>{

coordsA = [
pos.coords.latitude,
pos.coords.longitude
];

if(markerA){

markerA.setLatLng(coordsA);

map.flyTo(coordsA,15);

}

});

});

async function subirImagen(id,path){

const file =
document.getElementById(id).files[0];

if(!file) return "";

const storageRef =
ref(storage,
`docs/${miUid}/${path}_${Date.now()}`
);

await uploadBytes(storageRef,file);

return await getDownloadURL(storageRef);

}

btnAuth.addEventListener("click",
async()=>{

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

if(isRegister){

const cred =
await createUserWithEmailAndPassword(
auth,
email,
password
);

miUid = cred.user.uid;

const data = {

uid:miUid,

nombre:
document.getElementById("nombre").value,

email,

rol:rol.value,

telefono:
document.getElementById("telefono").value,

activo:true,

fotoPerfil:
await subirImagen("fotoPerfil","perfil")

};

if(rol.value === "driver"){

const year =
parseInt(
document.getElementById("year").value
);

if(year < 2014){

alert("Vehículo mínimo 2014");

return;

}

data.vehiculo = {

marca:
document.getElementById("marca").value,

modelo:
document.getElementById("modelo").value,

year,

placa:
document.getElementById("placa").value,

fotoAuto:
await subirImagen("fotoAuto","auto"),

fotoLicencia:
await subirImagen("fotoLicencia","licencia")

};

}

await addDoc(
collection(db,"usuarios"),
data
);

alert("Registro exitoso");

}else{

await signInWithEmailAndPassword(
auth,
email,
password
);

}

}catch(err){

console.log(err);

alert(err.message);

}

});

onAuthStateChanged(auth,
async(user)=>{

if(!user) return;

miUid = user.uid;

document.getElementById("authSection")
.classList.remove("active");

document.getElementById("logoutBtn")
.style.display = "block";

const q = query(
collection(db,"usuarios"),
where("uid","==",user.uid)
);

const snap = await getDocs(q);

snap.forEach(docu=>{

const d = docu.data();

miNombre = d.nombre;

miRol = d.rol;

if(miRol === "cliente"){

document.getElementById("clienteSection")
.classList.add("active");

setTimeout(()=>{

initMap();

},500);

escucharCliente();

}else{

document.getElementById("driverSection")
.classList.add("active");

escucharViajesDriver();

}

});

});

document.getElementById("btnRuta")
.addEventListener("click",
async()=>{

if(!coordsA || !coordsB){

alert("Selecciona puntos");

return;

}

try{

const res = await fetch(
`https://router.project-osrm.org/route/v1/driving/${coordsA[1]},${coordsA[0]};${coordsB[1]},${coordsB[0]}?overview=full&geometries=geojson`
);

const data = await res.json();

const route = data.routes[0];

const km = route.distance / 1000;

let precio = 0;

if(km <=1) precio = 1;
else if(km <=2) precio = 2;
else if(km <=3) precio = 3;
else precio = 3 + ((km-3)*0.30);

if(polyline){

map.removeLayer(polyline);

}

polyline =
L.geoJSON(route.geometry).addTo(map);

document.getElementById("distanciaText")
.innerText =
km.toFixed(2)+" km";

document.getElementById("priceMaps")
.innerText =
"$"+precio.toFixed(2);

document.getElementById("ofertaCliente")
.value =
precio.toFixed(2);

document.getElementById("precioArea")
.style.display = "block";

}catch(e){

console.log(e);

alert("Error calculando ruta");

}

});

document.getElementById("btnPublicar")
.addEventListener("click",
async()=>{

try{

await addDoc(collection(db,"viajes"),{

clienteId:miUid,

clienteNombre:miNombre,

origen:
document.getElementById("origin").value,

destino:
document.getElementById("destination").value,

ofertaActual:
parseFloat(
document.getElementById("ofertaCliente").value
),

estado:"buscando",

timestamp:serverTimestamp()

});

alert("Viaje publicado");

}catch(e){

console.log(e);

alert("Error publicando viaje");

}

});

function escucharViajesDriver(){

const q = query(
collection(db,"viajes"),
where("estado","==","buscando")
);

onSnapshot(q,snap=>{

const lista =
document.getElementById("listaViajes");

lista.innerHTML = "";

snap.forEach(docu=>{

const v = docu.data();

const div =
document.createElement("div");

div.className = "card";

div.innerHTML = `

<p><b>${v.origen}</b></p>

<p>${v.destino}</p>

<h3>$${v.ofertaActual}</h3>

<button class="btn-primary">
ACEPTAR
</button>

`;

div.querySelector("button")
.addEventListener("click",
()=>aceptarViaje(docu.id));

lista.appendChild(div);

});

});

}

async function aceptarViaje(id){

await updateDoc(
doc(db,"viajes",id),
{
estado:"aceptado",
driverId:miUid,
driverNombre:miNombre
}
);

abrirChat(id);

}

function escucharCliente(){

const q = query(
collection(db,"viajes"),
where("clienteId","==",miUid)
);

onSnapshot(q,snap=>{

snap.forEach(docu=>{

const v = docu.data();

if(v.estado === "aceptado"){

abrirChat(docu.id);

}

});

});

}

function abrirChat(id){

if(document.getElementById("chatBox")) return;

const container =
document.getElementById("chatContainer");

container.innerHTML = `

<div class="card" id="chatBox">

<h3>Chat del viaje</h3>

<div class="chat-box"
id="chatMessages"></div>

<input type="text"
id="msgInput"
placeholder="Mensaje">

<button id="sendMsg"
class="btn-primary">
ENVIAR
</button>

<button id="finishTrip"
class="btn-danger">
FINALIZAR
</button>

</div>

`;

document.getElementById("sendMsg")
.addEventListener("click",
()=>enviarMensaje(id));

document.getElementById("finishTrip")
.addEventListener("click",
()=>finalizarViaje(id));

onSnapshot(
query(
collection(db,"viajes",id,"mensajes"),
orderBy("timestamp","asc")
),
snap=>{

const box =
document.getElementById("chatMessages");

if(!box) return;

box.innerHTML = "";

snap.forEach(m=>{

const d = m.data();

box.innerHTML += `
<p>
<b>${d.user}:</b>
${d.msg}
</p>
`;

});

box.scrollTop = box.scrollHeight;

});

}

async function enviarMensaje(id){

const input =
document.getElementById("msgInput");

if(!input.value) return;

await addDoc(
collection(db,"viajes",id,"mensajes"),
{
user:miNombre,
msg:input.value,
timestamp:serverTimestamp()
}
);

input.value = "";

}

async function finalizarViaje(id){

await updateDoc(
doc(db,"viajes",id),
{
estado:"finalizado"
}
);

alert("Viaje finalizado");

location.reload();

}

document.getElementById("logoutBtn")
.addEventListener("click",
()=>{

signOut(auth);

location.reload();

});

window.addEventListener("error",e=>{

console.log("ERROR:",e.message);

});

window.addEventListener(
"unhandledrejection",
e=>{

console.log("PROMISE:",e.reason);

});

</script>

</body>
</html>
