<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN CAR PRO - Global</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root { --primary: #2ecc71; --secondary: #1a1a1a; --accent: #f1c40f; --white: #ffffff; --danger: #e74c3c; --chat-bg: #e5ddd5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--secondary); color: white; padding-bottom: 50px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        header { text-align: center; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 0 0 25px 25px; border-bottom: 2px solid var(--primary); margin-bottom: 20px; }
        .card { background: var(--white); color: #333; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 15px; position: relative; overflow: hidden; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; box-sizing: border-box; }
        label { font-size: 12px; font-weight: bold; color: #666; display: block; margin-top: 10px; }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        
        #map { width: 100%; height: 350px; border-radius: 20px; margin-bottom: 15px; border: 2px solid var(--primary); z-index: 1; }
        .section { display: none; }
        .active-section { display: block; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; overflow-y: auto; }
        .modal-content { background: white; color: #333; width: 90%; max-width: 450px; padding: 20px; border-radius: 20px; max-height: 90vh; overflow-y: auto; }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .suggestions { background: white; color: black; position: absolute; width: 100%; z-index: 1000; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); max-height: 150px; overflow-y: auto; }
        .suggestion-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; color: #333; font-size: 12px; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
        .alert-chat { background: #ff9800; color: white; padding: 10px; border-radius: 10px; font-weight: bold; font-size: 12px; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; letter-spacing: 2px;">RUN <span style="color:var(--primary)">CAR</span> PRO</h2>
</header>

<div class="container">
    <!-- SECCIÓN DE ACCESO / REGISTRO -->
    <div id="auth-container" class="section active-section">
        <div class="card">
            <h3 style="text-align:center; margin-top:0;">Bienvenido</h3>
            <input type="email" id="auth-email" placeholder="Correo Electrónico">
            <input type="password" id="auth-pass" placeholder="Contraseña">
            
            <div id="reg-fields" style="display:none;">
                <input type="text" id="reg-nombre" placeholder="Nombre Completo">
                <label>WhatsApp Internacional</label>
                <div style="display: flex; gap: 5px;">
                    <select id="reg-prefijo" style="flex: 1.5;"></select>
                    <input type="tel" id="reg-tel" placeholder="Número" style="flex: 2;">
                </div>
                <label>Foto de Perfil (URL)</label>
                <input type="text" id="reg-foto" placeholder="Enlace de tu foto">

                <select id="reg-rol" onchange="toggleRegDriver(this.value)">
                    <option value="cliente">Soy Cliente</option>
                    <option value="driver">Quiero ser Conductor</option>
                </select>

                <!-- Campos específicos para Driver -->
                <div id="fields-driver" style="display:none; border-top: 2px dashed #eee; margin-top:10px; padding-top:10px;">
                    <input type="text" id="d-marca" placeholder="Marca y Modelo del Vehículo">
                    <input type="text" id="d-placa" placeholder="Número de Placa">
                    <input type="number" id="d-ano" placeholder="Año (2014 en adelante)" min="2014">
                    <input type="text" id="d-foto-solvencia" placeholder="URL Foto Solvencia Policial">
                    <input type="text" id="d-foto-penales" placeholder="URL Antecedentes Penales">
                    <input type="text" id="d-foto-vehiculo" placeholder="URL Foto del Vehículo">
                    <input type="text" id="d-foto-placa" placeholder="URL Foto de la Placa">
                    <input type="text" id="d-foto-licencia" placeholder="URL Foto Licencia de Conducir">
                </div>
            </div>
            
            <button class="btn-action" onclick="ejecutarAuth()" id="btn-auth-main">INGRESAR</button>
            <p onclick="switchAuth()" id="switch-text" style="text-align:center; cursor:pointer; color:#666;">¿No tienes cuenta? Regístrate</p>
        </div>
    </div>

    <!-- VISTA CLIENTE -->
    <div id="cliente-view" class="section">
        <div id="map"></div>
        <div class="card">
            <button onclick="usarGPS()" style="background:#3498db;" class="btn-action">📍 MI UBICACIÓN (Punto A)</button>
            <div style="position:relative">
                <input id="origin" placeholder="📍 Origen (A)" oninput="buscarDireccion(this, 'sug-origin')">
                <div id="sug-origin" class="suggestions"></div>
            </div>
            <div style="position:relative">
                <input id="destination" placeholder="🏁 Destino (B)" oninput="buscarDireccion(this, 'sug-dest')">
                <div id="sug-dest" class="suggestions"></div>
            </div>

            <div class="grid-inputs">
                <div><label>Pers.</label><input type="number" id="p-adultos" value="1"></div>
                <div><label>Bebés</label><input type="number" id="p-bebes" value="0"></div>
                <div><label>Mascotas</label><input type="number" id="p-mascotas" value="0"></div>
                <div><label>Carga (kg)</label><input type="number" id="p-carga" value="0"></div>
            </div>
            <textarea id="p-notas" placeholder="Notas extras (ej. aire acondicionado, baúl amplio...)"></textarea>

            <div id="precio-area" style="display:none; text-align:center; border-top: 1px solid #eee; margin-top:10px; padding-top:10px;">
                <p>Distancia: <b id="distanciaText">0 km</b> | Sugerido: <b id="priceMaps">$0.00</b></p>
                <input type="number" id="oferta-cliente" placeholder="Tu oferta $" style="font-size:18px; text-align:center; color: var(--primary); font-weight: bold;">
                <button class="btn-action" onclick="publicarViaje()">ENVIAR MI OFERTA</button>
            </div>
            <button id="btn-calc" class="btn-action" style="background:#444;" onclick="calcularRutaOSRM()">CALCULAR RUTA Y PRECIO</button>
        </div>
    </div>

    <!-- VISTA DRIVER -->
    <div id="driver-view" class="section">
        <div class="card">
            <h4 style="margin:0">Mis Ingresos (Últimos 5 días)</h4>
            <div id="driver-stats"></div>
        </div>
        <h4 style="color:var(--primary)">Viajes Disponibles</h4>
        <div id="lista-viajes-global"></div>
    </div>

    <!-- VISTA ADMIN -->
    <div id="admin-view" class="section">
        <div class="card">
            <h3>Panel de Control</h3>
            <div id="admin-summary"></div>
            <hr>
            <div id="admin-users-list"></div>
        </div>
    </div>

    <!-- MODAL NEGOCIACIÓN / DETALLES -->
    <div id="modal-negociacion" class="modal">
        <div class="modal-content" id="modal-content-body"></div>
    </div>

    <button id="btn-logout" class="btn-action" style="display:none; background:var(--danger); margin-top:20px;" onclick="cerrarSesion()">CERRAR SESIÓN</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot, serverTimestamp, doc, updateDoc, getDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAyRrBUmw4OEzS7EmvK_XmDk6Z5rrjLC3A",
        authDomain: "runcar-6eda0.firebaseapp.com",
        projectId: "runcar-6eda0",
        storageBucket: "runcar-6eda0.firebasestorage.app",
        messagingSenderId: "152627344672",
        appId: "1:152627344672:web:b420d1c8cbb670069b9345"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let lMap, markerOrigen, markerDestino, polylineRuta;
    let coordsOrigen = null, coordsDestino = null;
    let miRol = "", miUid = "", miNombre = "", isReg = false;

    // --- MAPAS ---
    window.initLeaflet = () => {
        if (lMap) return;
        lMap = L.map('map').setView([13.7, -89.2], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(lMap);

        const iconA = L.divIcon({html: '<b style="background:white;padding:5px;border-radius:50%;border:2px solid green">A</b>', className:''});
        const iconB = L.divIcon({html: '<b style="background:white;padding:5px;border-radius:50%;border:2px solid red">B</b>', className:''});

        markerOrigen = L.marker([13.7, -89.2], {draggable: true, icon: iconA}).addTo(lMap);
        markerDestino = L.marker([13.71, -89.21], {draggable: true, icon: iconB}).addTo(lMap);

        markerOrigen.on('dragend', e => handleDrag(e, 'origin'));
        markerDestino.on('dragend', e => handleDrag(e, 'destination'));
    };

    async function handleDrag(e, inputId) {
        const pos = e.target.getLatLng();
        if(inputId === 'origin') coordsOrigen = [pos.lat, pos.lng];
        else coordsDestino = [pos.lat, pos.lng];
        
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.lat}&lon=${pos.lng}`);
        const data = await res.json();
        document.getElementById(inputId).value = data.display_name || `${pos.lat}, ${pos.lng}`;
    }

    window.usarGPS = () => {
        navigator.geolocation.getCurrentPosition(pos => {
            const c = [pos.coords.latitude, pos.coords.longitude];
            coordsOrigen = c;
            markerOrigen.setLatLng(c);
            lMap.flyTo(c, 15);
            document.getElementById('origin').value = `${c[0]}, ${c[1]}`;
        });
    };

    window.buscarDireccion = async (input, targetId) => {
        const val = input.value;
        if (val.length < 4) return;
        const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(val)}&limit=5`);
        const data = await res.json();
        let h = "";
        data.features.forEach(f => {
            const lbl = `${f.properties.name || ''} ${f.properties.city || ''}`;
            h += `<div class="suggestion-item" onclick="seleccionarPos('${input.id}','${lbl}',${f.geometry.coordinates[1]},${f.geometry.coordinates[0]},'${targetId}')">${lbl}</div>`;
        });
        document.getElementById(targetId).innerHTML = h;
    };

    window.seleccionarPos = (inputId, lbl, lat, lon, targetId) => {
        document.getElementById(inputId).value = lbl;
        document.getElementById(targetId).innerHTML = "";
        const c = [lat, lon];
        if (inputId === 'origin') { coordsOrigen = c; markerOrigen.setLatLng(c); }
        else { coordsDestino = c; markerDestino.setLatLng(c); }
        lMap.flyTo(c, 14);
    };

    // --- CÁLCULO DE COSTO ---
    window.calcularRutaOSRM = async () => {
        if(!coordsOrigen || !coordsDestino) return alert("Selecciona origen y destino");
        const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coordsOrigen[1]},${coordsOrigen[0]};${coordsDestino[1]},${coordsDestino[0]}?overview=full&geometries=geojson`);
        const data = await res.json();
        if (data.code === 'Ok') {
            const r = data.routes[0];
            const km = r.distance / 1000;
            
            // Fórmula solicitada: 1km=$1, 2km=$2, 3km=$3, >3km= 3 + (km_extra * 0.30)
            let precio = 0;
            if(km <= 1) precio = 1;
            else if(km <= 2) precio = 2;
            else if(km <= 3) precio = 3;
            else precio = 3 + (km - 3) * 0.30;

            if (polylineRuta) lMap.removeLayer(polylineRuta);
            polylineRuta = L.geoJSON(r.geometry, {style:{color:'#2ecc71', weight:5}}).addTo(lMap);
            lMap.fitBounds(polylineRuta.getBounds());

            document.getElementById("distanciaText").innerText = km.toFixed(2) + " km";
            document.getElementById("priceMaps").innerText = "$" + precio.toFixed(2);
            document.getElementById("oferta-cliente").value = precio.toFixed(2);
            document.getElementById("precio-area").style.display = 'block';
        }
    };

    // --- PROCESO DE VIAJE ---
    window.publicarViaje = async () => {
        const viaje = {
            clienteId: miUid,
            clienteNombre: miNombre,
            origen: document.getElementById("origin").value,
            destino: document.getElementById("destination").value,
            km: document.getElementById("distanciaText").innerText,
            precioApp: document.getElementById("priceMaps").innerText,
            ofertaActual: parseFloat(document.getElementById("oferta-cliente").value),
            ofertaDe: "cliente",
            personas: document.getElementById("p-adultos").value,
            bebes: document.getElementById("p-bebes").value,
            mascotas: document.getElementById("p-mascotas").value,
            carga: document.getElementById("p-carga").value,
            notas: document.getElementById("p-notas").value,
            estado: "buscando",
            timestamp: serverTimestamp()
        };
        await addDoc(collection(db, "viajes"), viaje);
        alert("Oferta enviada. Espera a un conductor.");
    };

    function escucharViajesDriver() {
        onSnapshot(collection(db, "viajes"), (snap) => {
            const container = document.getElementById("lista-viajes-global");
            container.innerHTML = "";
            snap.forEach(docSnap => {
                const v = docSnap.data();
                if(v.estado === "buscando") {
                    const card = document.createElement("div");
                    card.className = "card";
                    card.innerHTML = `
                        <p><b>Origen:</b> ${v.origen}</p>
                        <p><b>Destino:</b> ${v.destino}</p>
                        <p><b>KM:</b> ${v.km} | <b>Oferta:</b> $${v.ofertaActual}</p>
                        <button class="btn-action" onclick="abrirNegociacion('${docSnap.id}')">DETALLES / PROPONER</button>
                    `;
                    container.appendChild(card);
                }
            });
        });
    }

    window.abrirNegociacion = async (id) => {
        const docRef = doc(db, "viajes", id);
        const v = (await getDoc(docRef)).data();
        const body = document.getElementById("modal-content-body");
        
        body.innerHTML = `
            <h3>Oferta de Viaje</h3>
            <p><b>Punto A:</b> ${v.origen}</p>
            <p><b>Punto B:</b> ${v.destino}</p>
            <hr>
            <p><b>Carga:</b> ${v.carga}kg | <b>Mascotas:</b> ${v.mascotas}</p>
            <p><b>Pasajeros:</b> ${v.personas} | <b>Bebés:</b> ${v.bebes}</p>
            <p><b>Notas:</b> ${v.notas}</p>
            <hr>
            <h2 style="text-align:center;color:green">$${v.ofertaActual}</h2>
            <div style="display:flex; gap:5px;">
                <button class="btn-action" onclick="responderViaje('${id}', 'aceptar')">ACEPTAR</button>
                <button class="btn-action" style="background:#444" onclick="contraOferta('${id}')">NUEVA PROPUESTA</button>
            </div>
            <button class="btn-action" style="background:red; margin-top:10px" onclick="cerrarModal()">RECHAZAR / CERRAR</button>
        `;
        document.getElementById("modal-negociacion").style.display = "flex";
    };

    window.contraOferta = async (id) => {
        const m = prompt("Ingresa tu propuesta de precio:");
        if(m) {
            await updateDoc(doc(db, "viajes", id), {
                ofertaActual: parseFloat(m),
                ofertaDe: "driver",
                driverId: miUid,
                driverNombre: miNombre,
                estado: "negociando"
            });
            cerrarModal();
        }
    };

    window.responderViaje = async (id, accion) => {
        if(accion === 'aceptar') {
            await updateDoc(doc(db, "viajes", id), { estado: 'aceptado', driverId: miUid, driverNombre: miNombre });
            abrirChat(id);
        }
    };

    function abrirChat(id) {
        cerrarModal();
        document.getElementById('cliente-view').classList.remove('active-section');
        document.getElementById('driver-view').classList.remove('active-section');
        
        const chatUI = document.createElement("div");
        chatUI.className = "card active-section";
        chatUI.id = "chat-active";
        chatUI.innerHTML = `
            <div class="alert-chat">⚠️ NO CERRAR ESTE CHAT HASTA FINALIZAR EL VIAJE</div>
            <div id="chat-box" style="height:250px; overflow-y:auto; background:#f9f9f9; padding:10px; border-radius:10px; margin-bottom:10px;"></div>
            <input id="chat-input" placeholder="Escribe un mensaje...">
            <button class="btn-action" onclick="enviarMensaje('${id}')">ENVIAR</button>
            <button class="btn-action" style="background:var(--danger); margin-top:10px;" onclick="finalizarViaje('${id}')">FINALIZAR VIAJE</button>
        `;
        document.querySelector(".container").appendChild(chatUI);

        onSnapshot(collection(db, "viajes", id, "mensajes"), (snap) => {
            const box = document.getElementById("chat-box");
            box.innerHTML = "";
            snap.forEach(m => {
                box.innerHTML += `<p><b>${m.data().user}:</b> ${m.data().msg}</p>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.enviarMensaje = async (id) => {
        const msg = document.getElementById("chat-input").value;
        if(!msg) return;
        await addDoc(collection(db, "viajes", id, "mensajes"), { user: miNombre, msg, timestamp: serverTimestamp() });
        document.getElementById("chat-input").value = "";
    };

    window.finalizarViaje = async (id) => {
        const v = (await getDoc(doc(db, "viajes", id))).data();
        await updateDoc(doc(db, "viajes", id), { 
            estado: 'finalizado', 
            fechaFinal: new Date().toISOString().split('T')[0],
            montoFinal: v.ofertaActual
        });
        alert("Viaje finalizado con éxito.");
        location.reload();
    };

    // --- ADMIN / CONTABILIDAD ---
    async function mostrarContabilidad() {
        const hoy = new Date();
        const dias = [];
        for(let i=0; i<5; i++) {
            let d = new Date();
            d.setDate(hoy.getDate() - i);
            dias.push(d.toISOString().split('T')[0]);
        }

        const q = query(collection(db, "viajes"), where("driverId", "==", miUid), where("estado", "==", "finalizado"));
        const snap = await getDocs(q);
        let totals = {}; dias.forEach(d => totals[d] = 0);
        
        snap.forEach(d => {
            const v = d.data();
            if(totals[v.fechaFinal] !== undefined) totals[v.fechaFinal] += v.montoFinal;
        });

        let tabla = `<table><tr><th>Fecha</th><th>Ingreso</th><th>8% App</th></tr>`;
        dias.forEach(d => {
            tabla += `<tr><td>${d}</td><td>$${totals[d].toFixed(2)}</td><td>$${(totals[d]*0.08).toFixed(2)}</td></tr>`;
        });
        document.getElementById("driver-stats").innerHTML = tabla + `</table>`;
    }

    async function initAdmin() {
        const snap = await getDocs(collection(db, "usuarios"));
        const container = document.getElementById("admin-users-list");
        container.innerHTML = "<h4>Conductores y Clientes</h4>";
        snap.forEach(uDoc => {
            const u = uDoc.data();
            const d = document.createElement("div");
            d.style.borderBottom = "1px solid #ccc";
            d.style.padding = "10px";
            d.innerHTML = `
                <p><b>${u.nombre}</b> (${u.rol}) - ${u.activo ? '✅' : '❌'}</p>
                <button onclick="toggleUser('${uDoc.id}', ${u.activo})">Activar/Desactivar</button>
            `;
            container.appendChild(d);
        });
    }

    window.toggleUser = async (id, act) => {
        await updateDoc(doc(db, "usuarios", id), { activo: !act });
        initAdmin();
    };

    // --- REGISTRO / AUTH ---
    window.switchAuth = () => {
        isReg = !isReg;
        document.getElementById('reg-fields').style.display = isReg ? 'block' : 'none';
        document.getElementById('btn-auth-main').innerText = isReg ? 'CREAR CUENTA' : 'INGRESAR';
        document.getElementById('switch-text').innerText = isReg ? '¿Ya tienes cuenta? Ingresa' : '¿No tienes cuenta? Regístrate';
    };

    window.toggleRegDriver = (val) => {
        document.getElementById('fields-driver').style.display = val === 'driver' ? 'block' : 'none';
    };

    window.ejecutarAuth = async () => {
        const mail = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        try {
            if(isReg) {
                const uc = await createUserWithEmailAndPassword(auth, mail, pass);
                const info = {
                    uid: uc.user.uid,
                    nombre: document.getElementById('reg-nombre').value,
                    email: mail,
                    rol: document.getElementById('reg-rol').value,
                    whatsapp: document.getElementById('reg-prefijo').value + document.getElementById('reg-tel').value,
                    fotoPerfil: document.getElementById('reg-foto').value,
                    activo: true
                };
                if(info.rol === 'driver') {
                    info.vehiculo = {
                        marca: document.getElementById('d-marca').value,
                        placa: document.getElementById('d-placa').value,
                        ano: document.getElementById('d-ano').value,
                        fotos: [document.getElementById('d-foto-vehiculo').value, document.getElementById('d-foto-placa').value],
                        documentos: { solvencia: document.getElementById('d-foto-solvencia').value, penales: document.getElementById('d-foto-penales').value, licencia: document.getElementById('d-foto-licencia').value }
                    };
                }
                await addDoc(collection(db, "usuarios"), info);
            } else {
                await signInWithEmailAndPassword(auth, mail, pass);
            }
        } catch(e) { alert(e.message); }
    };

    onAuthStateChanged(auth, async (u) => {
        if(u) {
            miUid = u.uid;
            if(u.email === "robs2002004@gmail.com") {
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('admin-view').classList.add('active-section');
                document.getElementById('btn-logout').style.display = 'block';
                initAdmin();
                return;
            }
            const q = query(collection(db, "usuarios"), where("uid", "==", u.uid));
            const s = await getDocs(q);
            s.forEach(d => {
                const user = d.data();
                if(!user.activo) { alert("Tu cuenta está desactivada."); cerrarSesion(); return; }
                miRol = user.rol; miNombre = user.nombre;
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('btn-logout').style.display = 'block';
                if(miRol === 'cliente') {
                    document.getElementById('cliente-view').classList.add('active-section');
                    initLeaflet();
                    // Escuchar si aceptan mi oferta
                    onSnapshot(query(collection(db, "viajes"), where("clienteId", "==", miUid)), (snap) => {
                        snap.forEach(dv => {
                            if(dv.data().estado === 'negociando' && dv.data().ofertaDe === 'driver') abrirNegociacion(dv.id);
                            if(dv.data().estado === 'aceptado' && !document.getElementById('chat-active')) abrirChat(dv.id);
                        });
                    });
                } else {
                    document.getElementById('driver-view').classList.add('active-section');
                    mostrarContabilidad();
                    escucharViajesDriver();
                }
            });
        }
    });

    window.cerrarSesion = () => signOut(auth).then(() => location.reload());
    window.cerrarModal = () => document.getElementById("modal-negociacion").style.display = "none";

    async function cargarPaises() {
        const sel = document.getElementById('reg-prefijo');
        const res = await fetch('https://restcountries.com/v3.1/all?fields=idd,cca2,flag');
        const data = await res.json();
        data.sort((a, b) => a.cca2.localeCompare(b.cca2)).forEach(c => {
            const code = c.idd.root + (c.idd.suffixes ? c.idd.suffixes[0] : "");
            if(code) sel.add(new Option(`${c.flag} ${c.cca2} (${code})`, code));
        });
    }
    cargarPaises();
</script>
