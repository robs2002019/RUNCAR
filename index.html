<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN CAR PRO - Global</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root { 
            --primary: #2ecc71; 
            --secondary: #1a1a1a; 
            --accent: #f1c40f; 
            --white: #ffffff; 
            --danger: #e74c3c; 
            --text-dark: #333;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background: var(--secondary); 
            color: white; 
            padding-bottom: 50px; 
        }

        .container { max-width: 500px; margin: auto; padding: 15px; }

        header { 
            text-align: center; 
            padding: 20px; 
            background: rgba(0,0,0,0.3); 
            border-radius: 0 0 25px 25px; 
            border-bottom: 2px solid var(--primary); 
            margin-bottom: 20px; 
        }

        .card { 
            background: var(--white); 
            color: var(--text-dark); 
            border-radius: 20px; 
            padding: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            margin-bottom: 15px; 
        }

        input, select { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            font-size: 14px; 
            box-sizing: border-box; 
        }

        label { font-size: 12px; color: #666; font-weight: bold; display: block; margin-top: 5px; }

        .btn-action { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            background: var(--primary); 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 10px; 
        }

        .btn-action:hover { opacity: 0.9; transform: scale(1.01); }

        #map { 
            width: 100%; 
            height: 250px; 
            border-radius: 20px; 
            margin-bottom: 15px; 
            border: 2px solid var(--primary); 
            background: #eee;
        }

        .section { display: none; }
        .active-section { display: block; }

        /* Admin & Table Styles */
        .admin-user-card { 
            border: 1px solid #ddd; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 10px; 
            background: #f9f9f9; 
            color: #333;
        }

        .status-badge { 
            padding: 4px 8px; 
            border-radius: 5px; 
            font-size: 10px; 
            font-weight: bold;
            text-transform: uppercase; 
        }
        .activo { background: #d4edda; color: #155724; }
        .desactivado { background: #f8d7da; color: #721c24; }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
            background: white; 
            font-size: 12px; 
        }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }

        .suggestions {
            background: white;
            color: #333;
            border-radius: 0 0 10px 10px;
            max-height: 150px;
            overflow-y: auto;
        }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; letter-spacing: 2px;">RUN <span style="color:var(--primary)">CAR</span></h2>
</header>

<div class="container">
    
    <div id="auth-container" class="section active-section">
        <div class="card">
            <h3 style="margin-top:0; text-align:center;">Bienvenido</h3>
            <input type="email" id="auth-email" placeholder="Correo Electrónico">
            <input type="password" id="auth-pass" placeholder="Contraseña">
            
            <div id="reg-fields" style="display:none;">
                <label>Foto de Perfil</label>
                <input type="file" id="reg-foto" accept="image/*">
                
                <input type="text" id="reg-nombre" placeholder="Nombre Completo">
                <div style="display: flex; gap: 5px;">
                    <select id="reg-prefijo" style="flex: 1;"></select>
                    <input type="tel" id="reg-tel" placeholder="WhatsApp" style="flex: 2;">
                </div>
                
                <select id="reg-rol" onchange="toggleCamposDriver(this.value)">
                    <option value="cliente">Soy Cliente</option>
                    <option value="driver">Quiero ser Conductor</option>
                </select>

                <div id="campos-driver" style="display:none; border-top: 1px solid #eee; padding-top:10px;">
                    <label>Año del Vehículo (2014+)</label>
                    <input type="number" id="reg-veh-anio" min="2014" placeholder="Ej: 2018">
                    <input type="text" id="reg-pago1" placeholder="Link Pago 1 (Banco)">
                    <input type="text" id="reg-pago2" placeholder="Link Pago 2 (Chivo/Otros)">
                    
                    <label>Documentación (Fotos)</label>
                    <input type="file" id="f-licencia" accept="image/*"><label>Licencia</label>
                    <input type="file" id="f-dui" accept="image/*"><label>ID Personal</label>
                </div>
            </div>
            
            <button class="btn-action" onclick="ejecutarAuth()" id="btn-auth-main">INGRESAR</button>
            <p onclick="switchAuth()" id="toggle-text" style="text-align:center; cursor:pointer; color:#666; margin-top:18px;">¿No tienes cuenta? Regístrate</p>
        </div>
    </div>

    <div id="admin-panel" class="section">
        <div class="card">
            <h3 style="text-align:center;">🛡️ Panel de Control</h3>
            <input type="text" id="search-user" placeholder="Buscar por nombre..." oninput="filtrarUsuariosAdmin()">
            <div id="admin-users-list" style="max-height: 400px; overflow-y: auto; margin-top: 10px;"></div>
            <button class="btn-action" style="background:#444;" onclick="location.reload()">SALIR PANEL</button>
        </div>
    </div>

    <div id="cliente-view" class="section">
        <div id="map"></div>
        <div class="card">
            <input id="origin" placeholder="📍 Origen" oninput="buscarDireccion(this, 'sug-origin')">
            <div id="sug-origin" class="suggestions"></div>
            <input id="destination" placeholder="🏁 Destino" oninput="buscarDireccion(this, 'sug-dest')">
            <div id="sug-dest" class="suggestions"></div>
            
            <div id="precio-area" style="display:none;">
                <p style="text-align:center; color:#333;">Tarifa sugerida: <b id="priceMaps">$0.00</b></p>
                <input type="number" id="oferta-cliente" placeholder="Tu oferta $" style="text-align:center; font-size:20px;">
                <button class="btn-action" id="btn-solicitar" onclick="publicarViaje()">SOLICITAR VIAJE</button>
            </div>
            <button id="btn-calc" class="btn-action" style="background:#444;" onclick="alert('Funcionalidad de ruta próximamente')">CALCULAR RUTA</button>
        </div>
    </div>

    <div id="driver-view" class="section">
        <div class="card">
            <h4>📊 Mi Contabilidad (Últimos 5 días)</h4>
            <div id="driver-stats">Cargando estadísticas...</div>
        </div>
        <h4 style="padding-left: 10px;">🚗 Solicitudes en línea</h4>
        <div id="lista-viajes-global" style="padding: 10px;"></div>
    </div>

    <button id="btn-logout" class="btn-action" style="display:none; background:var(--danger); width: 90%; margin: 20px auto; display: none;" onclick="cerrarSesion()">CERRAR SESIÓN</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot, serverTimestamp, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAyRrBUmw4OEzS7EmvK_XmDk6Z5rrjLC3A",
        authDomain: "runcar-6eda0.firebaseapp.com",
        projectId: "runcar-6eda0",
        storageBucket: "runcar-6eda0.firebasestorage.app",
        messagingSenderId: "152627344672",
        appId: "1:152627344672:web:b420d1c8cbb670069b9345"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let miUid, miRol, allUsers = [];

    // --- INTERFAZ ---
    window.switchAuth = () => {
        const fields = document.getElementById('reg-fields');
        const isHidden = fields.style.display === 'none';
        fields.style.display = isHidden ? 'block' : 'none';
        document.getElementById('btn-auth-main').innerText = isHidden ? 'REGISTRARSE' : 'INGRESAR';
        document.getElementById('toggle-text').innerText = isHidden ? '¿Ya tienes cuenta? Ingresa' : '¿No tienes cuenta? Regístrate';
    };

    window.toggleCamposDriver = (val) => {
        document.getElementById('campos-driver').style.display = val === 'driver' ? 'block' : 'none';
    };

    // --- AUTENTICACIÓN ---
    window.ejecutarAuth = async () => {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        const isReg = document.getElementById('reg-fields').style.display === 'block';

        if(!email || !pass) return alert("Completa los campos");

        try {
            if (isReg) {
                const rol = document.getElementById('reg-rol').value;
                const nombre = document.getElementById('reg-nombre').value;
                if(rol === 'driver' && parseInt(document.getElementById('reg-veh-anio').value) < 2014) {
                    return alert("Vehículo no apto (Min. 2014)");
                }

                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await addDoc(collection(db, "usuarios"), {
                    uid: res.user.uid,
                    email,
                    nombre,
                    rol,
                    whatsapp: document.getElementById('reg-prefijo').value + document.getElementById('reg-tel').value,
                    status: "activo",
                    anioVehiculo: rol === 'driver' ? document.getElementById('reg-veh-anio').value : null,
                    pago1: document.getElementById('reg-pago1').value || "",
                    pago2: document.getElementById('reg-pago2').value || "",
                    timestamp: serverTimestamp()
                });
            } else {
                await signInWithEmailAndPassword(auth, email, pass);
            }
        } catch (e) { alert("Error: " + e.message); }
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const q = query(collection(db, "usuarios"), where("uid", "==", user.uid));
            const snap = await getDocs(q);
            if (!snap.empty) {
                const data = snap.docs[0].data();
                if (data.status === 'desactivado') {
                    alert("Cuenta desactivada.");
                    return signOut(auth);
                }
                miUid = user.uid;
                miRol = data.rol;
                
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('btn-logout').style.display = 'block';

                if (user.email === 'robs2002004@gmail.com') {
                    abrirPanelAdmin();
                } else if (miRol === 'cliente') {
                    document.getElementById('cliente-view').classList.add('active-section');
                } else {
                    document.getElementById('driver-view').classList.add('active-section');
                    mostrarContabilidadConductor(miUid, 'driver-stats');
                }
            }
        } else {
            // Reset views on logout
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById('auth-container').classList.add('active-section');
            document.getElementById('btn-logout').style.display = 'none';
        }
    });

    // --- ADMIN ---
    async function abrirPanelAdmin() {
        document.getElementById('admin-panel').classList.add('active-section');
        const snap = await getDocs(collection(db, "usuarios"));
        allUsers = [];
        snap.forEach(d => allUsers.push({id: d.id, ...d.data()}));
        renderUsersAdmin(allUsers);
    }

    function renderUsersAdmin(users) {
        const container = document.getElementById('admin-users-list');
        container.innerHTML = "";
        users.forEach(u => {
            const div = document.createElement('div');
            div.className = 'admin-user-card';
            div.innerHTML = `
                <b>${u.nombre}</b> (${u.rol.toUpperCase()})<br>
                <small>${u.email} | ${u.whatsapp}</small><br>
                <div style="margin-top:8px;">
                    <span class="status-badge ${u.status}">${u.status}</span>
                    <button onclick="window.toggleUserStatus('${u.id}', '${u.status}')" style="float:right;">Cambiar</button>
                </div>
                <div id="stats-${u.uid}" style="margin-top:10px; border-top:1px solid #ddd;"></div>
            `;
            container.appendChild(div);
            if(u.rol === 'driver') mostrarContabilidadConductor(u.uid, `stats-${u.uid}`);
        });
    }

    window.toggleUserStatus = async (docId, currentStatus) => {
        const next = currentStatus === 'activo' ? 'desactivado' : 'activo';
        await updateDoc(doc(db, "usuarios", docId), { status: next });
        abrirPanelAdmin();
    };

    // --- CONTABILIDAD ---
    async function mostrarContabilidadConductor(driverUid, containerId) {
        const hoy = new Date();
        const dias = [];
        for(let i=0; i<5; i++) {
            let d = new Date();
            d.setDate(hoy.getDate() - i);
            dias.push(d.toISOString().split('T')[0]);
        }

        const q = query(collection(db, "viajes"), where("driverId", "==", driverUid), where("estado", "==", "finalizado"));
        const snap = await getDocs(q);
        let subTotales = {};
        dias.forEach(d => subTotales[d] = 0);

        snap.forEach(doc => {
            const v = doc.data();
            if (subTotales[v.fechaFinalizado] !== undefined) subTotales[v.fechaFinalizado] += (v.precioFinal || 0);
        });

        let tabla = `<table><tr><th>Fecha</th><th>Total</th><th>Com. (8%)</th></tr>`;
        let sumaTotal = 0;
        dias.forEach(dia => {
            const total = subTotales[dia];
            sumaTotal += total;
            tabla += `<tr><td>${dia}</td><td>$${total.toFixed(2)}</td><td style="color:red">-$${(total*0.08).toFixed(2)}</td></tr>`;
        });
        
        const comTotal = sumaTotal * 0.08;
        tabla += `</table><div style="background:#eee; padding:10px; margin-top:5px; text-align:center; font-weight:bold; color:#333;">Deuda Total: $${comTotal.toFixed(2)}</div>`;
        const el = document.getElementById(containerId);
        if(el) el.innerHTML = tabla;
    }

    window.cerrarSesion = () => signOut(auth).then(() => location.reload());

    // Carga de prefijo inicial
    (async () => {
        const sel = document.getElementById('reg-prefijo');
        if(sel) sel.add(new Option("+503 (SV)", "+503"));
    })();
</script>
</body>
</html>
