<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNCAR - Movilidad Inteligente</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAdjJpRHTqVdIQy_gOP8xE4v4akueFORNs&libraries=places,geometry"></script>

    <style>
        :root { --primary: #2ecc71; --secondary: #1a1a1a; --accent: #f1c40f; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--secondary); color: white; padding-bottom: 50px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        header { text-align: center; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 0 0 25px 25px; margin-bottom: 20px; border-bottom: 2px solid var(--primary); }
        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .nav-btn { padding: 12px 20px; border: none; border-radius: 12px; background: rgba(255,255,255,0.1); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: var(--primary); box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3); }
        #map { width: 100%; height: 250px; border-radius: 20px; margin-bottom: 15px; border: 2px solid var(--primary); background: #222; }
        .card { background: var(--white); color: #333; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .price-box { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-top: 15px; text-align: center; border: 1px solid #eee; }
        .section { display: none; }
        .active-section { display: block; }
        #admin-modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; overflow-y:auto; padding:20px; box-sizing:border-box; display:none; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; letter-spacing: 2px;">RUN <span style="color:var(--primary)">CAR</span></h2>
    
</header>

<div class="container">
    <div id="map"></div>

    <div class="nav-bar">
        <button class="nav-btn active" onclick="showTab('tab-viaje', this)">🚕 Viaje</button>
        <button class="nav-btn" onclick="showTab('tab-registro', this)">📝 Registro</button>
    </div>

    <div id="tab-viaje" class="section active-section">
        <div class="card">
            <h4>Solicitar Transporte</h4>
            <div style="display: flex; gap: 5px;">
                <input id="origin" placeholder="📍 Origen">
                <button onclick="obtenerGPS()" style="background:var(--primary); border:none; border-radius:10px; padding:0 15px; color:white;">📍</button>
            </div>
            <input id="destination" placeholder="🏁 Destino">
            
            <div id="info-recorrido" style="display:none;" class="price-box">
                <small>DISTANCIA: <b id="distText">0 km</b></small><br>
                <b style="font-size: 24px;" id="priceText">$0.00</b>
                <button class="btn-action" onclick="confirmarViaje()">PEDIR AHORA</button>
            </div>
            <button id="btn-calc" class="btn-action" style="background:#444;" onclick="calculateRoute()">CALCULAR COSTO</button>
        </div>
    </div>

    <div id="tab-registro" class="section">
    <div class="card">
        <h4>Registro de Usuario</h4>
        <select id="reg-tipo" onchange="toggleRegFields()">
            <option value="cliente">Soy Cliente</option>
            <option value="driver">Quiero ser Conductor</option>
        </select>
        
        <input type="text" id="reg-nombre" placeholder="Nombre Completo">
        <input type="tel" id="reg-telefono" placeholder="Teléfono">
        <label style="font-size:12px; color:#666;">Foto de Perfil:</label>
        <input type="file" id="reg-foto" accept="image/*">

        <div id="driver-docs" style="display:none; background:#f9f9f9; padding:15px; border-radius:10px; border:1px dashed #ccc; margin-top:10px;">
            <p style="font-size:12px; font-weight:bold; color:var(--secondary);">DOCUMENTACIÓN PERSONAL (PDF/Fotos):</p>
            <small>DUI, Licencia, Solvencia PNC y Penales</small>
            <input type="file" id="doc-personal" multiple> 
            
            <p style="font-size:12px; font-weight:bold; color:var(--secondary); margin-top:10px;">FOTOS DEL VEHÍCULO:</p>
            <small>Exterior, Interior, Placas</small>
            <input type="file" id="doc-vehiculo" multiple>

            <p style="font-size:12px; font-weight:bold; color:var(--secondary); margin-top:10px;">DATOS DEL AUTO:</p>
            <input type="text" id="marca" placeholder="Marca (Ej: Toyota)">
            <input type="text" id="modelo" placeholder="Modelo (Ej: Corolla)">
            <input type="number" id="anio" placeholder="Año (Mín. 2011)" min="2011" max="2027">
        </div>

        <button class="btn-action" id="btn-reg" onclick="procesarRegistro()">FINALIZAR REGISTRO</button>
    </div>
</div>

<script type="module">
    // ... (Mantén tus importaciones y config de Firebase) ...

    window.procesarRegistro = async () => {
        const btn = document.getElementById("btn-reg");
        const nombre = document.getElementById("reg-nombre").value;
        const tipo = document.getElementById("reg-tipo").value;
        const fotoPerfil = document.getElementById("reg-foto").files[0];

        if (!nombre || !fotoPerfil) return alert("Por favor, sube al menos tu nombre y foto de perfil.");

        btn.disabled = true;
        btn.innerText = "Subiendo datos...";

        try {
            // 1. Subir Foto de Perfil
            const perfilRef = ref(storage, `perfiles/${Date.now()}_${fotoPerfil.name}`);
            const perfilSnap = await uploadBytes(perfilRef, fotoPerfil);
            const perfilUrl = await getDownloadURL(perfilSnap.ref);

            // Objeto base del usuario
            let userData = {
                nombre,
                rol: tipo,
                fotoPerfil: perfilUrl,
                telefono: document.getElementById("reg-telefono").value,
                fecha: new Date(),
                estado: "pendiente" // Para que tú los apruebes desde el admin
            };

            // 2. Si es Conductor, procesar datos adicionales
            if (tipo === 'driver') {
                userData.vehiculo = {
                    marca: document.getElementById("marca").value,
                    modelo: document.getElementById("modelo").value,
                    anio: document.getElementById("anio").value
                };
                
                // Nota: Para simplificar, aquí podrías agregar lógica para subir los arrays 
                // de 'doc-personal' y 'doc-vehiculo' siguiendo el mismo patrón de uploadBytes.
            }

            // 3. Guardar en Firestore
            await addDoc(collection(db, "usuarios"), userData);
            
            alert("¡Registro enviado con éxito! Revisaremos tu perfil pronto.");
            location.reload();

        } catch (error) {
            console.error(error);
            alert("Error al registrar: " + error.message);
            btn.disabled = false;
            btn.innerText = "FINALIZAR REGISTRO";
        }
    };

<div id="admin-modal">
    <button onclick="cerrarAdmin()" style="float:right; padding:10px;">CERRAR</button>
    <h2 style="color:var(--primary)">ADMINISTRACIÓN</h2>
    <div id="admin-content"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-storage.js";

    // Tu configuración de Firebase (según tus fotos)
    const firebaseConfig = {
        apiKey: "AIzaSyAyRrBUmw4OEzS7EmvK_XmDk6Z5rrjLC3A",
        authDomain: "runcar-6eda0.firebaseapp.com",
        projectId: "runcar-6eda0",
        storageBucket: "runcar-6eda0.firebasestorage.app",
        messagingSenderId: "152627344672",
        appId: "1:152627344672:web:b420d1c8cbb670069b9345"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let map, directionsService, directionsRenderer;

    window.initMap = () => {
        map = new google.maps.Map(document.getElementById("map"), {
            center: { lat: 13.6893, lng: -89.1871 },
            zoom: 13,
            styles: [{ featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] }]
        });
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({ map });

        new google.maps.places.Autocomplete(document.getElementById("origin"));
        new google.maps.places.Autocomplete(document.getElementById("destination"));
    };

    window.calculateRoute = () => {
        const start = document.getElementById("origin").value;
        const end = document.getElementById("destination").value;
        if (!start || !end) return alert("Ingresa puntos A y B");

        directionsService.route({ origin: start, destination: end, travelMode: 'DRIVING' }, (res, status) => {
            if (status === 'OK') {
                directionsRenderer.setDirections(res);
                const km = res.routes[0].legs[0].distance.value / 1000;
                const price = Math.ceil(km) <= 3 ? Math.ceil(km) : 3 + (km - 3) * 0.3;
                document.getElementById("distText").innerText = km.toFixed(1) + " km";
                document.getElementById("priceText").innerText = "$" + price.toFixed(2);
                document.getElementById("info-recorrido").style.display = "block";
                document.getElementById("btn-calc").style.display = "none";
            } else { alert("No se pudo calcular la ruta."); }
        });
    };

    window.procesarRegistro = async () => {
        const btn = document.getElementById("btn-reg");
        const nombre = document.getElementById("reg-nombre").value;
        const file = document.getElementById("reg-foto").files[0];
        if(!nombre || !file) return alert("Completa nombre y foto");

        btn.disabled = true; btn.innerText = "Registrando...";
        try {
            const snap = await uploadBytes(ref(storage, `users/${Date.now()}`), file);
            const url = await getDownloadURL(snap.ref);
            await addDoc(collection(db, "usuarios"), { nombre, foto: url, rol: document.getElementById("reg-tipo").value, fecha: new Date() });
            alert("¡Registro Exitoso!"); location.reload();
        } catch(e) { alert("Error: " + e.message); btn.disabled = false; }
    };

    window.addEventListener('keydown', (e) => { if (e.key === 'w') document.getElementById("admin-modal").style.display = "block"; });
    window.showTab = (id, btn) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
        document.getElementById(id).classList.add('active-section');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    };
    window.obtenerGPS = () => navigator.geolocation.getCurrentPosition(p => { document.getElementById("origin").value = `${p.coords.latitude},${p.coords.longitude}`; });
    window.toggleRegFields = () => document.getElementById("driver-docs").style.display = document.getElementById("reg-tipo").value === 'driver' ? 'block' : 'none';
    window.cerrarAdmin = () => document.getElementById("admin-modal").style.display = "none";

    window.onload = initMap;
</script>
</body>
</html>
