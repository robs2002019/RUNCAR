<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNCAR - Oficial</title>
    
    <style>
        :root { --primary: #2ecc71; --secondary: #1a1a1a; --accent: #f1c40f; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--secondary); color: white; padding-bottom: 50px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        header { text-align: center; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 0 0 25px 25px; border-bottom: 2px solid var(--primary); margin-bottom: 20px; }
        
        .card { background: var(--white); color: #333; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 15px; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-action:hover { opacity: 0.9; }
        
        #map { width: 100%; height: 280px; border-radius: 20px; margin-bottom: 15px; border: 2px solid var(--primary); background: #222; }
        .section { display: none; }
        .active-section { display: block; }

        .oferta-tag { background: #f9f9f9; padding: 15px; border-radius: 12px; margin: 10px 0; border-left: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .price-text { color: var(--primary); font-size: 18px; font-weight: bold; }
        .file-box { background: #f0f0f0; padding: 10px; border-radius: 10px; font-size: 12px; margin: 5px 0; border: 1px dashed #ccc; }
        .pac-container { border-radius: 10px; z-index: 9999 !important; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; letter-spacing: 2px;">RUN <span style="color:var(--primary)">CAR</span></h2>
</header>

<div class="container">

    <div id="auth-container" class="section active-section">
        <div class="card">
            <h3 id="auth-title" style="margin-top:0; text-align:center;">Ingreso a RUNCAR</h3>
            <input type="email" id="auth-email" placeholder="Correo Electrónico">
            <input type="password" id="auth-pass" placeholder="Contraseña">
            
            <div id="reg-fields" style="display:none;">
                <input type="text" id="reg-nombre" placeholder="Nombre Completo">
                <div style="display:flex; gap:5px;">
                    <select id="reg-pais" style="flex:1;"><option value="">Cargando...</option></select>
                    <input type="tel" id="reg-tel" placeholder="WhatsApp" style="flex:2;">
                </div>
                <select id="reg-rol" onchange="window.toggleDriverReg()">
                    <option value="cliente">Soy Cliente</option>
                    <option value="driver">Quiero ser Conductor</option>
                </select>
                <div id="driver-docs" style="display:none; border-top:1px solid #eee; margin-top:10px;">
                    <h5 style="color:var(--primary)">Datos del Vehículo</h5>
                    <input type="text" id="car-marca" placeholder="Marca y Modelo">
                    <select id="car-anio"></select>
                </div>
            </div>

            <button class="btn-action" onclick="window.ejecutarAuth()" id="btn-auth-main">INGRESAR</button>
            <p onclick="window.switchAuth()" id="toggle-text" style="text-align:center; cursor:pointer; color:#666; margin-top:18px;">¿No tienes cuenta? Regístrate aquí</p>
        </div>
    </div>

    <div id="cliente-view" class="section">
        <div id="map"></div>
        <div class="card">
            <h4>Solicitar Viaje</h4>
            <input id="origin" placeholder="📍 Punto de origen">
            <input id="destination" placeholder="🏁 Punto de destino">
            
            <div id="precio-area" style="display:none; text-align:center;">
                <p style="margin-bottom:5px;">Tarifa sugerida:</p>
                <b id="priceMaps" style="font-size:28px; color:var(--primary);">$0.00</b>
                <p id="timeEst" style="font-size:13px; color:#666; margin-top:0;"></p>
                <input type="number" id="oferta-cliente" style="font-size:25px; text-align:center; color:var(--primary); font-weight:bold; border: 2px solid var(--primary);">
                <button class="btn-action" onclick="window.publicarViaje()">PUBLICAR MI OFERTA</button>
            </div>
            <button id="btn-calc" class="btn-action" style="background:#444;" onclick="window.calcularRuta()">CALCULAR PRECIO</button>
        </div>
        <h4>Ofertas recibidas</h4>
        <div id="lista-ofertas"></div>
    </div>

    <div id="driver-view" class="section">
        <h4 style="color:var(--primary)">Viajes por la zona</h4>
        <div id="lista-viajes-global"></div>
    </div>

    <button id="btn-logout" class="btn-action" style="display:none; background:#c0392b; margin-top:20px;" onclick="window.cerrarSesion()">CERRAR SESIÓN</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAyRrBUmw4OEzS7EmvK_XmDk6Z5rrjLC3A",
        authDomain: "runcar-6eda0.firebaseapp.com",
        projectId: "runcar-6eda0",
        storageBucket: "runcar-6eda0.firebasestorage.app",
        messagingSenderId: "152627344672",
        appId: "1:152627344672:web:b420d1c8cbb670069b9345"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let ds, dr, mapa;

    // --- INICIALIZAR MAPA Y AUTOCOMPLETE ---
    window.initMap = () => {
        console.log("Google Maps cargado correctamente.");
        ds = new google.maps.DirectionsService();
        dr = new google.maps.DirectionsRenderer();
        
        const centroSV = { lat: 13.6929, lng: -89.2182 };
        mapa = new google.maps.Map(document.getElementById("map"), {
            center: centroSV,
            zoom: 13,
            mapTypeControl: false,
            streetViewControl: false
        });
        dr.setMap(mapa);

        const options = {
            componentRestrictions: { country: "sv" },
            fields: ["geometry", "formatted_address"]
        };

        new google.maps.places.Autocomplete(document.getElementById("origin"), options);
        new google.maps.places.Autocomplete(document.getElementById("destination"), options);
    };

    // --- CALCULAR RUTA Y COSTO ---
  window.calcularRuta = () => {
    const origen = document.getElementById("origin").value;
    const destino = document.getElementById("destination").value;

    if (!origen || !destino) {
        alert("Por favor, selecciona una dirección sugerida por Google");
        return;
    }

    ds.route({
        origin: origen,
        destination: destino,
        travelMode: google.maps.TravelMode.DRIVING
    }, (result, status) => {
        if (status === 'OK') {
            dr.setDirections(result); // Esto dibuja la línea
            const distanciaTexto = result.routes[0].legs[0].distance.value; // Distancia en metros
            const km = distanciaTexto / 1000;
            
            // Lógica de cobro: $3 base + $0.35 por km extra
            let costo = km <= 3 ? 3.00 : 3 + (km - 3) * 0.35;

            document.getElementById("priceMaps").innerText = "$" + costo.toFixed(2);
            document.getElementById("precio-area").style.display = "block";
        } else {
            // ESTO TE DIRÁ POR QUÉ NO FUNCIONA
            console.error("Fallo de Google Maps:", status);
            alert("Google no pudo calcular la ruta: " + status);
        }
    });
};
    // --- LÓGICA FIREBASE ---
    let isReg = false;
    window.switchAuth = () => {
        isReg = !isReg;
        document.getElementById('reg-fields').style.display = isReg ? 'block' : 'none';
        document.getElementById('btn-auth-main').innerText = isReg ? 'CREAR CUENTA' : 'INGRESAR';
    };

    window.toggleDriverReg = () => {
        document.getElementById('driver-docs').style.display = document.getElementById('reg-rol').value === 'driver' ? 'block' : 'none';
    };

    window.ejecutarAuth = async () => {
        const mail = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        if(!mail || !pass) return alert("Completa los datos");

        try {
            if(isReg) {
                const uc = await createUserWithEmailAndPassword(auth, mail, pass);
                await addDoc(collection(db, "usuarios"), {
                    uid: uc.user.uid,
                    rol: document.getElementById('reg-rol').value,
                    nombre: document.getElementById('reg-nombre').value,
                    whatsapp: document.getElementById('reg-pais').value + document.getElementById('reg-tel').value
                });
            } else {
                await signInWithEmailAndPassword(auth, mail, pass);
            }
        } catch (e) { alert("Error de acceso: " + e.message); }
    };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('btn-logout').style.display = 'block';
            const q = query(collection(db, "usuarios"), where("uid", "==", user.uid));
            const snap = await getDocs(q);
            
            snap.forEach(d => {
                if(d.data().rol === 'cliente') {
                    document.getElementById('cliente-view').classList.add('active-section');
                    if(typeof google !== 'undefined') window.initMap();
                    escucharOfertas();
                } else {
                    document.getElementById('driver-view').classList.add('active-section');
                    escucharViajes();
                }
            });
        } else {
            document.getElementById('auth-container').style.display = 'block';
            document.getElementById('btn-logout').style.display = 'none';
        }
    });

    window.cerrarSesion = () => signOut(auth).then(() => location.reload());

    window.publicarViaje = async () => {
        await addDoc(collection(db, "viajes"), {
            cliente: auth.currentUser.uid,
            origen: document.getElementById("origin").value,
            destino: document.getElementById("destination").value,
            oferta: document.getElementById("oferta-cliente").value,
            estado: "abierto",
            fecha: serverTimestamp()
        });
        alert("Tu solicitud ha sido publicada.");
    };

    function escucharViajes() {
        onSnapshot(query(collection(db, "viajes"), where("estado", "==", "abierto")), (snap) => {
            let h = "";
            snap.forEach(d => {
                const v = d.data();
                h += `<div class="card">
                    <p style="margin:0"><b>De:</b> ${v.origen}</p>
                    <p style="margin:5px 0"><b>A:</b> ${v.destino}</p>
                    <p>Ofrece: <b style="color:#2ecc71">$${v.oferta}</b></p>
                    <input type="number" id="c-${d.id}" placeholder="Tu propuesta $">
                    <button class="btn-action" onclick="window.enviarContraoferta('${d.id}')">ENVIAR CONTRAOFERTA</button>
                </div>`;
            });
            document.getElementById("lista-viajes-global").innerHTML = h || "No hay solicitudes pendientes.";
        });
    }

    window.enviarContraoferta = async (id) => {
        const val = document.getElementById(`c-${id}`).value;
        const vSnap = await getDocs(query(collection(db, "viajes")));
        const vData = vSnap.docs.find(x => x.id === id).data();
        await addDoc(collection(db, "ofertas"), {
            viajeId: id,
            driver: auth.currentUser.uid,
            precio: val,
            clienteId: vData.cliente
        });
        alert("Propuesta enviada al cliente.");
    };

    function escucharOfertas() {
        onSnapshot(query(collection(db, "ofertas"), where("clienteId", "==", auth.currentUser.uid)), (snap) => {
            let h = "";
            snap.forEach(d => {
                const o = d.data();
                h += `<div class="oferta-tag">
                    <span>Un conductor ofrece: <b class="price-text">$${o.precio}</b></span>
                    <button class="btn-action" style="width:auto; padding:10px;" onclick="alert('Conectando con el conductor...')">ACEPTAR</button>
                </div>`;
            });
            document.getElementById("lista-ofertas").innerHTML = h;
        });
    }

    // --- CARGAR PAÍSES ---
    fetch('https://restcountries.com/v3.1/all?fields=name,idd,flag,cca2')
        .then(r => r.json())
        .then(data => {
            const s = document.getElementById('reg-pais');
            s.innerHTML = '';
            data.sort((a,b)=>a.name.common.localeCompare(b.name.common)).forEach(c => {
                if(c.idd.root){
                    const cod = c.idd.root + (c.idd.suffixes ? c.idd.suffixes[0] : "");
                    const o = new Option(`${c.flag} ${cod}`, cod);
                    if(c.cca2==='SV') o.selected = true;
                    s.add(o);
                }
            });
        });
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDj2kkjVmMqJSWN4OVbue2jPOidhGO2GOU&libraries=places,geometry&callback=initMap" async defer></script>

</body>
</html>
