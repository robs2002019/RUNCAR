<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNCAR PRO - Sistema Limpio</title>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDj2kkjVmMqJSWN4OVbue2jPOidhGO2GOU&libraries=places,geometry"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --primary: #2ecc71; --secondary: #1a1a1a; --accent: #f1c40f; --white: #ffffff; --danger: #e74c3c; --gray: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--secondary); color: white; padding-bottom: 50px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        header { text-align: center; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 0 0 25px 25px; border-bottom: 2px solid var(--primary); margin-bottom: 20px; position: relative; }
        
        .card { background: var(--white); color: #333; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .btn-danger { background: var(--danger); }
        .btn-secondary { background: #444; }
        .btn-excel { background: #1f7244; margin-top: 10px; }
        .btn-finish { background: var(--accent); color: #000; }
        
        .flex-btns { display: flex; gap: 10px; margin-top: 10px; }
        #map { width: 100%; height: 250px; border-radius: 20px; margin-bottom: 15px; border: 2px solid var(--primary); background: #222; }
        .section { display: none; }
        .active-section { display: block; }

        /* ESTILOS DEL MODAL (VENTANA FLOTANTE) */
        .modal-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index: 1000; 
        }
        .modal-content { width: 90%; max-width: 400px; }

        .item-list, .historial-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 13px; color: #333; }
        .scroll-area { max-height: 300px; overflow-y: auto; background: var(--gray); padding: 10px; border-radius: 10px; margin-top: 10px; }
        
        #mensajes-box { height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 10px; background: #eee; border-radius: 10px; }
        .msg-mio { background: var(--primary); color: white; align-self: flex-end; padding: 10px; border-radius: 15px 15px 0 15px; max-width: 80%; }
        .msg-otro { background: #fff; color: #333; align-self: flex-start; padding: 10px; border-radius: 15px 15px 15px 0; max-width: 80%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        #btn-admin { position: absolute; right: 15px; top: 25px; display: none; background: var(--accent); border: none; padding: 5px 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .comision-box { background: #fff3cd; color: #856404; padding: 15px; border-radius: 10px; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<header>
    <button id="btn-admin" onclick="mostrarAdmin()">ADMIN</button>
    <h2 style="margin:0; letter-spacing: 2px;">RUN <span style="color:var(--primary)">CAR</span></h2>
</header>

<!-- MODAL PARA OFERTAR (CONDUCTOR) -->
<div id="modal-oferta" class="modal-overlay">
    <div class="card modal-content">
        <h3 id="modal-ruta-titulo" style="margin-top:0; color:var(--primary);">Detalles del Viaje</h3>
        <p id="modal-info-viaje" style="font-size: 14px; line-height: 1.4;"></p>
        <hr>
        <label style="font-size:12px; color:#666;">TU CONTRAOFERTA ($)</label>
        <input type="number" id="input-precio-modal" placeholder="Ej: 5.50" step="0.01">
        
        <div class="flex-btns">
            <button class="btn-action" onclick="confirmarOfertaModal()">ACEPTAR Y ENVIAR</button>
            <button class="btn-action btn-danger" onclick="cerrarModalOferta()">ELIMINAR Y CERRAR</button>
        </div>
    </div>
</div>

<div class="container">
    <!-- AUTH -->
    <div id="auth-container" class="section active-section">
        <div class="card">
            <h3 style="text-align:center; margin-top:0;">Acceso RUNCAR</h3>
            <input type="email" id="auth-email" placeholder="Correo Electrónico">
            <input type="password" id="auth-pass" placeholder="Contraseña">
            
            <div id="reg-fields" style="display:none;">
                <input type="text" id="reg-nombre" placeholder="Nombre Completo">
                <select id="reg-prefijo"></select>
                <input type="tel" id="reg-tel" placeholder="Número WhatsApp">
                <select id="reg-rol">
                    <option value="cliente">Soy Cliente</option>
                    <option value="driver">Quiero ser Conductor(a)</option>
                </select>
            </div>

            <button class="btn-action" onclick="ejecutarAuth()" id="btn-auth-main">INGRESAR</button>
            <p onclick="switchAuth()" style="text-align:center; cursor:pointer; color:#666; margin-top:18px;">¿No tienes cuenta? Regístrate</p>
        </div>
    </div>

    <!-- VISTA CLIENTE -->
    <div id="cliente-view" class="section">
        <div id="map"></div>
        <div class="card">
            <input id="origin" placeholder="📍 Origen">
            <input id="destination" placeholder="🏁 Destino">
            <div id="precio-area" style="display:none;">
                <p style="text-align:center; margin: 5px 0;">Tarifa Sugerida: <b id="priceMaps">$0.00</b> (<span id="distancia-km">0</span> km)</p>
                <input type="number" id="oferta-cliente" placeholder="Tu oferta $">
                <textarea id="detalles-pax" placeholder="Pasajeros, mascotas, carga..."></textarea>
                <button class="btn-action" onclick="publicarViaje()">SOLICITAR CONDUCTOR</button>
            </div>
            <button id="btn-calc" class="btn-action btn-secondary" onclick="calcularRuta()">CALCULAR RUTA</button>
        </div>
        <h4 style="margin-left:10px; color: var(--primary);">Ofertas en Tiempo Real:</h4>
        <div id="lista-ofertas"></div>
    </div>

    <!-- VISTA CONDUCTOR -->
    <div id="driver-view" class="section">
        <button class="btn-action btn-secondary" onclick="abrirHistorial()">MI HISTORIAL Y PAGOS (8%)</button>
        <h4 style="color:var(--primary)">Viajes Disponibles</h4>
        <div id="lista-viajes-global"></div>
        <hr>
        <h4 style="color:var(--accent)">Viajes Aceptados / Chat</h4>
        <div id="mis-chats-driver"></div>
    </div>

    <!-- HISTORIAL DRIVER -->
    <div id="historial-view" class="section">
        <div class="card">
            <h3 style="margin-top:0;">Resumen Semanal</h3>
            <div id="lista-historial-hoy" class="scroll-area"></div>
            <div class="comision-box">
                <p style="margin:0">Total recaudado: <b id="total-hoy">$0.00</b></p>
                <p style="margin:5px 0; font-size:1.1em;">Comisión RUN CAR (8%): <b id="comision-hoy">$0.00</b></p>
            </div>
            <hr>
            <h4>Reportar Depósito</h4>
            <input type="date" id="dep-fecha">
            <input type="number" id="dep-monto" placeholder="Monto Enviado $">
            <input type="text" id="dep-ref" placeholder="Referencia/Comprobante">
            <button class="btn-action" onclick="registrarPago()">ENVIAR REPORTE</button>
        </div>
        <button class="btn-action btn-secondary" onclick="volverAView('driver-view')">VOLVER</button>
    </div>

    <!-- CHAT -->
    <div id="chat-view" class="section">
        <div class="card">
            <h4 id="chat-titulo" style="margin-top:0;">Chat</h4>
            <div id="mensajes-box"></div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <input type="text" id="msg-input" placeholder="Escribe un mensaje...">
                <button class="btn-action" style="width:60px; margin:0;" onclick="enviarMensaje()">➤</button>
            </div>
            <button class="btn-action btn-finish" style="margin-top:15px;" onclick="finalizarViaje()">FINALIZAR VIAJE</button>
        </div>
        <button class="btn-action btn-secondary" onclick="location.reload()">CERRAR CHAT</button>
    </div>

    <button id="btn-logout" class="btn-action btn-danger" style="display:none; margin-top:20px;" onclick="cerrarSesion()">CERRAR SESIÓN</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot, serverTimestamp, doc, updateDoc, deleteDoc, getDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAyRrBUmw4OEzS7EmvK_XmDk6Z5rrjLC3A",
        authDomain: "runcar-6eda0.firebaseapp.com",
        projectId: "runcar-6eda0",
        storageBucket: "runcar-6eda0.firebasestorage.app",
        messagingSenderId: "152627344672",
        appId: "1:152627344672:web:b420d1c8cbb670069b9345"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentViajeId = null;
    let currentClienteId = null;
    let isReg = false;
    let chatIdActivo = null;

    // --- FUNCIONES DEL MODAL CONDUCTOR ---
    window.abrirModalOferta = (id, origen, destino, oferta, cliente) => {
        currentViajeId = id;
        currentClienteId = cliente;
        document.getElementById('modal-ruta-titulo').innerText = "Nuevo Viaje Disponible";
        document.getElementById('modal-info-viaje').innerHTML = `<b>De:</b> ${origen}<br><b>A:</b> ${destino}<br><b>Ofrece:</b> $${oferta}`;
        document.getElementById('input-precio-modal').value = oferta;
        document.getElementById('modal-oferta').style.display = 'flex';
    };

    window.cerrarModalOferta = () => {
        document.getElementById('modal-oferta').style.display = 'none';
        currentViajeId = null;
    };

    window.confirmarOfertaModal = async () => {
        const p = document.getElementById('input-precio-modal').value;
        if(!p || p <= 0) return alert("Ingresa un precio válido");
        
        try {
            await addDoc(collection(db, "ofertas"), { 
                viajeId: currentViajeId, 
                driver: auth.currentUser.uid, 
                precio: p, 
                clienteId: currentClienteId, 
                estado: "pendiente" 
            });
            alert("Oferta enviada con éxito.");
            cerrarModalOferta();
        } catch (e) {
            console.error(e);
        }
    };

    // --- AUTH ---
    window.switchAuth = () => {
        isReg = !isReg;
        document.getElementById('reg-fields').style.display = isReg ? 'block' : 'none';
        document.getElementById('btn-auth-main').innerText = isReg ? 'REGISTRAR' : 'INGRESAR';
    };

    window.ejecutarAuth = async () => {
        const mail = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        try {
            if(isReg) {
                const uc = await createUserWithEmailAndPassword(auth, mail, pass);
                await addDoc(collection(db, "usuarios"), {
                    uid: uc.user.uid,
                    rol: document.getElementById('reg-rol').value,
                    nombre: document.getElementById('reg-nombre').value,
                    whatsapp: document.getElementById('reg-prefijo').value + document.getElementById('reg-tel').value,
                    estado: "activo", email: mail
                });
            } else { await signInWithEmailAndPassword(auth, mail, pass); }
        } catch (e) { alert("Error: " + e.message); }
    };

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            const q = query(collection(db, "usuarios"), where("uid", "==", user.uid));
            const snap = await getDocs(q);
            snap.forEach(d => {
                const u = d.data();
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('btn-logout').style.display = 'block';
                if(u.rol === 'cliente') { 
                    document.getElementById('cliente-view').classList.add('active-section'); 
                    initMap(); escucharOfertas(); 
                } else { 
                    document.getElementById('driver-view').classList.add('active-section'); 
                    escucharViajes(); escucharMisAceptaciones(); 
                }
            });
        }
    });

    // --- MAPS ---
    let ds, dr;
    window.initMap = () => {
        ds = new google.maps.DirectionsService();
        dr = new google.maps.DirectionsRenderer({ map: new google.maps.Map(document.getElementById("map"), { center: {lat:13.7, lng:-89.2}, zoom:12 }) });
        new google.maps.places.Autocomplete(document.getElementById("origin"));
        new google.maps.places.Autocomplete(document.getElementById("destination"));
    };

    window.calcularRuta = () => {
        const o = document.getElementById("origin").value;
        const d = document.getElementById("destination").value;
        if(!o || !d) return;
        ds.route({ origin:o, destination:d, travelMode:'DRIVING' }, (res, status) => {
            if(status === 'OK') {
                dr.setDirections(res);
                const km = (res.routes[0].legs[0].distance.value / 1000).toFixed(2);
                let p = km <= 3 ? 3.00 : (3 + (km - 3) * 0.30);
                document.getElementById("distancia-km").innerText = km;
                document.getElementById("priceMaps").innerText = "$" + p.toFixed(2);
                document.getElementById("oferta-cliente").value = p.toFixed(2);
                document.getElementById("precio-area").style.display = 'block';
            }
        });
    };

    window.publicarViaje = async () => {
        await addDoc(collection(db, "viajes"), {
            cliente: auth.currentUser.uid,
            origen: document.getElementById("origin").value,
            destino: document.getElementById("destination").value,
            oferta: document.getElementById("oferta-cliente").value,
            estado: "abierto",
            fecha: serverTimestamp()
        });
        alert("Solicitud publicada.");
    };

    // --- CLIENTE: RECIBIR OFERTAS ---
    function escucharOfertas() {
        onSnapshot(query(collection(db, "ofertas"), where("clienteId", "==", auth.currentUser.uid), where("estado", "==", "pendiente")), (snap) => {
            let h = "";
            snap.forEach(d => {
                const o = d.data();
                h += `<div class="card">
                        <p>Oferta recibida: <b style="color:var(--primary);">$${o.precio}</b></p>
                        <div class="flex-btns">
                            <button class="btn-action" onclick="aceptarOferta('${o.viajeId}', '${d.id}', '${o.driver}')">ACEPTAR</button>
                            <button class="btn-action btn-danger" onclick="rechazarOfertaCliente('${d.id}')">X</button>
                        </div>
                    </div>`;
            });
            document.getElementById("lista-ofertas").innerHTML = h;
        });
    }

    window.aceptarOferta = async (vid, oid, did) => {
        await updateDoc(doc(db, "viajes", vid), { estado: "aceptado", driverFinal: did });
        await updateDoc(doc(db, "ofertas", oid), { estado: "aceptada" });
        abrirChat(vid, "Conductor");
    };

    window.rechazarOfertaCliente = async (oid) => { await updateDoc(doc(db, "ofertas", oid), { estado: "rechazada" }); };

    // --- CONDUCTOR: VER DISPONIBLES ---
    function escucharViajes() {
        onSnapshot(query(collection(db, "viajes"), where("estado", "==", "abierto")), (snap) => {
            let h = "";
            snap.forEach(d => {
                const v = d.data();
                h += `<div class="card" onclick="abrirModalOferta('${d.id}', '${v.origen.split(',')[0]}', '${v.destino.split(',')[0]}', '${v.oferta}', '${v.cliente}')" style="cursor:pointer; border-left:5px solid var(--primary);">
                        <p style="margin:0;">📍 <b>Ruta:</b> ${v.origen.split(',')[0]} → ${v.destino.split(',')[0]}</p>
                        <p style="margin:5px 0 0 0; font-size:14px; color:#666;">Ofrece: <b>$${v.oferta}</b> - <small>Toca para ofertar</small></p>
                    </div>`;
            });
            document.getElementById("lista-viajes-global").innerHTML = h || "No hay viajes abiertos.";
        });
    }

    function escucharMisAceptaciones() {
        onSnapshot(query(collection(db, "ofertas"), where("driver", "==", auth.currentUser.uid), where("estado", "==", "aceptada")), (snap) => {
            const container = document.getElementById("mis-chats-driver");
            container.innerHTML = ""; 
            snap.forEach(async (d) => {
                const o = d.data();
                const v = await getDoc(doc(db, "viajes", o.viajeId));
                if (v.exists() && v.data().estado === 'aceptado') {
                    const div = document.createElement('div');
                    div.className = "card";
                    div.innerHTML = `✅ ¡Oferta Aceptada! ($${o.precio}) <button class="btn-action" onclick="abrirChat('${o.viajeId}', 'Cliente')">ABRIR CHAT</button>`;
                    container.appendChild(div);
                }
            });
        });
    }

    // --- CHAT ---
    window.abrirChat = (id, tipo) => {
        chatIdActivo = id;
        document.getElementById('chat-titulo').innerText = "Chat con " + tipo;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
        document.getElementById('chat-view').classList.add('active-section');
        escucharMensajes(id);
    };

    window.enviarMensaje = async () => {
        const txt = document.getElementById('msg-input').value;
        if(!txt) return;
        await addDoc(collection(db, "mensajes"), { viajeId: chatIdActivo, remitente: auth.currentUser.uid, texto: txt, fecha: serverTimestamp() });
        document.getElementById('msg-input').value = "";
    };

    function escucharMensajes(id) {
        onSnapshot(query(collection(db, "mensajes"), where("viajeId", "==", id), orderBy("fecha")), (snap) => {
            let h = "";
            snap.forEach(m => {
                const c = m.data().remitente === auth.currentUser.uid ? "msg-mio" : "msg-otro";
                h += `<div class="${c}">${m.data().texto}</div>`;
            });
            const box = document.getElementById("mensajes-box");
            box.innerHTML = h; box.scrollTop = box.scrollHeight;
        });
    }

    window.finalizarViaje = async () => {
        if(confirm("¿Finalizar viaje?")) {
            await updateDoc(doc(db, "viajes", chatIdActivo), { estado: "finalizado" });
            const ofs = await getDocs(query(collection(db, "ofertas"), where("viajeId", "==", chatIdActivo), where("estado", "==", "aceptada")));
            ofs.forEach(async (d) => await updateDoc(doc(db, "ofertas", d.id), { estado: "finalizada" }));
            alert("Viaje terminado.");
            location.reload();
        }
    };

    // --- HISTORIAL ---
    window.abrirHistorial = async () => {
        volverAView('historial-view');
        const q = query(collection(db, "ofertas"), where("driver", "==", auth.currentUser.uid), where("estado", "==", "finalizada"));
        const snap = await getDocs(q);
        let total = 0; let html = "";
        snap.forEach(doc => {
            total += parseFloat(doc.data().precio);
            html += `<div class="historial-item">Viaje Finalizado: $${doc.data().precio}</div>`;
        });
        document.getElementById('lista-historial-hoy').innerHTML = html || "Sin datos.";
        document.getElementById('total-hoy').innerText = `$${total.toFixed(2)}`;
        document.getElementById('comision-hoy').innerText = `$${(total * 0.08).toFixed(2)}`;
    };

    window.volverAView = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
        document.getElementById(id).classList.add('active-section');
    };

    window.cerrarSesion = () => signOut(auth).then(() => location.reload());

    async function cargarPaises() {
        const sel = document.getElementById('reg-prefijo');
        const res = await fetch('https://restcountries.com/v3.1/all?fields=idd,flag,cca2');
        const data = await res.json();
        data.forEach(c => {
            const code = c.idd.root + (c.idd.suffixes ? c.idd.suffixes[0] : "");
            if(code) {
                const opt = new Option(`${c.flag} ${code}`, code);
                if(c.cca2 === 'SV') opt.selected = true;
                sel.add(opt);
            }
        });
    }
    cargarPaises();

</script>
</body>
</html>
